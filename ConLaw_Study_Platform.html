<html lang="en">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            color: #e0e0e0;
            line-height: 1.6;
        }

            margin: 0 auto;
            padding: 2rem;
        }

            margin-bottom: 2rem;
        }

        .header h1 {

            color: #4a90d9;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #999;
            font-size: 1rem;
        }

            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .button-primary {
            background-color: #4a90d9;
            color: white;
        }

        .button-primary:hover {
            background-color: #3a7bc8;
        }

        .button-secondary {
            background-color: #4a4a5e;
            color: #e0e0e0;
        }

        .button-secondary:hover {
            background-color: #5a5a6e;
        }

        .button-danger {
            background-color: #dc3545;
            color: white;
        }

        .button-danger:hover {
            background-color: #c82333;
        }

        .button-success {
            background-color: #28a745;
            color: white;
        }

        .button-success:hover {
            background-color: #218838;
        }

            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .level-card {
            background: linear-gradient(135deg, #2a2a3e 0%, #3a3a4e 100%);
            border: 2px solid #4a90d9;
            border-radius: 0.5rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .level-card:hover {
            transform: translateY(-4px);
            border-color: #5ba0e9;
            box-shadow: 0 8px 16px rgba(74, 144, 217, 0.3);
        }

        .level-card h3 {
            font-size: 1.5rem;
            color: #4a90d9;
            margin-bottom: 1rem;
        }

        .level-card p {
            color: #aaa;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #1a1a2e;
            border-radius: 4px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-fill {
            height: 100%;
            background-color: #4a90d9;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .timer {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4a90d9;
            font-family: 'Courier New', monospace;
        }

        .timer.warning {
            color: #ffc107;
        }

        .timer.danger {
            color: #dc3545;
        }

        .question-container {
            background-color: #2a2a3e;
            border: 1px solid rgba(74, 144, 217, 0.3);
            border-radius: 0.5rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 1.5rem;
        }

        .answer-option {
            background-color: #1a1a2e;
            border: 1px solid rgba(74, 144, 217, 0.2);
            border-radius: 0.375rem;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .answer-option:hover {
            border-color: #4a90d9;
            background-color: #252539;
        }

        .answer-option.selected {
            background-color: #4a90d9;
            border-color: #4a90d9;
            color: white;
        }

        .answer-option.correct {
            background-color: #28a745;
            border-color: #28a745;
            color: white;
        }

        .answer-option.incorrect {
            background-color: #dc3545;
            border-color: #dc3545;
            color: white;
        }

            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
        }

        .checkbox-item input[type="checkbox"] {
            margin-right: 1rem;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .fill-blank {
            width: 100%;
            padding: 0.75rem;
            background-color: #1a1a2e;
            border: 1px solid rgba(74, 144, 217, 0.3);
            border-radius: 0.375rem;
            color: #e0e0e0;
            margin: 0.5rem 0;
            font-size: 1rem;
        }

        .fill-blank:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
        }

        .feedback {
            padding: 1rem;
            border-radius: 0.375rem;
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        .feedback.success {
            background-color: rgba(40, 167, 69, 0.1);
            border-left: 4px solid #28a745;
            color: #90ee90;
        }

        .feedback.error {
            background-color: rgba(220, 53, 69, 0.1);
            border-left: 4px solid #dc3545;
            color: #ff6b6b;
        }

        .feedback.info {
            background-color: rgba(74, 144, 217, 0.1);
            border-left: 4px solid #4a90d9;
            color: #7ec8ff;
        }

        .analogy-box {
            background-color: rgba(255, 193, 7, 0.08);
            border-left: 4px solid #ffc107;
            border-radius: 0.375rem;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.95rem;
            color: #ffd54f;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .analogy-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
            min-width: 1.5rem;
            text-align: center;
        }

        .analogy-content {
            flex: 1;
        }

        .analogy-label {
            font-weight: 600;
            color: #ffc107;
            margin-bottom: 0.25rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

            background-color: #2a2a3e;
            border: 1px solid #4a90d9;
            border-radius: 0.5rem;
            padding: 2rem;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            color: #4a90d9;
            margin-bottom: 1.5rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: flex-end;
        }

        .icon {
            display: inline-block;
            margin-right: 0.5rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-blue {
            background-color: rgba(74, 144, 217, 0.2);
            color: #4a90d9;
        }

        .badge-green {
            background-color: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }

        .badge-red {
            background-color: rgba(220, 53, 69, 0.2);
            color: #dc3545;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            gap: 1rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .stat-box {
            flex: 1;
            min-width: 150px;
            background-color: #1a1a2e;
            border-left: 4px solid #4a90d9;
            padding: 1rem;
            border-radius: 0.375rem;
        }

        .stat-label {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            color: #4a90d9;
            font-size: 1.75rem;
            font-weight: bold;
        }

        .textarea {
            width: 100%;
            min-height: 300px;
            padding: 1rem;
            background-color: #1a1a2e;
            border: 1px solid rgba(74, 144, 217, 0.3);
            border-radius: 0.375rem;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
        }

        .textarea:focus {
            outline: none;
            border-color: #4a90d9;
        }

        .break-screen {
            text-align: center;
            padding: 3rem;
        }

        .break-screen h2 {
            color: #ffc107;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .break-screen p {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 2rem;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .level-grid {
                grid-template-columns: 1fr;
            }

            .question-container {
                padding: 1rem;
            }

            .stats-row {
                flex-direction: column;
            }

            .stat-box {
                min-width: auto;
            }
        }

        .breadcrumb {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.5rem;
            color: #999;
            font-size: 0.95rem;
        }

        .breadcrumb a {
            color: #4a90d9;
            cursor: pointer;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .mastery-indicator {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }

        .mastery-bar {
            flex: 1;
            height: 20px;
            background-color: #1a1a2e;
            border-radius: 10px;
            overflow: hidden;
        }

        .mastery-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a90d9 0%, #7bc0ff 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .doctrine-tag {
            display: inline-block;
            padding: 0.5rem 1rem;
            background-color: rgba(74, 144, 217, 0.15);
            border-left: 3px solid #4a90d9;
            color: #7bc0ff;
            font-size: 0.9rem;
            margin: 0.5rem 0;
            border-radius: 0.25rem;
        }

        .issue-list {
            list-style: none;
            padding-left: 0;
        }

        .issue-list li {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(74, 144, 217, 0.1);
            color: #ccc;
        }

        .issue-list li:last-child {
            border-bottom: none;
        }

        .issue-list li:before {
            content: "◆ ";
            color: #4a90d9;
            margin-right: 0.5rem;
        }
    </style>
</head>

            useEffect(() => {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                } catch (e) { /* storage full or unavailable */ }
            }, [state]);

            useEffect(() => {
                const interval = setInterval(() => {
                    setSessionTimer(s => s + 1);
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            // Only show level components when actively in a level (not when exited to landing)
            if (state.currentPage === 'level') {
                if (state.currentLevel === 1) {
                    return <Level1Component state={state} dispatch={dispatch} />;
                }
                if (state.currentLevel === 2) {
                    return <Level2Component state={state} dispatch={dispatch} />;
                }
                if (state.currentLevel === 3) {
                    return <Level3Component state={state} dispatch={dispatch} />;
                }
                if (state.currentLevel === 4) {
                    return <Level4Component state={state} dispatch={dispatch} />;
                }
            }

            // Rule Bank Page
            if (state.currentPage === 'ruleBank') {
                return <RuleBankComponent state={state} dispatch={dispatch} />;
            }

            // Landing Page
            return (
                <div className="container">
                    <div className="header">
                        <h1>Constitutional Law Study Platform</h1>
                        <p>Master the law through 4 progressive levels</p>
                    </div>

                    <div className="stats-row">
                        <div className="stat-box">
                            <div className="stat-label">Session Time</div>
                            <div className="stat-value">{formatTime(sessionTimer)}</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">Level 1 Score</div>
                            <div className="stat-value">{state.level1Score}</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">Level 2 Score</div>
                            <div className="stat-value">{state.level2Score}</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">Total Progress</div>
                            <div className="stat-value">{state.level1CompletedQuestions.length + state.level2CompletedHypos.length}</div>
                        </div>
                    </div>

                    <div style={{ marginBottom: '1.5rem' }}>
                        <button
                            className="button button-primary"
                            onClick={() => dispatch({ type: 'SET_PAGE', payload: 'ruleBank' })}
                            style={{ width: '100%', padding: '1rem', fontSize: '1.1rem' }}
                        >
                            📚 Rule Bank
                        </button>
                    </div>

                    <div className="level-grid">
                        <div className="level-card" onClick={() => dispatch({ type: 'START_LEVEL', payload: 1 })}>
                            <h3>Level 1</h3>
                            <p>Rule Mastery</p>
                            <p>Master fundamental doctrines through varied question types</p>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${(Object.values(state.level1QuestionStreaks).filter(s => s >= 2).length / level1Questions.length) * 100}%` }}></div>
                            </div>
                            <p style={{ marginTop: '0.5rem', fontSize: '0.85rem', color: '#4a90d9' }}>
                                {Object.values(state.level1QuestionStreaks).filter(s => s >= 2).length}/{level1Questions.length} Mastered
                            </p>
                        </div>

                        <div className="level-card" onClick={() => dispatch({ type: 'START_LEVEL', payload: 2 })}>
                            <h3>Level 2</h3>
                            <p>Rule Application</p>
                            <p>Apply rules to realistic fact patterns with IRAC</p>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${(state.level2CompletedHypos.length / level2Hypos.length) * 100}%` }}></div>
                            </div>
                            <p style={{ marginTop: '0.5rem', fontSize: '0.85rem', color: '#4a90d9' }}>
                                {state.level2CompletedHypos.length}/{level2Hypos.length} Complete
                            </p>
                        </div>

                        <div className="level-card" onClick={() => dispatch({ type: 'START_LEVEL', payload: 3 })}>
                            <h3>Level 3</h3>
                            <p>Issue Spotting</p>
                            <p>Spot, triage, and quickly analyze multi-issue scenarios</p>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${(state.level3CompletedHypos.length / level3Hypos.length) * 100}%` }}></div>
                            </div>
                            <p style={{ marginTop: '0.5rem', fontSize: '0.85rem', color: '#4a90d9' }}>
                                {state.level3CompletedHypos.length}/{level3Hypos.length} Complete
                            </p>
                        </div>

                        <div className="level-card" onClick={() => dispatch({ type: 'START_LEVEL', payload: 4 })}>
                            <h3>Level 4</h3>
                            <p>Exam Simulation</p>
                            <p>Full 3-hour timed exam with answer rubrics</p>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: state.level4Submitted ? 100 : 0 }}></div>
                            </div>
                            <p style={{ marginTop: '0.5rem', fontSize: '0.85rem', color: '#4a90d9' }}>
                                {state.level4Submitted ? 'Completed' : 'Not Started'}
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // LEVEL 1: RULE MASTERY
        // ============================================================================

        function Level1Component({ state, dispatch }) {
            // Calculate mastery stats
            const masteredCount = level1Questions.filter(q => (state.level1QuestionStreaks[q.id] || 0) >= 2).length;
            const totalQuestions = level1Questions.length;

            // Get the current question (already selected randomly in NEXT_QUESTION reducer)
            const question = level1Questions[state.level1CurrentQuestion];

            const [selectedElements, setSelectedElements] = useState([]);
            const [selectedOption, setSelectedOption] = useState('');
            const [fillAnswers, setFillAnswers] = useState({});
            const [tfAnswer, setTfAnswer] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [explanation, setExplanation] = useState('');

            const handleSubmit = () => {
                if (question.type === 'elementBreakdown') {
                    const correct = JSON.stringify(selectedElements.sort()) === JSON.stringify(question.correctAnswer.sort());
                    setIsCorrect(correct);
                    setExplanation(correct ? 'Correct!' : 'Incorrect. Please review the elements.');
                } else if (question.type === 'ruleMatching') {
                    const correct = selectedOption === question.correctAnswer;
                    setIsCorrect(correct);
                    setExplanation(correct ? 'Correct!' : `Incorrect. The correct answer is ${question.correctAnswer}.`);
                } else if (question.type === 'fillTheGap') {
                    const answers = question.blanks.map((_, i) => fillAnswers[i] || '');
                    const correct = JSON.stringify(answers) === JSON.stringify(question.correctAnswer);
                    setIsCorrect(correct);
                    setExplanation(correct ? 'Correct!' : `Incorrect. The correct answers are: ${question.correctAnswer.join(', ')}`);
                } else if (question.type === 'trueFalse') {
                    const correct = tfAnswer === question.correctAnswer;
                    setIsCorrect(correct);
                    setExplanation(correct ? 'Correct!' : question.explanation);
                }
                setShowFeedback(true);
            };

            const handleNext = () => {
                dispatch({ type: 'SUBMIT_LEVEL1_ANSWER', payload: selectedElements.length > 0 ? selectedElements : selectedOption || Object.values(fillAnswers) || tfAnswer });
                setSelectedElements([]);
                setSelectedOption('');
                setFillAnswers({});
                setTfAnswer(null);
                setShowFeedback(false);
                setIsCorrect(null);

                // Show break prompt every 5 questions
                if ((state.level1CompletedQuestions.length + 1) % 5 === 0 && state.level1CurrentQuestion + 1 < level1Questions.length) {
                    const breakPrompt = getRandomAnalogyBreakPrompt();
                    setTimeout(() => {
                        alert(`Take a quick break!\n\n📚 Quick Review: ${breakPrompt.doctrine}\n\n${breakPrompt.hint}`);
                    }, 100);
                }

                dispatch({ type: 'NEXT_QUESTION' });
            };

            return (
                <div className="container">
                    <div className="breadcrumb">
                        <span onClick={() => dispatch({ type: 'SET_PAGE', payload: 'landing' })} style={{ cursor: 'pointer', color: '#4a90d9' }}>Dashboard</span>
                        <span>/</span>
                        <span>Level 1: Rule Mastery</span>
                    </div>

                    <div className="stats-row">
                        <div className="stat-box">
                            <div className="stat-label">Score</div>
                            <div className="stat-value">{state.level1Score} pts</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">Questions Mastered</div>
                            <div className="stat-value">{masteredCount}/{totalQuestions}</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">Attempts</div>
                            <div className="stat-value">{state.level1CompletedQuestions.length}</div>
                        </div>
                    </div>

                    <div className="mastery-indicator">
                        <div className="mastery-bar">
                            <div className="mastery-fill" style={{ width: `${(masteredCount / totalQuestions) * 100}%` }}>
                                {masteredCount === totalQuestions ? '100%' : ''}
                            </div>
                        </div>
                        <span style={{ fontSize: '0.9rem', color: '#999' }}>
                            {masteredCount === totalQuestions ? 'All mastered!' : `${totalQuestions - masteredCount} more to go`}
                        </span>
                    </div>

                    <div className="question-container">
                        <div className="doctrine-tag">{question.doctrine || 'Constitutional Law'}</div>
                        <h2 className="question-text">{question.question}</h2>

                        {question.type === 'elementBreakdown' && (
                            <div className="checkbox-group">
                                {question.elements.map((elem, idx) => (
                                    <label key={idx} className="checkbox-item">
                                        <input
                                            type="checkbox"
                                            checked={selectedElements.includes(elem)}
                                            onChange={(e) => {
                                                if (e.target.checked) {
                                                    setSelectedElements([...selectedElements, elem]);
                                                } else {
                                                    setSelectedElements(selectedElements.filter(el => el !== elem));
                                                }
                                            }}
                                        />
                                        <span>{elem}</span>
                                    </label>
                                ))}
                            </div>
                        )}

                        {question.type === 'ruleMatching' && (
                            <div>
                                {question.caseOptions.map((option, idx) => (
                                    <div
                                        key={idx}
                                        className={`answer-option ${selectedOption === option ? 'selected' : ''}`}
                                        onClick={() => setSelectedOption(option)}
                                    >
                                        {option}
                                    </div>
                                ))}
                            </div>
                        )}

                        {question.type === 'fillTheGap' && (
                            <div>
                                {question.blanks.map((blank, idx) => (
                                    <div key={idx}>
                                        <label>{`Blank ${idx + 1}:`}</label>
                                        <input
                                            type="text"
                                            className="fill-blank"
                                            placeholder={`Fill in blank ${idx + 1}`}
                                            value={fillAnswers[idx] || ''}
                                            onChange={(e) => setFillAnswers({ ...fillAnswers, [idx]: e.target.value })}
                                        />
                                    </div>
                                ))}
                            </div>
                        )}

                        {question.type === 'trueFalse' && (
                            <div>
                                <div className="answer-option" onClick={() => setTfAnswer(true)} style={{ cursor: 'pointer', ...(tfAnswer === true ? { backgroundColor: '#4a90d9', borderColor: '#4a90d9' } : {}) }}>
                                    <strong>True</strong>
                                </div>
                                <div className="answer-option" onClick={() => setTfAnswer(false)} style={{ cursor: 'pointer', ...(tfAnswer === false ? { backgroundColor: '#4a90d9', borderColor: '#4a90d9' } : {}) }}>
                                    <strong>False</strong>
                                </div>
                                <textarea
                                    className="fill-blank"
                                    style={{ minHeight: '100px', marginTop: '1rem' }}
                                    placeholder="Explain your answer..."
                                    onChange={() => {}}
                                />
                            </div>
                        )}

                        {showFeedback && (
                            <div>
                                <div className={`feedback ${isCorrect ? 'success' : 'error'}`}>
                                    <strong>{isCorrect ? 'Correct!' : 'Incorrect'}</strong>
                                    <p>{explanation}</p>
                                </div>
                                {(question.analogyHint || (question.doctrine && rules.find(r => r.name === question.doctrine)?.analogy)) && (
                                    <div className="analogy-box">
                                        <div className="analogy-icon">💡</div>
                                        <div className="analogy-content">
                                            <div className="analogy-label">Connect It</div>
                                            <p>{question.analogyHint || rules.find(r => r.name === question.doctrine)?.analogy}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        <div style={{ marginTop: '2rem', display: 'flex', gap: '1rem', justifyContent: 'flex-end' }}>
                            <button className="button button-secondary" onClick={() => dispatch({ type: 'SET_PAGE', payload: 'landing' })}>
                                Exit Level
                            </button>
                            {!showFeedback ? (
                                <button className="button button-primary" onClick={handleSubmit}>
                                    Check Answer
                                </button>
                            ) : (
                                <button className="button button-primary" onClick={handleNext}>
                                    Next Question
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // LEVEL 2: RULE APPLICATION
        // ============================================================================

        function Level2Component({ state, dispatch }) {
            const hypo = level2Hypos[state.level2CurrentHypo];
            const [userAnswer, setUserAnswer] = useState('');
            const [showModel, setShowModel] = useState(false);
            const [selfAssessment, setSelfAssessment] = useState(null);
            const [showImpulsityWarning, setShowImpulsityWarning] = useState(false);

            useEffect(() => {
                if (userAnswer.length > 0 && !showImpulsityWarning) {
                    setShowImpulsityWarning(true);
                    dispatch({ type: 'START_IMPULSIVITY_TIMER' });
                }
            }, [userAnswer]);

            useEffect(() => {
                if (state.level2ImpulsivityCountdown > 0) {
                    const timer = setTimeout(() => {
                        dispatch({ type: 'TICK_IMPULSIVITY' });
                    }, 1000);
                    return () => clearTimeout(timer);
                }
            }, [state.level2ImpulsivityCountdown, dispatch]);

            const handleSubmit = () => {
                if (state.level2ImpulsivityCountdown > 0) {
                    alert('Please wait 10 seconds before submitting to prevent impulsive answers.');
                    return;
                }
                setShowModel(true);
            };

            const handleNext = () => {
                dispatch({ type: 'SUBMIT_LEVEL2_ANSWER', payload: { correct: selfAssessment === 'mastery' } });
                setUserAnswer('');
                setShowModel(false);
                setSelfAssessment(null);
                setShowImpulsityWarning(false);
                dispatch({ type: 'NEXT_HYPO_LEVEL2' });
            };

            return (
                <div className="container">
                    <div className="breadcrumb">
                        <span onClick={() => dispatch({ type: 'SET_PAGE', payload: 'landing' })} style={{ cursor: 'pointer', color: '#4a90d9' }}>Dashboard</span>
                        <span>/</span>
                        <span>Level 2: Rule Application</span>
                        <span>({state.level2CurrentHypo + 1}/{level2Hypos.length})</span>
                    </div>

                    <div className="stats-row">
                        <div className="stat-box">
                            <div className="stat-label">Score</div>
                            <div className="stat-value">{state.level2Score} pts</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">Progress</div>
                            <div className="stat-value">{state.level2CompletedHypos.length}/{level2Hypos.length}</div>
                        </div>
                    </div>

                    <div className="question-container">
                        <h2 className="question-text">Fact Pattern: {hypo.id}</h2>
                        <div className="feedback info">{hypo.scenario}</div>

                        <h3 style={{ marginTop: '1.5rem', marginBottom: '1rem', color: '#7bc0ff' }}>Issues to Address:</h3>
                        <ul className="issue-list">
                            {hypo.issues.map((issue, idx) => (
                                <li key={idx}>{issue}</li>
                            ))}
                        </ul>

                        <h3 style={{ marginTop: '1.5rem', marginBottom: '1rem', color: '#7bc0ff' }}>Rule to Apply:</h3>
                        <div className="doctrine-tag">{hypo.ruleToApply}</div>

                        <h3 style={{ marginTop: '1.5rem', marginBottom: '1rem', color: '#7bc0ff' }}>Your IRAC Response:</h3>
                        <textarea
                            className="textarea"
                            placeholder="Write your IRAC here: Rule, Fact Application, Conclusion..."
                            value={userAnswer}
                            onChange={(e) => setUserAnswer(e.target.value)}
                        />

                        {showImpulsityWarning && state.level2ImpulsivityCountdown > 0 && (
                            <div className="feedback" style={{ background: 'rgba(255, 193, 7, 0.1)', borderLeftColor: '#ffc107', color: '#ffc107' }}>
                                <strong>Impulsivity Check Active</strong>
                                <p>Take a moment to review your answer. Submit in {state.level2ImpulsivityCountdown} seconds...</p>
                            </div>
                        )}

                        {showModel && (
                            <div className="card">
                                <h3 style={{ color: '#28a745', marginBottom: '1rem' }}>Model Answer</h3>
                                <p>{hypo.modelAnswer}</p>

                                {hypo.relatedRule && rules.find(r => r.name === hypo.relatedRule)?.analogy && (
                                    <div className="analogy-box">
                                        <div className="analogy-icon">🎯</div>
                                        <div className="analogy-content">
                                            <div className="analogy-label">Remember</div>
                                            <p>{rules.find(r => r.name === hypo.relatedRule)?.analogy}</p>
                                        </div>
                                    </div>
                                )}

                                <h4 style={{ marginTop: '1.5rem', color: '#7bc0ff', marginBottom: '1rem' }}>Self-Assessment Criteria:</h4>
                                <div className="checkbox-group">
                                    {hypo.selfAssessmentCriteria.map((criterion, idx) => (
                                        <label key={idx} className="checkbox-item">
                                            <input type="checkbox" onChange={() => {}} />
                                            <span>{criterion}</span>
                                        </label>
                                    ))}
                                </div>

                                <h4 style={{ marginTop: '1.5rem', color: '#7bc0ff', marginBottom: '1rem' }}>How would you rate your answer?</h4>
                                <div className="grid-2">
                                    <button
                                        className={`button ${selfAssessment === 'mastery' ? 'button-success' : 'button-secondary'}`}
                                        onClick={() => setSelfAssessment('mastery')}
                                    >
                                        Mastery (4-5/5)
                                    </button>
                                    <button
                                        className={`button ${selfAssessment === 'proficient' ? 'button-success' : 'button-secondary'}`}
                                        onClick={() => setSelfAssessment('proficient')}
                                    >
                                        Proficient (3/5)
                                    </button>
                                    <button
                                        className={`button ${selfAssessment === 'developing' ? 'button-success' : 'button-secondary'}`}
                                        onClick={() => setSelfAssessment('developing')}
                                    >
                                        Developing (2/5)
                                    </button>
                                    <button
                                        className={`button ${selfAssessment === 'novice' ? 'button-success' : 'button-secondary'}`}
                                        onClick={() => setSelfAssessment('novice')}
                                    >
                                        Novice (1/5)
                                    </button>
                                </div>
                            </div>
                        )}

                        <div style={{ marginTop: '2rem', display: 'flex', gap: '1rem', justifyContent: 'flex-end' }}>
                            <button className="button button-secondary" onClick={() => dispatch({ type: 'SET_PAGE', payload: 'landing' })}>
                                Exit Level
                            </button>
                            {!showModel ? (
                                <button
                                    className="button button-primary"
                                    onClick={handleSubmit}
                                    disabled={state.level2ImpulsivityCountdown > 0}
                                >
                                    Submit Answer
                                </button>
                            ) : (
                                <button
                                    className="button button-primary"
                                    onClick={handleNext}
                                    disabled={!selfAssessment}
                                >
                                    Next Hypo
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // LEVEL 3: ISSUE SPOTTING
        // ============================================================================

        function Level3Component({ state, dispatch }) {
            const hypo = level3Hypos[state.level3CurrentHypo];
            const currentPhase = hypo.phases[state.level3CurrentPhase - 1];
            const [phaseInput, setPhaseInput] = useState('');
            const [phaseTimer, setPhaseTimer] = useState(currentPhase.timeLimit || 0);

            useEffect(() => {
                if (state.level3CurrentPhase === 3 && phaseTimer > 0) {
                    const timer = setTimeout(() => setPhaseTimer(phaseTimer - 1), 1000);
                    return () => clearTimeout(timer);
                }
            }, [phaseTimer, state.level3CurrentPhase]);

            const handlePhaseComplete = () => {
                dispatch({
                    type: 'NEXT_PHASE',
                    payload: { level3Answers: { ...state.level3Answers, [hypo.id]: phaseInput }, timeLimit: currentPhase.timeLimit },
                });
                setPhaseInput('');
            };

            return (
                <div className="container">
                    <div className="breadcrumb">
                        <span onClick={() => dispatch({ type: 'SET_PAGE', payload: 'landing' })} style={{ cursor: 'pointer', color: '#4a90d9' }}>Dashboard</span>
                        <span>/</span>
                        <span>Level 3: Issue Spotting</span>
                        <span>({state.level3CurrentHypo + 1}/{level3Hypos.length})</span>
                    </div>

                    <div className="stats-row">
                        <div className="stat-box">
                            <div className="stat-label">Phase</div>
                            <div className="stat-value">{state.level3CurrentPhase}/3</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">Score</div>
                            <div className="stat-value">{state.level3Score} pts</div>
                        </div>
                        {state.level3CurrentPhase === 3 && (
                            <div className="stat-box">
                                <div className="stat-label">Time Remaining</div>
                                <div className="stat-value timer">{formatTime(phaseTimer)}</div>
                            </div>
                        )}
                    </div>

                    <div className="question-container">
                        <h2 style={{ color: '#4a90d9', marginBottom: '1rem' }}>
                            Phase {state.level3CurrentPhase}: {currentPhase.name}
                        </h2>
                        <div className="feedback info">{hypo.scenario}</div>

                        <h3 style={{ marginTop: '1.5rem', marginBottom: '1rem', color: '#7bc0ff' }}>Instructions:</h3>
                        <p>{currentPhase.instructions}</p>

                        <h3 style={{ marginTop: '1.5rem', marginBottom: '1rem', color: '#7bc0ff' }}>
                            {state.level3CurrentPhase === 1 ? 'Issues to Spot' : state.level3CurrentPhase === 2 ? 'Triage & Rank Issues' : 'Quick IRAC (3-4 min)'}
                        </h3>
                        <textarea
                            className="textarea"
                            placeholder={state.level3CurrentPhase === 1 ? 'List all constitutional issues...' : state.level3CurrentPhase === 2 ? 'Rank issues by importance...' : 'Write quick IRAC...'}
                            value={phaseInput}
                            onChange={(e) => setPhaseInput(e.target.value)}
                        />

                        <div style={{ marginTop: '2rem', display: 'flex', gap: '1rem', justifyContent: 'flex-end' }}>
                            <button className="button button-secondary" onClick={() => dispatch({ type: 'SET_PAGE', payload: 'landing' })}>
                                Exit Level
                            </button>
                            <button className="button button-primary" onClick={handlePhaseComplete} disabled={!phaseInput.trim()}>
                                {state.level3CurrentPhase === 3 ? 'Submit Hypo' : 'Next Phase'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // LEVEL 4: EXAM SIMULATION
        // ============================================================================

        function Level4Component({ state, dispatch }) {
            const exam = level4Exams[state.level4CurrentExam];
            const [timeRemaining, setTimeRemaining] = useState(state.level4TimeRemaining || exam.duration * 60);

            useEffect(() => {
                if (!state.level4Submitted && timeRemaining > 0) {
                    const timer = setTimeout(() => {
                        setTimeRemaining(timeRemaining - 1);
                        dispatch({ type: 'TICK_EXAM' });
                    }, 1000);
                    return () => clearTimeout(timer);
                }
            }, [timeRemaining, state.level4Submitted, dispatch]);

            useEffect(() => {
                if (state.level4StartTime === null && !state.level4Submitted) {
                    dispatch({ type: 'START_EXAM' });
                }
            }, [state.level4StartTime, state.level4Submitted, dispatch]);

            if (state.level4Submitted) {
                return (
                    <div className="container">
                        <div className="question-container" style={{ textAlign: 'center' }}>
                            <h2 style={{ color: '#28a745', marginBottom: '1rem' }}>Exam Submitted</h2>
                            <p>Your exam response has been recorded. Time used: {formatTime(exam.duration * 60 - timeRemaining)}</p>
                            <button
                                className="button button-primary"
                                onClick={() => dispatch({ type: 'SET_PAGE', payload: 'landing' })}
                                style={{ marginTop: '2rem' }}
                            >
                                Return to Dashboard
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="container">
                    <div className="breadcrumb">
                        <span onClick={() => dispatch({ type: 'SET_PAGE', payload: 'landing' })} style={{ cursor: 'pointer', color: '#4a90d9' }}>Dashboard</span>
                        <span>/</span>
                        <span>Level 4: Full Exam</span>
                    </div>

                    <div className="stats-row">
                        <div className="stat-box">
                            <div className="stat-label">Exam Title</div>
                            <div className="stat-value" style={{ fontSize: '1rem' }}>{exam.title}</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">Time Remaining</div>
                            <div className={`stat-value ${timeRemaining < 300 ? 'timer danger' : timeRemaining < 900 ? 'timer warning' : 'timer'}`}>
                                {formatTime(timeRemaining)}
                            </div>
                        </div>
                    </div>

                    <div className="question-container">
                        <h2 style={{ color: '#4a90d9', marginBottom: '1rem' }}>Exam Instructions</h2>
                        <p className="feedback info">{exam.instructions}</p>

                        {exam.questions.map((q, idx) => (
                            <div key={idx} style={{ marginBottom: '2rem', paddingBottom: '2rem', borderBottom: '1px solid rgba(74, 144, 217, 0.2)' }}>
                                <h3 style={{ color: '#7bc0ff', marginBottom: '1rem' }}>
                                    Question {q.number} ({q.points} points)
                                </h3>
                                <p className="feedback info">{q.prompt}</p>
                            </div>
                        ))}

                        <h3 style={{ color: '#7bc0ff', marginBottom: '1rem' }}>Your Answer:</h3>
                        <textarea
                            className="textarea"
                            placeholder="Write your exam answer here. You have the full 3 hours."
                            value={state.level4ExamText}
                            onChange={(e) => {}}
                            style={{ minHeight: '400px' }}
                        />

                        <div style={{ marginTop: '2rem', display: 'flex', gap: '1rem', justifyContent: 'flex-end' }}>
                            <button className="button button-secondary" onClick={() => {
                                if (window.confirm('Are you sure you want to exit? Your progress will be lost.')) {
                                    dispatch({ type: 'SET_PAGE', payload: 'landing' });
                                }
                            }}>
                                Exit Exam
                            </button>
                            <button className="button button-danger" onClick={() => dispatch({ type: 'SUBMIT_LEVEL4_EXAM' })}>
                                Submit Exam
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // RULE BANK PAGE
        // ============================================================================

        function RuleBankComponent({ state, dispatch }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedTopic, setSelectedTopic] = useState('all');

            // Get unique topics from rules
            const topics = ['all', ...new Set(rules.map(r => {
                // Extract topic from rule name or description
                if (r.name.includes('Commerce Clause')) return 'Commerce Clause';
                if (r.name.includes('Scrutiny') || r.name.includes('Discrimination') || r.name.includes('Equality') || r.name.includes('Protection')) return 'Equal Protection & Scrutiny';
                if (r.name.includes('Review')) return 'Judicial Review';
                if (r.name.includes('Necessary and Proper')) return 'Enumerated Powers';
                if (r.name.includes('Amendment') || r.name.includes('Slavery') || r.name.includes('Desegregation') || r.name.includes('Brown')) return 'Reconstruction & Civil Rights';
                if (r.name.includes('State Action')) return 'State Action Doctrine';
                return 'Constitutional Foundations';
            }))];

            // Filter rules based on search and topic
            const filteredRules = rules.filter(r => {
                const matchesSearch = r.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    r.caseId.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    r.description.toLowerCase().includes(searchTerm.toLowerCase());

                let ruleCategory = 'Constitutional Foundations';
                if (r.name.includes('Commerce Clause')) ruleCategory = 'Commerce Clause';
                if (r.name.includes('Scrutiny') || r.name.includes('Discrimination') || r.name.includes('Equality') || r.name.includes('Protection')) ruleCategory = 'Equal Protection & Scrutiny';
                if (r.name.includes('Review')) ruleCategory = 'Judicial Review';
                if (r.name.includes('Necessary and Proper')) ruleCategory = 'Enumerated Powers';
                if (r.name.includes('Amendment') || r.name.includes('Slavery') || r.name.includes('Desegregation') || r.name.includes('Brown')) ruleCategory = 'Reconstruction & Civil Rights';
                if (r.name.includes('State Action')) ruleCategory = 'State Action Doctrine';

                const matchesTopic = selectedTopic === 'all' || ruleCategory === selectedTopic;

                return matchesSearch && matchesTopic;
            });

            return (
                <div className="container">
                    <div className="breadcrumb">
                        <span onClick={() => dispatch({ type: 'SET_PAGE', payload: 'landing' })} style={{ cursor: 'pointer', color: '#4a90d9' }}>Dashboard</span>
                        <span>/</span>
                        <span>Rule Bank</span>
                    </div>

                    <div className="header" style={{ marginBottom: '2rem' }}>
                        <h1 style={{ color: '#4a90d9', marginBottom: '1rem' }}>Constitutional Law Rule Bank</h1>
                        <p>Reference all major doctrines, cases, and principles</p>
                    </div>

                    {/* Search Bar */}
                    <div style={{ marginBottom: '2rem' }}>
                        <input
                            type="text"
                            className="fill-blank"
                            placeholder="Search rules by name, case, or description..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            style={{ marginBottom: '1rem' }}
                        />
                    </div>

                    {/* Topic Filter */}
                    <div style={{ marginBottom: '2rem', display: 'flex', flexWrap: 'wrap', gap: '0.5rem' }}>
                        {topics.map(topic => (
                            <button
                                key={topic}
                                className={`button ${selectedTopic === topic ? 'button-primary' : 'button-secondary'}`}
                                onClick={() => setSelectedTopic(topic)}
                                style={{ fontSize: '0.9rem', padding: '0.5rem 1rem' }}
                            >
                                {topic.charAt(0).toUpperCase() + topic.slice(1)}
                            </button>
                        ))}
                    </div>

                    {/* Rules Display */}
                    {filteredRules.length === 0 ? (
                        <div style={{ textAlign: 'center', padding: '3rem', color: '#999' }}>
                            <p>No rules found matching your search.</p>
                        </div>
                    ) : (
                        <div style={{ marginBottom: '2rem' }}>
                            {filteredRules.map((rule, idx) => (
                                <div key={rule.id} className="card" style={{ marginBottom: '1.5rem' }}>
                                    <h3 style={{ color: '#4a90d9', marginBottom: '0.5rem' }}>
                                        {rule.name}
                                    </h3>
                                    <div style={{ color: '#999', fontSize: '0.95rem', marginBottom: '1rem' }}>
                                        <strong>{rule.caseId}</strong>
                                    </div>

                                    <p style={{ marginBottom: '1rem', color: '#ccc' }}>
                                        {rule.description}
                                    </p>

                                    {rule.elements && rule.elements.length > 0 && (
                                        <div style={{ marginBottom: '1rem' }}>
                                            <h4 style={{ color: '#7bc0ff', marginBottom: '0.5rem' }}>Key Elements:</h4>
                                            <ul className="issue-list">
                                                {rule.elements.map((elem, idx) => (
                                                    <li key={idx}>{elem}</li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}

                                    {rule.keyTension && (
                                        <div style={{ marginBottom: '1rem' }}>
                                            <h4 style={{ color: '#ffc107', marginBottom: '0.5rem' }}>Key Tension:</h4>
                                            <p style={{ color: '#aaa' }}>{rule.keyTension}</p>
                                        </div>
                                    )}

                                    {rule.triggerFacts && rule.triggerFacts.length > 0 && (
                                        <div style={{ marginBottom: '1rem' }}>
                                            <h4 style={{ color: '#7bc0ff', marginBottom: '0.5rem' }}>Trigger Facts:</h4>
                                            <ul className="issue-list">
                                                {rule.triggerFacts.map((fact, idx) => (
                                                    <li key={idx}>{fact}</li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}

                                    {rule.analogy && (
                                        <div className="analogy-box">
                                            <div className="analogy-icon">💡</div>
                                            <div className="analogy-content">
                                                <div className="analogy-label">Remember</div>
                                                <p>{rule.analogy}</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Back Button */}
                    <div style={{ marginTop: '2rem', textAlign: 'center' }}>
                        <button
                            className="button button-secondary"
                            onClick={() => dispatch({ type: 'SET_PAGE', payload: 'landing' })}
                        >
                            ← Back to Dashboard
                        </button>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // RENDER APP
        // ============================================================================

        ReactDOM.createRoot(document.getElementById('root')).render(<ConLawStudyPlatform />);
    </script>
</body>
</html>
