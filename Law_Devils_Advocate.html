<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devil's Advocate - Law School Counter-Argument Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0b12;
            --bg-surface: #12131f;
            --bg-surface-hover: #16172a;
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --accent-primary: #3b82f6;
            --accent-secondary: #10b981;
            --accent-danger: #ef4444;
            --accent-warning: #f59e0b;
            --accent-gold: #fbbf24;
            --border-color: #2d2e42;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-top: 12px;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .settings-btn:hover {
            background-color: var(--bg-surface);
            color: var(--accent-primary);
        }

        /* Course Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .tab {
            padding: 10px 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            margin-bottom: -13px;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
        }

        /* Main Game Area */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Scenario Counter */
        .scenario-counter {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Score Tracking */
        .score-bar {
            display: flex;
            gap: 16px;
            justify-content: space-around;
            padding: 12px 16px;
            background-color: var(--bg-surface);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 12px;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .score-label {
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.5px;
        }

        .score-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .streak-icon {
            color: var(--accent-secondary);
            font-size: 14px;
        }

        /* Fact Pattern Card */
        .fact-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            animation: slideInDown 0.3s ease;
        }

        .card-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .fact-text {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        /* Given Argument Card */
        .argument-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(59, 130, 246, 0.05));
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            animation: slideInDown 0.3s ease 0.1s both;
        }

        .argument-card::before {
            content: '"';
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 32px;
            color: var(--accent-primary);
            opacity: 0.3;
        }

        .argument-card::after {
            content: '"';
            position: absolute;
            bottom: 4px;
            right: 12px;
            font-size: 32px;
            color: var(--accent-primary);
            opacity: 0.3;
        }

        .argument-text {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-primary);
            position: relative;
            z-index: 1;
            padding: 0 8px;
        }

        /* Counter Argument Chips */
        .chips-section {
            animation: slideInUp 0.3s ease 0.2s both;
        }

        .chips-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
            display: block;
        }

        .chips-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chip {
            padding: 10px 14px;
            border: 2px solid var(--border-color);
            background-color: var(--bg-surface);
            color: var(--text-primary);
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .chip:hover {
            background-color: var(--bg-surface-hover);
            border-color: var(--accent-primary);
        }

        .chip.selected {
            background-color: rgba(59, 130, 246, 0.15);
            border-color: var(--accent-gold);
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.2);
        }

        /* Chip States */
        .chip.correct {
            background-color: rgba(16, 185, 129, 0.15);
            border-color: var(--accent-secondary);
            color: var(--accent-secondary);
            animation: pulse 0.6s ease-out;
        }

        .chip.trap {
            background-color: rgba(239, 68, 68, 0.15);
            border-color: var(--accent-danger);
            color: var(--accent-danger);
            animation: shake 0.4s ease-out;
        }

        .chip.missed {
            background-color: rgba(251, 191, 36, 0.1);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            animation: pulse 0.8s ease-out infinite;
        }

        /* Countdown Overlay */
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 11, 18, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        .countdown-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(var(--accent-primary) 0deg, var(--accent-primary) var(--progress), var(--border-color) var(--progress), var(--border-color) 360deg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-primary);
            position: relative;
        }

        .countdown-text {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 280px;
        }

        /* Buttons */
        .button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background-color: var(--accent-primary);
            color: white;
            width: 100%;
            margin-top: auto;
        }

        .btn-primary:hover {
            background-color: #2563eb;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:disabled {
            background-color: var(--border-color);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
        }

        .btn-secondary:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        /* Settings Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 11, 18, 0.7);
            display: flex;
            align-items: flex-end;
            z-index: 50;
            animation: fadeIn 0.2s ease;
        }

        .modal {
            background-color: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            border-radius: 16px 16px 0 0;
            padding: 24px;
            width: 100%;
            max-width: 520px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideInUp 0.3s ease;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .toggle {
            width: 44px;
            height: 24px;
            background-color: var(--border-color);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toggle.active {
            background-color: var(--accent-primary);
        }

        .toggle-knob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .toggle.active .toggle-knob {
            left: 22px;
        }

        /* Results Screen */
        .results-screen {
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .results-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .results-score {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 20px;
        }

        .results-detail {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }

        .detail-label {
            color: var(--text-secondary);
        }

        .detail-value {
            font-weight: 600;
        }

        .detail-value.correct {
            color: var(--accent-secondary);
        }

        .detail-value.trap {
            color: var(--accent-danger);
        }

        /* Model Answer Card */
        .model-answer-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            animation: slideInUp 0.4s ease;
        }

        .model-answer-title {
            font-size: 12px;
            color: var(--accent-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .model-answer-text {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-primary);
            font-style: italic;
        }

        /* Animations */
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-4px);
            }
            75% {
                transform: translateX(4px);
            }
        }

        /* Loading State */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .header-title {
                font-size: 20px;
            }

            .tabs {
                gap: 4px;
            }

            .tab {
                padding: 8px 12px;
                font-size: 12px;
            }

            .chips-grid {
                gap: 8px;
            }

            .chip {
                font-size: 12px;
                padding: 8px 12px;
            }

            .results-title {
                font-size: 28px;
            }

            .results-score {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">Devil's Advocate</div>
            <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
        </div>

        <!-- Course Tabs -->
        <div class="tabs">
            <button class="tab active" data-course="property">Property</button>
            <button class="tab" data-course="conlaw">Con Law</button>
            <button class="tab" data-course="criminal">Criminal</button>
        </div>

        <!-- Game Area -->
        <div class="game-area" id="gameArea">
            <!-- Will be populated by JavaScript -->
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay hidden" id="settingsModal">
        <div class="modal">
            <div class="modal-title">
                Settings
                <button class="close-btn" id="closeSettings">✕</button>
            </div>
            <div class="setting-item">
                <label>Reflection Countdown</label>
                <div class="toggle active" id="countdownToggle">
                    <div class="toggle-knob"></div>
                </div>
            </div>
            <div class="setting-item">
                <label>"Say It Out Loud" Prompt</label>
                <div class="toggle active" id="sayOutLoudToggle">
                    <div class="toggle-knob"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Game Data
        const gameData = {
            property: [
                {
                    id: 1,
                    title: "Adverse Possession Dispute",
                    fact: "Sam built a fence 3 feet onto Nina's land 22 years ago. Sam maintained the area, planted a garden, and paid no additional taxes. Nina just discovered the encroachment.",
                    given: "Sam cannot claim adverse possession because he never paid taxes on my land, and the encroachment was only 3 feet, which is too minor to constitute 'actual possession.'",
                    correctCounters: [
                        "Adverse possession doesn't require tax payment in most jurisdictions",
                        "The fence plus garden constitutes actual and exclusive possession",
                        "22 years exceeds most state statutory periods",
                        "Open and notorious—the fence was clearly visible",
                        "Continuous use for the entire 22-year period"
                    ],
                    traps: [
                        "Sam had permission from Nina",
                        "Sam must have had a deed to claim adverse possession",
                        "Adverse possession requires good faith belief of ownership"
                    ],
                    modelAnswer: "Respondent's argument fails on multiple fronts. First, adverse possession does not require tax payment in most jurisdictions—this is a common misconception. Second, the fence and garden together constitute actual and exclusive possession under the applicable standard. Third, Sam's 22 years of continuous, open, and notorious use exceeds the statutory period in virtually all states. The size of the encroachment is immaterial; actual possession can apply to a small parcel. Therefore, all elements for adverse possession are satisfied, and the property interest vests in Sam despite the initial encroachment."
                },
                {
                    id: 2,
                    title: "Landlord-Tenant: Habitability",
                    fact: "Maria's apartment has severe mold in the bedroom. She notified her landlord Tom in writing 3 months ago. Tom ignored it. Maria stopped paying rent last month.",
                    given: "Maria breached the lease by withholding rent. The implied warranty of habitability doesn't apply because Maria should have moved out if conditions were truly uninhabitable.",
                    correctCounters: [
                        "Rent withholding is a recognized tenant remedy in most jurisdictions",
                        "Tenant doesn't have to vacate to invoke implied warranty of habitability",
                        "Mold constitutes substantial impairment of habitability",
                        "Landlord received written notice and failed to act",
                        "Modern constructive eviction doctrine doesn't require vacating first"
                    ],
                    traps: [
                        "Maria waived the warranty by signing the lease",
                        "Landlord has no duty to repair under common law",
                        "Maria can only sue for damages, not withhold rent"
                    ],
                    modelAnswer: "The landlord's argument misconstrues modern habitability law. Maria is entitled to invoke the implied warranty of habitability, which cannot be waived by lease terms. She is not required to vacate to exercise this right—rent withholding is a recognized remedy. Mold in a bedroom clearly constitutes a substantial impairment of habitability. The landlord's three-month period of knowing non-response to written notice demonstrates willful breach. Under the modern approach adopted by most jurisdictions, Maria's rent withholding is a proper exercise of her remedy and does not itself constitute a breach."
                },
                {
                    id: 3,
                    title: "Nuisance Balancing",
                    fact: "A cement factory has operated for 30 years. A new housing development was built nearby 5 years ago. Homeowners sue for private nuisance due to dust and noise.",
                    given: "The factory's dust and noise substantially interfere with our use and enjoyment of property. The interference is unreasonable under the Restatement balancing test.",
                    correctCounters: [
                        "Coming to the nuisance defense—homeowners moved near existing factory",
                        "Factory has 30-year priority of use",
                        "Economic impact of shutting factory exceeds residential harm",
                        "Damages may be appropriate rather than injunction",
                        "Zoning may have permitted industrial use in that area"
                    ],
                    traps: [
                        "Nuisance claims can't be brought against lawful businesses",
                        "Homeowners assumed the risk by purchasing the property",
                        "Factory has a prescriptive right to pollute"
                    ],
                    modelAnswer: "Under the Restatement balancing test, the coming to the nuisance defense is material. The cement factory's 30-year operation establishes both priority in time and reliance. The homeowners chose to develop in proximity to an established industrial use. The Boomer approach, adopted by several jurisdictions, recognizes that the factory's economic significance may outweigh the residential harm. Additionally, courts often grant damages rather than injunctive relief in such circumstances. The zoning classification at the time of the factory's operation may also be relevant to the reasonableness inquiry."
                },
                {
                    id: 4,
                    title: "Easement Dispute",
                    fact: "For 25 years, the Johnson family used a path across the Smith property to reach the lake. The path was clearly worn and visible. The Smiths never objected. New buyer of Smith property blocks the path.",
                    given: "I purchased this property with no notice of any easement. There's no recorded easement, and I'm a bona fide purchaser.",
                    correctCounters: [
                        "Prescriptive easement doesn't require recording in the deed registry",
                        "25 years of open use exceeds the statutory period in most states",
                        "Buyer had inquiry notice from the visibly worn path",
                        "Prescriptive easement vested before the new purchase",
                        "All statutory elements are satisfied: open, notorious, continuous, without permission"
                    ],
                    traps: [
                        "Verbal permission was implied by the Smiths' silence",
                        "Easements must be in writing under the Statute of Frauds",
                        "Path is too informal or temporary to create a legal interest"
                    ],
                    modelAnswer: "A prescriptive easement can arise without a recorded deed. The Johnson family's 25 years of open, notorious, continuous use without permission satisfies all statutory requirements. The path's visible wear constitutes constructive notice to any purchaser—the new buyer cannot claim bona fide purchaser status when the easement is manifest on the property. The easement vested before the new purchase occurred, and subsequent purchasers take subject to visible easements, whether or not they are recorded."
                },
                {
                    id: 5,
                    title: "Covenant Enforcement",
                    fact: "A subdivision's CC&Rs require all homes to be single-family residential. Owner Jones wants to convert his home to a bed-and-breakfast. Other homeowners object.",
                    given: "The neighborhood character has changed—several homes run home offices, and the B&B would increase property values. The covenant should be unenforceable under the changed conditions doctrine.",
                    correctCounters: [
                        "Home offices are fundamentally different from commercial lodging",
                        "B&B brings strangers and increased traffic into residential area",
                        "Covenant touches and concerns the land",
                        "Changed conditions doctrine requires pervasive change, not isolated examples",
                        "Other homeowners relied on covenant when purchasing"
                    ],
                    traps: [
                        "CC&Rs are unconstitutional restrictions on property rights",
                        "Owner has a constitutional right to use property commercially",
                        "Covenants expire automatically after 20 years"
                    ],
                    modelAnswer: "The changed conditions doctrine does not apply here. While some homeowners operate home offices, this is a fundamentally different use than operating a bed-and-breakfast open to the public. The doctrine requires a pervasive change in the neighborhood character, not merely a few exceptions. Additionally, a B&B creates continuous transient occupancy, substantially increasing traffic and use intensity—precisely the type of commercial activity the covenant restricts. Other homeowners relied on this covenant when purchasing, and enforcement protects their reasonable expectations."
                },
                {
                    id: 6,
                    title: "Recording Act Priority",
                    fact: "Owner sells Blackacre to A on Monday (A doesn't record). Owner then sells same land to B on Wednesday (B records immediately). A records on Thursday. This is a race-notice jurisdiction.",
                    given: "I purchased first in time and should prevail. My deed was validly executed before B's purchase.",
                    correctCounters: [
                        "Race-notice requires BOTH recording first AND without notice",
                        "B recorded first; B likely had no actual notice since A hadn't recorded",
                        "B qualifies as bona fide purchaser for value without notice",
                        "First-in-time controls only under common law, not race-notice statute",
                        "A's failure to record promptly is material under race-notice rule"
                    ],
                    traps: [
                        "A's deed is void because it wasn't recorded immediately",
                        "B committed fraud by buying property A already owned",
                        "Race-notice always favors whoever records first regardless of notice"
                    ],
                    modelAnswer: "In a race-notice jurisdiction, A prevails only if A both records first and has priority in time without notice to the later purchaser. B recorded before A, even though A had priority in time. Critically, B likely had no notice of A's interest since A failed to record. B qualifies as a bona fide purchaser for value. Under race-notice statutes, B's earlier recording and good faith without notice defeat A's claims, despite the later execution date of B's deed. A's delay in recording is fatal under this recording system."
                },
                {
                    id: 7,
                    title: "Regulatory Takings",
                    fact: "City passes new wetlands ordinance preventing any development on properties containing wetlands. Owner's entire 50-acre parcel is classified as wetlands, reducing its value from $2M to $50K.",
                    given: "This is a valid exercise of police power to protect the environment. No compensation is required because the regulation serves a legitimate public purpose.",
                    correctCounters: [
                        "Lucas per se taking—regulation eliminates all economically beneficial use",
                        "97.5% value reduction far exceeds Penn Central balancing threshold",
                        "Owner had investment-backed expectations before the ordinance",
                        "Police power has limits when it effectively appropriates private property",
                        "Denominating the entire 50 acres is the proper parcel for analysis"
                    ],
                    traps: [
                        "Any regulation reducing property value constitutes a taking",
                        "The city must prove the land has no value whatsoever",

                    modelAnswer: "An honest mistake of fact negates the required mens rea for larceny. Larceny requires specific intent to permanently deprive ANOTHER of his or her property. If Defendant honestly (even if unreasonably) believed the coat was his own, he lacked intent to take property of another. The mistake negates the trespassory taking element—Defendant did not intend to take someone else's coat. Under the MPC, even an unreasonable honest belief regarding ownership is a defense if the statute requires a culpable mental state. While the prosecution might argue Defendant should have checked the label, a genuine belief in ownership (however careless) negates the specific intent to deprive another. The coat-check context supports a claim of mistake; identical coats create legitimate confusion. No larceny conviction is warranted absent proof that Defendant knew or should have known the coat belonged to another."
                },
                {
                    id: 10,
                    title: "Depraved Heart Murder",
                    fact: "Defendant fired a gun into an occupied apartment from outside, killing a resident. Defendant claims he was 'just trying to scare' someone who owed him money and didn't aim at anyone.",
                    given: "Defendant had no intent to kill. He only intended to frighten. This is at most reckless endangerment, not murder.",
                    correctCounters: [
                        "Depraved heart murder doesn't require intent to kill",
                        "Requires extreme recklessness manifesting wicked, depraved indifference to human life",
                        "Firing into occupied apartment is textbook depraved heart",
                        "Awareness that occupied apartment could contain people = conscious disregard",
                        "'Just trying to scare' shows awareness of people inside"
                    ],
                    traps: [
                        "Scaring someone is never murder",
                        "Intent to frighten is same as negligence",
                        "Depraved heart requires planning"
                    ],
                    modelAnswer: "This is depraved heart murder. Depraved heart murder requires neither intent to kill nor premeditation; it requires extreme recklessness manifesting willful and wicked indifference to human life. Firing a gun into an occupied apartment, regardless of subjective intent, demonstrates extreme recklessness. Defendant's awareness that people occupied the apartment ('just trying to scare') proves conscious disregard of extreme risk of death. Depraved heart liability is established when the defendant knows of extreme risk and acts with reckless abandon. Defendant's stated intent to frighten—implying knowledge of occupants—heightens the recklessness from simple to extreme. The act of firing a weapon into a dwelling is inherently reckless relative to human life. This is murder, not mere reckless endangerment. The subjective intent to scare rather than kill is irrelevant to depraved heart liability."
                }
            ]
        };

        // Game State
        let currentCourse = 'property';
        let currentScenarioIndex = 0;
        let score = 0;
        let streak = 0;
        let selectedChips = new Set();
        let countdownEnabled = true;
        let sayOutLoudEnabled = true;
        let roundComplete = false;

        // DOM Elements
        const gameArea = document.getElementById('gameArea');
        const tabs = document.querySelectorAll('.tab');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettings = document.getElementById('closeSettings');
        const countdownToggle = document.getElementById('countdownToggle');
        const sayOutLoudToggle = document.getElementById('sayOutLoudToggle');

        // Event Listeners
        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                if (!roundComplete) {
                    tabs.forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCourse = e.target.dataset.course;
                    currentScenarioIndex = 0;
                    selectedChips.clear();
                    renderGame();
                }
            });
        });

        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('hidden');
        });

        closeSettings.addEventListener('click', () => {
            settingsModal.classList.add('hidden');
        });

        countdownToggle.addEventListener('click', () => {
            countdownEnabled = !countdownEnabled;
            countdownToggle.classList.toggle('active');
        });

        sayOutLoudToggle.addEventListener('click', () => {
            sayOutLoudEnabled = !sayOutLoudEnabled;
            sayOutLoudToggle.classList.toggle('active');
        });

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.add('hidden');
            }
        });

        // Main Game Render
        function renderGame() {
            const scenarios = gameData[currentCourse];
            const scenario = scenarios[currentScenarioIndex];

            let html = `
                <div class="scenario-counter">Scenario ${currentScenarioIndex + 1} of ${scenarios.length}</div>

                <div class="score-bar">
                    <div class="score-item">
                        <div class="score-label">Score</div>
                        <div class="score-value">${score}</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">Streak</div>
                        <div class="score-value"><span class="streak-icon">🔥</span> ${streak}</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">Accuracy</div>
                        <div class="score-value">${calculateAccuracy()}%</div>
                    </div>
                </div>

                <div class="fact-card">
                    <span class="card-label">Fact Pattern</span>
                    <div class="fact-text">${scenario.fact}</div>
                </div>

                <div class="argument-card">
                    <span class="card-label">Given Argument</span>
                    <div class="argument-text">${scenario.given}</div>
                </div>

                <div class="chips-section">
                    <span class="card-label">Select Your Counter-Arguments (${scenario.correctCounters.length} correct, ${scenario.traps.length} traps)</span>
                    <div class="chips-grid" id="chipsGrid">
            `;

            // Shuffle all options
            const allOptions = [...scenario.correctCounters, ...scenario.traps].sort(() => Math.random() - 0.5);

            allOptions.forEach((option, idx) => {
                const isSelected = selectedChips.has(option);
                html += `
                    <button class="chip ${isSelected ? 'selected' : ''}" data-option="${option}">
                        ${option}
                    </button>
                `;
            });

            html += `
                    </div>
                </div>

                <button class="button btn-primary" id="submitBtn">Submit Answer</button>
            `;

            gameArea.innerHTML = html;

            // Attach chip click listeners
            document.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const option = chip.dataset.option;
                    if (selectedChips.has(option)) {
                        selectedChips.delete(option);
                        chip.classList.remove('selected');
                    } else {
                        selectedChips.add(option);
                        chip.classList.add('selected');
                    }
                });
            });

            // Submit button
            document.getElementById('submitBtn').addEventListener('click', () => {
                if (sayOutLoudEnabled) {
                    showSayOutLoudPrompt();
                } else if (countdownEnabled) {
                    showCountdown();
                } else {
                    evaluateRound();
                }
            });
        }

        function showSayOutLoudPrompt() {
            const content = document.querySelector('.game-area');
            content.innerHTML = `
                <div class="fact-card" style="text-align: center; margin-top: 40px;">
                    <div style="font-size: 24px; margin-bottom: 20px;">📣</div>
                    <div class="card-label">Before Submitting</div>
                    <div class="fact-text">Please state out loud why each of your selected points counters the given argument.</div>
                    <div class="fact-text" style="margin-top: 20px; font-size: 13px; color: var(--text-secondary);">This helps activate deeper legal reasoning.</div>
                    <button class="button btn-primary" id="readyBtn" style="margin-top: 40px;">Ready to Submit</button>
                </div>
            `;

            document.getElementById('readyBtn').addEventListener('click', () => {
                if (countdownEnabled) {
                    showCountdown();
                } else {
                    evaluateRound();
                }
            });
        }

        function showCountdown() {
            const overlay = document.createElement('div');
            overlay.className = 'countdown-overlay';
            let seconds = 10;

            const updateCountdown = () => {
                const progress = ((10 - seconds) / 10) * 360;
                overlay.innerHTML = `
                    <div class="countdown-circle" style="--progress: ${progress}deg">${seconds}</div>
                    <div class="countdown-text">Read your selections again.<br>Are you sure?</div>
                `;

                if (seconds > 0) {
                    seconds--;
                    setTimeout(updateCountdown, 1000);
                } else {
                    overlay.remove();
                    evaluateRound();
                }
            };

            document.body.appendChild(overlay);
            updateCountdown();

            overlay.addEventListener('click', () => {
                overlay.remove();
                evaluateRound();
            });
        }

        function evaluateRound() {
            const scenarios = gameData[currentCourse];
            const scenario = scenarios[currentScenarioIndex];

            let correctCount = 0;
            let trapCount = 0;
            let missedCount = 0;
            let roundScore = 0;

            // Check correct counters
            scenario.correctCounters.forEach(counter => {
                if (selectedChips.has(counter)) {
                    correctCount++;
                    roundScore += 10;
                }
            });

            // Check for traps
            scenario.traps.forEach(trap => {
                if (selectedChips.has(trap)) {
                    trapCount++;
                    roundScore -= 5;
                }
            });

            // Check missed
            missedCount = scenario.correctCounters.length - correctCount;

            // Bonus for perfect
            if (trapCount === 0 && missedCount === 0) {
                roundScore += 20;
            }

            // Update score and streak
            if (trapCount === 0 && missedCount === 0) {
                streak++;
            } else {
                streak = 0;
            }

            score += roundScore;
            roundComplete = true;

            showResults(scenario, correctCount, trapCount, missedCount, roundScore);
        }

        function showResults(scenario, correctCount, trapCount, missedCount, roundScore) {
            const allOptions = [...scenario.correctCounters, ...scenario.traps].sort(() => Math.random() - 0.5);

            let html = `
                <div class="results-screen">
                    <div class="results-title">${trapCount === 0 && missedCount === 0 ? '💯 Perfect!' : trapCount === 0 ? '✓ Solid' : '⚠️ Review'}</div>
                    <div class="results-score">${roundScore > 0 ? '+' : ''}${roundScore}</div>

                    <div class="results-detail">
                        <div class="detail-row">
                            <div class="detail-label">Correct Points</div>
                            <div class="detail-value correct">${correctCount}/${scenario.correctCounters.length}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Traps Selected</div>
                            <div class="detail-value trap">${trapCount}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Missed Points</div>
                            <div class="detail-value">${missedCount}</div>
                        </div>
                    </div>

                    <div class="chips-grid" id="resultChips">
            `;

            allOptions.forEach(option => {
                if (scenario.correctCounters.includes(option)) {
                    const isSelected = selectedChips.has(option);
                    const chipClass = isSelected ? 'chip correct' : 'chip missed';
                    html += `<div class="${chipClass}">${option}</div>`;
                } else {
                    const isSelected = selectedChips.has(option);
                    const chipClass = isSelected ? 'chip trap' : 'chip';
                    html += `<div class="${chipClass}">${option}</div>`;
                }
            });

            html += `
                    </div>

                    <div class="model-answer-card">
                        <div class="model-answer-title">Model Counter-Argument (Exam Prose)</div>
                        <div class="model-answer-text">${scenario.modelAnswer}</div>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 24px;">
                        <button class="button btn-secondary" id="prevBtn" style="flex: 1;">← Previous</button>
                        <button class="button btn-primary" id="nextBtn" style="flex: 1;">Next Scenario →</button>
                    </div>
                </div>
            `;

            gameArea.innerHTML = html;

            document.getElementById('nextBtn').addEventListener('click', () => {
                const scenarios = gameData[currentCourse];
                if (currentScenarioIndex < scenarios.length - 1) {
                    currentScenarioIndex++;
                    selectedChips.clear();
                    roundComplete = false;
                    renderGame();
                } else {
                    showCourseComplete();
                }
            });

            document.getElementById('prevBtn').addEventListener('click', () => {
                if (currentScenarioIndex > 0) {
                    currentScenarioIndex--;
                    selectedChips.clear();
                    roundComplete = false;
                    renderGame();
                }
            });
        }

        function showCourseComplete() {
            gameArea.innerHTML = `
                <div class="results-screen" style="margin-top: 60px;">
                    <div class="results-title">Course Complete! 🎓</div>
                    <div class="results-score">${score}</div>
                    <div class="results-detail">
                        <div class="detail-row">
                            <div class="detail-label">Final Streak</div>
                            <div class="detail-value">${streak}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Accuracy</div>
                            <div class="detail-value">${calculateAccuracy()}%</div>
                        </div>
                    </div>
                    <button class="button btn-primary" id="reviewBtn" style="margin-top: 40px; width: 100%;">Review Another Course</button>
                </div>
            `;

            document.getElementById('reviewBtn').addEventListener('click', () => {
                score = 0;
                streak = 0;
                currentScenarioIndex = 0;
                selectedChips.clear();
                roundComplete = false;
                renderGame();
            });
        }

        function calculateAccuracy() {
            // Placeholder accuracy calculation
            return streak > 0 ? Math.round((streak / (currentScenarioIndex + 1)) * 100) : 0;
        }

        // Initialize
        renderGame();
    </script>
</body>
</html>
