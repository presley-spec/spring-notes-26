    doctrine: 'A LIFE ESTATE grants ownership for the duration of someone\'s life: "To A for A\'s life." A (the life tenant) can possess, use, and enjoy the property for their lifetime. But A cannot devise it in a will—it ends at death. Upon A\'s death, the property passes to the next estate holder (remainder or reversion). Life Estate pur autre vie: "To A for B\'s life" (tied to B\'s life, not A\'s—exotic but testable). Life tenants have a duty NOT TO COMMIT WASTE: cannot strip-mine, burn forests, or damage the property beyond normal wear and tear. Both permissive waste (letting deteriorate) and affirmative waste (actively damaging) are prohibited. A life tenant is entitled to rents and profits during their lifetime.',

  {
    id: 36,
    name: 'Future Interests - Vested & Contingent',
    doctrine: 'FUTURE INTERESTS are ownership rights that will become possessory later. Types: (1) VESTED REMAINDER—to an ascertainable person, with no condition precedent (certain to vest). "To A for life, then to B." B has a vested remainder (will definitely get it). (2) CONTINGENT REMAINDER—to an ascertainable or unascertainable person, with a condition precedent. "To A for life, then to B if B graduates." B\'s remainder is contingent on graduating. (3) EXECUTORY INTEREST—divests (takes from) another person\'s interest when a condition occurs. "To A, but if A turns to dark side, then to B." B has a shifting executory interest. VESTED REMAINDERS SUBJECT TO OPEN/DIVESTMENT are possible. The Rule Against Perpetuities applies to some (contingent remainders, executory interests) but not others (vested remainders, reversions, possibilities of reverter).',

    analogy: 'Star Wars - Skywalker Succession: Anakin creates: "To Padmé for life, then to Luke." Padmé: life estate. She possesses the property now, for her lifetime. Luke: vested remainder. He is ascertainable (we know who he is), there is no condition precedent, and he will definitely get the property when Padmé dies. Change it: "To Padmé for life, then to Luke if he becomes a Jedi." Luke\'s remainder is now contingent—there is a condition precedent (becoming a Jedi) that must be satisfied. If Padmé dies before Luke becomes a Jedi, the property reverts to Anakin\'s estate. One more: "To Padmé for life, then to Luke, but if Luke turns to the dark side, then to Leia." Luke has a vested remainder subject to divestment. Leia has a shifting executory interest—it "shifts" from Luke to Leia if the condition occurs.'

  {
    id: 39,
    name: 'Rule Against Perpetuities - RAP',
    doctrine: 'The Rule Against Perpetuities (RAP) voids contingent future interests that are not certain to vest or fail within 21 years after a "life in being" at the time the interest was created. Policy: prevent "dead hand control" where past owners\' conditions tie up property indefinitely. Measuring lives: people alive at creation who control whether the condition is satisfied. Test: apply the "fertile octogenarian" problem—ask "is there any possible scenario where the condition fails to occur within 21 years after the measuring life dies?" If yes, RAP is violated. RAP applies to: contingent remainders, executory interests, vested remainders subject to open. RAP does NOT apply to: vested remainders (not subject to open), reversions, possibilities of reverter, rights of re-entry.',
    elements: ['Must vest/fail within 21 years after measuring life', 'Applies to contingent remainders/executory interests', 'Does not apply to vested remainders/reversions', 'Fertile octogenarian problem', 'Dynasty/dead hand control prevention'],
    keyCase: 'Multiple RAP sources',
    analogy: 'NBA: RAP as draft pick time limit. The Rule Against Perpetuities says a contingent future interest is invalid unless it must vest or fail within 21 years after a life in being at the time the interest was created. The policy: do not let property be tied up by conditions that might not resolve for centuries. The NBA does not allow teams to trade picks more than 7 years into the future—that is the NBA\'s version of RAP. If the Blazers could trade a 2085 first-round pick (contingent on the team existing and the pick conveying), that interest might never vest, and it ties up the franchise\'s assets indefinitely. The rule exists to prevent "dead hand control"—past decisions strangling future flexibility.'
  },

    id: 41,
    name: 'Four Types of Tenancies',
    doctrine: '(1) TENANCY FOR A TERM OF YEARS: Fixed duration (e.g., one-year lease, month-long lease). Starts on specified date, ends on specified date. Automatically terminates without notice. "Lease from Jan 1 to Dec 31, 2026." (2) PERIODIC TENANCY (Month-to-Month, Year-to-Year): No fixed end date; auto-renews every period. Either party can terminate with proper notice. "To pay $1,200/month" with no end date. (3) TENANCY AT WILL: No fixed term, no automatic renewal. Either party can terminate anytime (sometimes requires notice). Extremely precarious for tenant. (4) TENANCY AT SUFFERANCE: Holdover tenant. Lease expired, but tenant remains. Tenant has no legal right to be there (not technically a trespasser until eviction), but landlord can evict or hold tenant to new terms.',

                        rubric: 'Issue ID: Joint tenancy survivorship, devise attempt, forced partition. Law: Survivorship operates by operation of law; devise is ineffective. Analysis: Apply four unities test, explain why Alice\'s interest vanished at death, evaluate Charles\'s equitable claims (likely none). Application to partition: Bob can likely force sale of remaining interest.',
                        timeLimit: 35
                    },
                    {
                        number: 2,
                        prompt: 'A tenant leased a commercial space for $5,000/month to operate a restaurant. After 6 months: (1) the landlord failed to repair the roof after a major storm, causing water damage to the kitchen equipment, (2) the landlord delayed repairs for 3 months while claiming "weather prevented work," (3) the tenant closed the restaurant and vacated. The landlord sues for breach of lease (unpaid rent for 2 remaining years = $120,000). The tenant counterclaims for constructive eviction and property damage. Analyze both sides.',
                        rubric: 'Issues: Constructive eviction, material breach, damages, reasonable time to vacate, landlord causation. Law: Constructive eviction requires material breach, tenant vacation within reasonable time, landlord fault. Analysis: Water damage is material; 3-month delay likely exceeds reasonable time in some jurisdictions. Apply timing carefully. Damages: Tenant may recover repair costs or consequential losses if proven. Landlord\'s defense: "weather" may not relieve duty to repair timely.',
                        timeLimit: 40
                    },
                    {
                        number: 3,
                        prompt: 'Over the past 18 years, a farmer has openly cultivated a 1-acre section of an adjacent property owner\'s 40-acre parcel without permission. The farmer grows vegetables, maintains fencing, and removes weeds annually. The original owner sold the property 5 years ago to an investor who was unaware of the cultivation. The investor now wants to reclaim the land for residential development. The farmer claims adverse possession. Analyze whether the farmer has acquired title, considering tacking, color of title, and the investor\'s bona fide purchaser status.',
                        rubric: 'Issues: Five elements of adverse possession (actual, open/notorious, exclusive, continuous, adverse), tacking with privity, statutory period sufficiency. Law: All five required; tacking allowed with privity; statutory period varies (assume 7-15 years in jurisdiction). Analysis: Actual (cultivation), open (visible), exclusive (sole use), continuous (18 years > period), adverse (no permission). Original owner\'s sale: Does tacking work if new owner inherits the obligation? Likely yes if farmer\'s possession continued uninterrupted. Conclusion: Farmer likely prevails.',
                        timeLimit: 45
                    }
                ]
            }
        ];

        // ============================================================================
        // REACT COMPONENT
        // ============================================================================

        const PROP_STORAGE_KEY = 'property_study_platform_progress';

        function loadPropProgress() {
            try {
                const saved = localStorage.getItem(PROP_STORAGE_KEY);
                if (saved) return JSON.parse(saved);
            } catch (e) {}
            return null;
        }

        function PropertyLawStudyPlatform() {
            const saved = loadPropProgress();
            const [level, setLevel] = useState(0);
            const [sessionTime, setSessionTime] = useState(saved ? saved.sessionTime || 0 : 0);
            const [breakCount, setBreakCount] = useState(saved ? saved.breakCount || 0 : 0);
            const [mastery, setMastery] = useState(saved ? saved.mastery || 0 : 0);
            const [studyStreak, setStudyStreak] = useState(saved ? saved.studyStreak || 0 : 0);
            const [sessionActive, setSessionActive] = useState(false);
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [answeredQuestions, setAnsweredQuestions] = useState(saved ? saved.answeredQuestions || [] : []);
            const [correctCount, setCorrectCount] = useState(saved ? saved.correctCount || 0 : 0);
            const [questionStreaks, setQuestionStreaks] = useState(saved ? saved.questionStreaks || {} : {});
            const [showModel, setShowModel] = useState(false);
            const [impulsivityCountdown, setImpulsivityCountdown] = useState(null);
            const [examStarted, setExamStarted] = useState(false);
            const [examText, setExamText] = useState('');
            const [ruleSearchFilter, setRuleSearchFilter] = useState('');

            // Auto-save progress to localStorage
            useEffect(() => {
                try {
                    localStorage.setItem(PROP_STORAGE_KEY, JSON.stringify({
                        sessionTime, breakCount, mastery, studyStreak,
                        answeredQuestions, correctCount, questionStreaks
                    }));
                } catch (e) {}
            }, [sessionTime, breakCount, mastery, studyStreak, answeredQuestions, correctCount, questionStreaks]);

            useEffect(() => {
                if (!sessionActive) return;
                const timer = setInterval(() => {
                    setSessionTime(t => t + 1);
                }, 1000);
                return () => clearInterval(timer);
            }, [sessionActive]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const handleStartSession = () => {
                setSessionActive(true);
                setSessionTime(0);
                setImpulsivityCountdown(null);
            };

            const handleEndSession = () => {
                setSessionActive(false);
                setStudyStreak(s => s + 1);
            };

            const handleNextQuestion = () => {
                // Find questions that haven't been mastered yet (streak < 2)
                const unmastered = LEVEL1_QUESTIONS.filter((q, idx) => {
                    const streak = questionStreaks[idx] || 0;
                    return streak < 2;
                });

                if (unmastered.length === 0) {
                    // All questions mastered
                    setMastery(100);
                    alert('Level 1 Mastery Complete! All questions answered correctly twice in a row.');
                    return;
                }

                // Pick a random unmastered question
                const nextIdx = LEVEL1_QUESTIONS.findIndex(q => {
                    const idx = LEVEL1_QUESTIONS.indexOf(q);
                    const streak = questionStreaks[idx] || 0;
                    return streak < 2 && unmastered.includes(q);
                });

                const next = LEVEL1_QUESTIONS[nextIdx];
                setCurrentQuestion({...next, _index: nextIdx});
                setShowModel(false);
            };

            const handleAnswerQuestion = (isCorrect) => {
                const qIdx = currentQuestion._index;
                const currentStreak = questionStreaks[qIdx] || 0;

                if (isCorrect) {
                    // Increment streak
                    const newStreaks = {...questionStreaks};
                    newStreaks[qIdx] = currentStreak + 1;
                    setQuestionStreaks(newStreaks);
                    setCorrectCount(c => c + 1);
                } else {
                    // Reset streak to 0 on wrong answer
                    const newStreaks = {...questionStreaks};
                    newStreaks[qIdx] = 0;
                    setQuestionStreaks(newStreaks);
                }

                // Move to next question
                setTimeout(() => handleNextQuestion(), 300);
            };

            const handleImpulsivityCheck = () => {
                setImpulsivityCountdown(10);
                const countdown = setInterval(() => {
                    setImpulsivityCountdown(c => {
                        if (c <= 1) {
                            clearInterval(countdown);
                            return null;
                        }
                        return c - 1;
                    });
                }, 1000);
            };

            // Landing Screen
            if (level === 0) {
                return (
                    <div className="min-h-screen bg-1a1a2e text-e0e0e0 p-6">
                        <div className="max-w-2xl mx-auto space-y-8">
                            <div className="text-center">
                                <h1 className="text-4xl font-bold text-4ad97a mb-2">Property Law Study Platform</h1>
                                <p className="text-lg">BU Law | Professor Stern | Spring 2026</p>
                            </div>

                            <div className="bg-16213e p-8 rounded-lg space-y-4">
                                <div className="flex items-center justify-between">
                                    <span className="text-xl">Current Level</span>
                                    <span className="text-4xl font-bold text-4ad97a">{level || 'Start'}</span>
                                </div>
                                <div className="progress-bar">
                                    <div className="progress-fill" style={{ width: `${Math.max((level || 0) * 25, 5)}%` }}></div>
                                </div>

                                <div className="grid grid-cols-3 gap-4 text-center py-4">
                                    <div>
                                        <div className="text-2xl font-bold text-4ad97a">{sessionTime ? formatTime(sessionTime) : '0:00'}</div>
                                        <div className="text-sm text-gray-400">Study Time</div>
                                    </div>
                                    <div>
                                        <div className="text-2xl font-bold text-4ad97a">{studyStreak}</div>
                                        <div className="text-sm text-gray-400">Sessions</div>
                                    </div>
                                    <div>
                                        <div className="text-2xl font-bold text-4ad97a">{mastery}%</div>
                                        <div className="text-sm text-gray-400">Mastery</div>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-3">
                                <button
                                    onClick={() => { setLevel(1); handleStartSession(); }}
                                    className="w-full py-3 bg-4ad97a text-1a1a2e font-bold rounded-lg hover:bg-3ac76a flex items-center justify-center gap-2"
                                >
                                    📖 Level 1: Rule Mastery
                                </button>
                                <div className="text-sm text-gray-400 text-center">
                                    {(() => {
                                        const masteredCount = LEVEL1_QUESTIONS.filter((_, idx) => (questionStreaks[idx] || 0) >= 2).length;
                                        return `${masteredCount}/${LEVEL1_QUESTIONS.length} questions mastered`;
                                    })()}
                                </div>
                                <button
                                    onClick={() => { setLevel(2); handleStartSession(); }}
                                    className="w-full py-3 bg-16213e text-4ad97a font-bold rounded-lg hover:bg-0f3460 border border-4ad97a flex items-center justify-center gap-2"
                                >
                                    🎯 Level 2: Rule Application
                                </button>
                                <button
                                    onClick={() => { setLevel(3); handleStartSession(); }}
                                    className="w-full py-3 bg-16213e text-4ad97a font-bold rounded-lg hover:bg-0f3460 border border-4ad97a flex items-center justify-center gap-2"
                                >
                                    ⚠️ Level 3: Issue Spotting
                                </button>
                                <button
                                    onClick={() => { setLevel(4); setExamStarted(true); handleStartSession(); }}
                                    className="w-full py-3 bg-16213e text-4ad97a font-bold rounded-lg hover:bg-0f3460 border border-4ad97a flex items-center justify-center gap-2"
                                >
                                    ⏱️ Level 4: Full Exam
                                </button>
                                <button
                                    onClick={() => setLevel(5)}
                                    className="w-full py-3 bg-16213e text-4ad97a font-bold rounded-lg hover:bg-0f3460 border border-4ad97a flex items-center justify-center gap-2"
                                >
                                    📚 Rule Bank
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Level 1: Rule Mastery
            if (level === 1) {
                return (
                    <div className="min-h-screen bg-1a1a2e text-e0e0e0 p-6">
                        <div className="max-w-3xl mx-auto">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-bold text-4ad97a">Level 1: Rule Mastery</h1>
                                <div className="flex gap-4">
                                    <div className="text-sm">{formatTime(sessionTime)}</div>
                                    <button onClick={() => { setLevel(0); handleEndSession(); }} className="text-4ad97a hover:underline">Back</button>
                                </div>
                            </div>

                            {!currentQuestion && (
                                <button
                                    onClick={handleNextQuestion}
                                    className="w-full py-3 bg-4ad97a text-1a1a2e font-bold rounded-lg mb-6"
                                >
                                    Start Questions
                                </button>
                            )}

                            {currentQuestion && (
                                <div className="bg-16213e p-6 rounded-lg space-y-4">
                                    <div className="text-sm text-gray-400">
                                        {currentQuestion.type.replace(/_/g, ' ').toUpperCase()} | Rule: {RULES.find(r => r.id === currentQuestion.rule)?.name}
                                    </div>
                                    <h2 className="text-xl font-bold">{currentQuestion.question}</h2>

                                    {currentQuestion.type === 'tf_justification' && (
                                        <div className="space-y-2">
                                            <button
                                                onClick={() => { setShowModel(true); }}
                                                className="w-full py-2 bg-4ad97a text-1a1a2e font-bold rounded"
                                            >
                                                Show Answer
                                            </button>
                                            {showModel && (
                                                <div className="bg-0f3460 p-4 rounded mt-4 border-l-4 border-4ad97a">
                                                    <p className="mb-3 font-semibold">Answer: {currentQuestion.answer}</p>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => handleAnswerQuestion(true)} className="flex-1 py-2 bg-green-600 hover:bg-green-700 rounded">Got it</button>
                                                        <button onClick={() => handleAnswerQuestion(false)} className="flex-1 py-2 bg-red-600 hover:bg-red-700 rounded">Need Review</button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {['element_breakdown', 'rule_match', 'fill_gap'].includes(currentQuestion.type) && (
                                        <button
                                            onClick={() => setShowModel(!showModel)}
                                            className="w-full py-2 bg-4ad97a text-1a1a2e font-bold rounded"
                                        >
                                            {showModel ? 'Hide' : 'Reveal'} Model Answer
                                        </button>
                                    )}

                                    {showModel && (
                                        <div className="bg-0f3460 p-4 rounded border-l-4 border-4ad97a">
                                            <p className="text-4ad97a font-semibold mb-2">Model Answer:</p>
                                            <p>{currentQuestion.answer}</p>
                                            {currentQuestion.analogy && (
                                                <div className="analogy-box">
                                                    <div className="analogy-header">
                                                        <span className="analogy-icon">
                                                            {currentQuestion.rule === 1 ? '🏀' :
                                                             currentQuestion.rule === 2 ? '⚔️' :
                                                             currentQuestion.rule === 3 ? '🏀' :
                                                             currentQuestion.rule === 4 ? '🏀' :
                                                             currentQuestion.rule === 5 ? '🌀' :
                                                             currentQuestion.rule === 6 ? '🏀' :
                                                             currentQuestion.rule === 7 ? '🦇' :
                                                             currentQuestion.rule === 8 ? '🦇' :
                                                             currentQuestion.rule === 9 ? '⚔️' :
                                                             currentQuestion.rule === 10 ? '📺' :
                                                             currentQuestion.rule === 11 ? '🏀' :
                                                             currentQuestion.rule === 12 ? '📺' :
                                                             currentQuestion.rule === 13 ? '🏀' :
                                                             currentQuestion.rule === 14 ? '⚔️' :
                                                             currentQuestion.rule === 15 ? '🏀' :
                                                             currentQuestion.rule === 16 ? '📺' :
                                                             currentQuestion.rule === 17 ? '⚾' :
                                                             currentQuestion.rule === 18 ? '⚔️' :
                                                             currentQuestion.rule === 19 ? '🦇' :
                                                             currentQuestion.rule === 20 ? '🏀' :
                                                             currentQuestion.rule === 21 ? '🏀' :
                                                             currentQuestion.rule === 22 ? '⛳' :
                                                             currentQuestion.rule === 23 ? '🌀' :
                                                             currentQuestion.rule === 24 ? '🦇' :
                                                             currentQuestion.rule === 25 ? '🏠' : '💡'
                                                            }
                                                        </span>
                                                        Connect it:
                                                    </div>
                                                    <p className="analogy-text">{currentQuestion.analogy}</p>
                                                </div>
                                            )}
                                            <div className="flex gap-2 mt-4">
                                                <button onClick={() => handleAnswerQuestion(true)} className="flex-1 py-2 bg-green-600 hover:bg-green-700 rounded text-sm">Correct</button>
                                                <button onClick={() => handleAnswerQuestion(false)} className="flex-1 py-2 bg-orange-600 hover:bg-orange-700 rounded text-sm">Need Help</button>
                                            </div>
                                        </div>
                                    )}

                                    <div className="text-sm text-gray-400 mt-4">
                                        {(() => {
                                            const masteredCount = LEVEL1_QUESTIONS.filter((_, idx) => (questionStreaks[idx] || 0) >= 2).length;
                                            return `Mastered: ${masteredCount}/${LEVEL1_QUESTIONS.length} | Current Streak: ${(questionStreaks[currentQuestion._index] || 0)}/2`;
                                        })()}
                                    </div>
                                </div>
                            )}

                            {sessionTime % 1500 === 0 && sessionTime > 0 && (
                                <div className="fixed bottom-4 right-4 bg-yellow-700 p-4 rounded text-white text-sm max-w-xs">
                                    <p className="font-bold mb-2">Break Time!</p>
                                    <p>You've studied for 25 minutes. Take a 5-minute break.</p>
                                    <button onClick={() => setBreakCount(b => b + 1)} className="mt-2 bg-yellow-600 px-3 py-1 rounded text-xs">Break Taken</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // Level 2: Rule Application
            if (level === 2) {
                const hypo = LEVEL2_HYPOS[Math.floor(Math.random() * LEVEL2_HYPOS.length)];
                return (
                    <div className="min-h-screen bg-1a1a2e text-e0e0e0 p-6">
                        <div className="max-w-3xl mx-auto">
                            <div className="flex justify-between mb-6">
                                <h1 className="text-2xl font-bold text-4ad97a">Level 2: Rule Application</h1>
                                <button onClick={() => { setLevel(0); handleEndSession(); }} className="text-4ad97a hover:underline">Back</button>
                            </div>

                            <div className="bg-16213e p-6 rounded-lg space-y-4">
                                <div className="text-sm text-gray-400">Issue: {hypo.issue}</div>
                                <h2 className="text-xl font-bold">Fact Pattern</h2>
                                <p className="text-base leading-relaxed">{hypo.fact}</p>

                                {impulsivityCountdown !== null && (
                                    <div className="bg-orange-900 border-l-4 border-orange-500 p-4 rounded">
                                        <p className="font-bold text-orange-200 mb-2">IMPULSIVITY CHECK</p>
                                        <p className="text-sm mb-3">Before you submit—did you address every element of the {hypo.issue} rule? Take {impulsivityCountdown} seconds to review.</p>
                                    </div>
                                )}

                                <textarea
                                    placeholder="Write your IRAC analysis (Issue, Rule, Analysis, Conclusion)..."
                                    className="w-full h-32 bg-0f3460 text-e0e0e0 p-3 rounded text-sm"
                                    onChange={(e) => setExamText(e.target.value)}
                                />

                                <div className="flex gap-2">
                                    {impulsivityCountdown === null && (
                                        <button
                                            onClick={handleImpulsivityCheck}
                                            className="flex-1 py-2 bg-4ad97a text-1a1a2e font-bold rounded hover:bg-3ac76a"
                                        >
                                            Submit Answer
                                        </button>
                                    )}
                                    {impulsivityCountdown !== null && (
                                        <button
                                            onClick={() => setImpulsivityCountdown(null)}
                                            className="flex-1 py-2 bg-green-600 text-white font-bold rounded hover:bg-green-700"
                                        >
                                            Ready to Submit ({impulsivityCountdown}s)
                                        </button>
                                    )}
                                </div>

                                <button
                                    onClick={() => setShowModel(!showModel)}
                                    className="w-full py-2 bg-16213e text-4ad97a border border-4ad97a rounded"
                                >
                                    {showModel ? 'Hide' : 'Show'} Model Answer
                                </button>

                                {showModel && (
                                    <div className="bg-0f3460 p-4 rounded border-l-4 border-4ad97a">
                                        <p className="text-4ad97a font-bold mb-3">Model IRAC:</p>
                                        <p className="text-sm leading-relaxed whitespace-pre-wrap">{hypo.model}</p>
                                        <div className="flex gap-2 mt-4">
                                            <button onClick={() => alert('Self-assessment recorded')} className="flex-1 py-2 bg-blue-600 rounded text-sm">Rate Your Answer</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // Level 3: Issue Spotting
            if (level === 3) {
                const hypo = LEVEL3_HYPOS[Math.floor(Math.random() * LEVEL3_HYPOS.length)];
                return (
                    <div className="min-h-screen bg-1a1a2e text-e0e0e0 p-6">
                        <div className="max-w-3xl mx-auto">
                            <div className="flex justify-between mb-6">
                                <h1 className="text-2xl font-bold text-4ad97a">Level 3: Issue Spotting</h1>
                                <button onClick={() => { setLevel(0); handleEndSession(); }} className="text-4ad97a hover:underline">Back</button>
                            </div>

                            <div className="bg-16213e p-6 rounded-lg space-y-4">
                                <h2 className="text-xl font-bold">Multi-Issue Fact Pattern</h2>
                                <p className="text-base leading-relaxed">{hypo.fact}</p>

                                <div className="bg-0f3460 p-4 rounded">
                                    <p className="font-bold text-4ad97a mb-2">Trigger Facts (Review):</p>
                                    <ul className="list-disc pl-5 space-y-1 text-sm">
                                        {hypo.triggerFacts.map((fact, i) => (
                                            <li key={i} className="text-gray-300">{fact}</li>
                                        ))}
                                    </ul>
                                </div>

                                <div className="space-y-2">
                                    <p className="font-bold">Issues to Spot:</p>
                                    {hypo.issues.map((issue, i) => (
                                        <div key={i} className="bg-0f3460 p-3 rounded flex justify-between items-start">
                                            <div>
                                                <p className="font-semibold text-4ad97a">{issue.issue}</p>
                                                <p className="text-sm text-gray-400">{issue.trigger}</p>
                                            </div>
                                            <div className="text-sm font-bold text-orange-400">Priority {issue.priority}</div>
                                        </div>
                                    ))}
                                </div>

                                <textarea
                                    placeholder="Spot and triage the issues. Which should be analyzed first?"
                                    className="w-full h-24 bg-0f3460 text-e0e0e0 p-3 rounded text-sm"
                                />

                                <button className="w-full py-2 bg-4ad97a text-1a1a2e font-bold rounded">Submit Issue Spot</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Level 4: Full Exam
            if (level === 4) {
                const exam = LEVEL4_EXAMS[0];
                return (
                    <div className="min-h-screen bg-1a1a2e text-e0e0e0 p-6">
                        <div className="max-w-4xl mx-auto">
                            <div style={{ marginBottom: '0.5rem' }}>
                                <button onClick={() => { setLevel(0); handleEndSession(); setExamStarted(false); }} style={{ background: 'none', border: 'none', color: '#4ad97a', cursor: 'pointer', fontSize: '1rem', padding: '0.5rem 0' }}>← Back to Dashboard</button>
                            </div>
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-bold text-4ad97a">Level 4: Full Exam Simulation</h1>
                                <div className="text-lg font-bold text-orange-400">Time: {formatTime(sessionTime)}</div>
                            </div>

                            {!examStarted && (
                                <div className="bg-16213e p-6 rounded-lg space-y-4">
                                    <h2 className="text-xl font-bold">{exam.title}</h2>
                                    <p className="text-base">{exam.instructions}</p>
                                    <button
                                        onClick={() => setExamStarted(true)}
                                        className="w-full py-3 bg-4ad97a text-1a1a2e font-bold rounded text-lg"
                                    >
                                        Start Exam (180 minutes)
                                    </button>
                                </div>
                            )}

                            {examStarted && (
                                <div className="bg-16213e p-6 rounded-lg space-y-6">
                                    {exam.questions.map((q, i) => (
                                        <div key={i} className="border-b border-0f3460 pb-6">

            // Rule Bank
            if (level === 5) {

                return (
                    <div className="min-h-screen bg-1a1a2e text-e0e0e0 p-6">

                                <input
                                    type="text"
                                    placeholder="Search rules by name or doctrine..."
                                    value={ruleSearchFilter}
                                    onChange={(e) => setRuleSearchFilter(e.target.value)}
                                    className="w-full bg-0f3460 text-e0e0e0 p-3 rounded border border-4ad97a"
                                />
                                <p className="text-sm text-gray-400 mt-2">{filteredRules.length} of {RULES.length} rules shown</p>
                            </div>

                            <div className="space-y-4">
                                {filteredRules.map((rule) => (
                                    <div key={rule.id} className="bg-16213e p-6 rounded-lg border border-0f3460">
                                        <h2 className="text-xl font-bold text-4ad97a mb-2">{rule.name}</h2>

                                        <div className="bg-0f3460 p-4 rounded mb-4 border-l-4 border-4ad97a">
                                            <p className="text-base leading-relaxed">{rule.doctrine}</p>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4 mb-4">
                                            <div>
                                                <p className="text-sm text-gray-400 font-semibold mb-2">Elements:</p>
                                                <ul className="list-disc pl-5 text-sm space-y-1">
                                                    {rule.elements.map((elem, i) => (
                                                        <li key={i} className="text-gray-300">{elem}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                            <div>
                                                <p className="text-sm text-gray-400 font-semibold mb-2">Key Case:</p>
                                                <p className="text-sm text-white mb-4">{rule.keyCase}</p>
                                                <p className="text-sm text-gray-400 font-semibold mb-2">Remember:</p>
                                                <p className="text-sm text-gray-300 italic">"{rule.analogy}"</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {filteredRules.length === 0 && (
                                <div className="text-center py-12">
                                    <p className="text-lg text-gray-400">No rules match your search. Try different keywords.</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return null;
        }

        // ============================================================================
        // RENDER
        // ============================================================================

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<PropertyLawStudyPlatform />);
    </script>
</body>
</html>
