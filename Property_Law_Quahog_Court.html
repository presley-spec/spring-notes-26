<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Law: Quahog Courtroom</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Oswald:wght@400;700&family=Playfair+Display:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#FFD700;--cyan:#00e5ff;--red:#ff2d2d;--green:#00c850;
  --orange:#ff6b00;--purple:#a855f7;--pink:#ff6bff;
  --bg:#0f0a1e;--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.08);
}
body{font-family:'Comic Neue',cursive;background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden}
/* COURTROOM BACKGROUND */
.court-bg{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;
  background:linear-gradient(180deg,#0f0a1e 0%,#1a1030 40%,#251540 100%);
  opacity:0.9}
.court-bg::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(255,215,0,0.03) 0%,transparent 60%)}
#app{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:20px;min-height:100vh}

/* ═══ TITLE ═══ */
.title{text-align:center;padding-top:40px;animation:fadeIn 0.8s}
.title .gavel{font-size:5rem;margin-bottom:10px;display:block}
.title h1{font-family:'Bangers',cursive;font-size:3.8rem;color:var(--gold);
  text-shadow:3px 3px 0 var(--orange),6px 6px 0 rgba(0,0,0,0.3);letter-spacing:3px;line-height:1.1}
.title h2{font-family:'Bangers',cursive;font-size:2rem;color:var(--cyan);
  text-shadow:2px 2px 0 rgba(0,0,0,0.3);margin:8px 0 25px}
.title .tagline{color:#bbb;font-size:1rem;max-width:600px;margin:0 auto 35px;line-height:1.7}
.title .universes{color:#888;font-size:0.85rem;margin-bottom:40px}

/* MODE SELECT */
.mode-select{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
.mode-card{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:28px 24px;
  width:260px;cursor:pointer;transition:all 0.3s;text-align:center}
.mode-card:hover{transform:translateY(-6px);border-color:var(--gold);
  box-shadow:0 12px 40px rgba(255,215,0,0.15)}
.mode-card.selected{border-color:var(--gold);background:rgba(255,215,0,0.08);
  box-shadow:0 8px 30px rgba(255,215,0,0.2)}
.mode-icon{font-size:3rem;margin-bottom:10px;display:block}
.mode-name{font-family:'Bangers',cursive;font-size:1.5rem;color:var(--gold);margin-bottom:8px}
.mode-desc{color:#aaa;font-size:0.85rem;line-height:1.5}
.mode-card .think{display:block;margin-top:10px;font-size:0.78rem;color:var(--cyan);
  font-weight:700;text-transform:uppercase;letter-spacing:1px}

.go-btn{font-family:'Bangers',cursive;font-size:1.8rem;padding:16px 55px;
  background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;border:none;
  border-radius:50px;cursor:pointer;letter-spacing:2px;
  text-shadow:2px 2px 0 rgba(0,0,0,0.3);box-shadow:0 8px 25px rgba(255,107,0,0.4);
  transition:all 0.3s;margin-top:10px}
.go-btn:hover{transform:scale(1.06);box-shadow:0 12px 35px rgba(255,107,0,0.6)}
.go-btn:disabled{opacity:0.4;cursor:default;transform:none}

/* ═══ HUD ═══ */
.hud{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;
  background:var(--card);border-radius:16px;margin-bottom:20px;
  backdrop-filter:blur(10px);border:1px solid var(--border)}
.hud-item{text-align:center}
.hud-label{font-size:0.7rem;color:#888;text-transform:uppercase;letter-spacing:1px}
.hud-val{font-family:'Bangers',cursive;font-size:1.4rem}
.hud-score{color:var(--gold)}.hud-q{color:var(--pink)}.hud-streak{color:var(--cyan)}
.hud-role{color:var(--orange)}
.prog-wrap{width:100%;height:7px;background:rgba(255,255,255,0.08);border-radius:4px;margin-bottom:22px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--pink));border-radius:4px;transition:width 0.5s}

/* ═══ SCENARIO CARD ═══ */
.scene{background:var(--card);border-radius:22px;padding:32px;margin-bottom:22px;
  border:1px solid var(--border);backdrop-filter:blur(10px);animation:slideUp 0.5s}
.topic-tag{display:inline-block;padding:4px 14px;background:rgba(255,107,0,0.15);
  color:var(--orange);border-radius:18px;font-size:0.75rem;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;border:1px solid rgba(255,107,0,0.25)}
.role-tag{display:inline-block;padding:4px 14px;border-radius:18px;font-size:0.75rem;
  font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;margin-left:8px}
.role-prosecution{background:rgba(255,45,45,0.15);color:#ff6b6b;border:1px solid rgba(255,45,45,0.25)}
.role-defense{background:rgba(0,200,80,0.15);color:#00ff6a;border:1px solid rgba(0,200,80,0.25)}
.role-judge{background:rgba(168,85,247,0.15);color:var(--purple);border:1px solid rgba(168,85,247,0.25)}
.scene-head{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.scene-head .char{font-size:2.4rem}
.scene-title{font-family:'Bangers',cursive;font-size:1.7rem;color:var(--gold);line-height:1.2}
.scene-text{font-size:1.02rem;line-height:1.85;color:#d4d4d4;margin-bottom:22px;white-space:pre-line}
.scene-q{font-size:1.05rem;font-weight:700;color:var(--cyan);margin-bottom:18px;padding:14px 16px;
  background:rgba(0,229,255,0.07);border-radius:12px;border-left:4px solid var(--cyan);line-height:1.5}

/* ═══ OPTIONS ═══ */
.opts{display:grid;gap:11px}
.opt{display:block;width:100%;padding:15px 18px;background:rgba(255,255,255,0.04);
  border:2px solid rgba(255,255,255,0.1);border-radius:14px;color:#eee;
  font-family:'Comic Neue',cursive;font-size:0.98rem;text-align:left;cursor:pointer;
  transition:all 0.25s;line-height:1.5}
.opt:hover:not(.dis){background:rgba(255,255,255,0.1);border-color:var(--cyan);transform:translateX(5px)}
.opt.correct{background:rgba(0,200,80,0.18);border-color:var(--green);color:#00ff6a}
.opt.wrong{background:rgba(255,40,40,0.18);border-color:var(--red);color:#ff6b6b}
.opt.dis{cursor:default;opacity:0.55}
.opt.reveal{background:rgba(0,200,80,0.12);border-color:var(--green)}
.opt .letter{display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;
  background:rgba(255,255,255,0.08);border-radius:7px;margin-right:11px;font-weight:700;font-size:0.85rem}

/* ═══ FEEDBACK ═══ */
.fb{margin-top:18px;padding:24px;border-radius:16px;animation:fadeIn 0.4s;line-height:1.7}
.fb-ok{background:rgba(0,200,80,0.08);border:1px solid rgba(0,200,80,0.25)}
.fb-no{background:rgba(255,40,40,0.08);border:1px solid rgba(255,40,40,0.25)}
.fb-head{font-family:'Bangers',cursive;font-size:1.4rem;margin-bottom:8px}
.fb-ok .fb-head{color:#00ff6a}.fb-no .fb-head{color:#ff6b6b}
.fb-body{color:#d4d4d4;font-size:0.93rem}
.doctrine{margin-top:14px;padding:14px;background:rgba(255,215,0,0.06);border-radius:10px;border-left:3px solid var(--gold)}
.doctrine .dl{font-size:0.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--gold);margin-bottom:5px}
.doctrine .dt{color:#eee;font-size:0.88rem;line-height:1.6}
.objection{margin-top:12px;padding:12px;background:rgba(168,85,247,0.08);border-radius:10px;border-left:3px solid var(--purple)}
.objection .ol{font-size:0.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--purple);margin-bottom:5px}
.objection .ot{color:#d4d4d4;font-size:0.85rem;line-height:1.5;font-style:italic}
.nxt{display:inline-block;margin-top:18px;padding:13px 38px;
  background:linear-gradient(135deg,var(--cyan),#0080ff);color:#fff;border:none;
  border-radius:30px;font-family:'Bangers',cursive;font-size:1.15rem;cursor:pointer;
  letter-spacing:1px;transition:all 0.3s;box-shadow:0 4px 15px rgba(0,229,255,0.3)}
.nxt:hover{transform:scale(1.05);box-shadow:0 6px 25px rgba(0,229,255,0.5)}

/* ═══ RESULTS ═══ */
.results{text-align:center;padding-top:40px;animation:fadeIn 0.8s}
.results h1{font-family:'Bangers',cursive;font-size:2.8rem;color:var(--gold);margin-bottom:15px}
.grade{font-family:'Bangers',cursive;font-size:7rem;margin:25px 0;text-shadow:4px 4px 0 rgba(0,0,0,0.3)}
.g-a{color:#00ff6a}.g-b{color:var(--cyan)}.g-c{color:var(--gold)}.g-d{color:var(--orange)}.g-f{color:var(--red)}
.rstats{display:flex;justify-content:center;gap:30px;margin:25px 0;flex-wrap:wrap}
.rbox{background:var(--card);padding:18px 28px;border-radius:16px;border:1px solid var(--border)}
.rbox .rn{font-family:'Bangers',cursive;font-size:2.2rem;color:var(--gold)}
.rbox .rl{font-size:0.75rem;color:#888;text-transform:uppercase;letter-spacing:1px}
.weak,.strong{margin-top:22px;text-align:left;max-width:600px;margin-left:auto;margin-right:auto;padding:22px;border-radius:16px}
.weak{background:rgba(255,40,40,0.06);border:1px solid rgba(255,40,40,0.18)}
.weak h3{font-family:'Bangers',cursive;color:#ff6b6b;margin-bottom:10px;font-size:1.2rem}
.strong{background:rgba(0,200,80,0.06);border:1px solid rgba(0,200,80,0.18)}
.strong h3{font-family:'Bangers',cursive;color:#00ff6a;margin-bottom:10px;font-size:1.2rem}
.ritem{padding:7px 0;color:#ccc;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.9rem}
.review{margin-top:35px;text-align:left;max-width:700px;margin-left:auto;margin-right:auto}
.review h3{font-family:'Bangers',cursive;font-size:1.4rem;color:var(--cyan);margin-bottom:18px;text-align:center}
.rev-item{background:rgba(255,255,255,0.04);border-radius:14px;padding:18px;margin-bottom:12px;border-left:4px solid}
.rev-item.rev-ok{border-color:var(--green)}.rev-item.rev-no{border-color:var(--red)}
.rev-q{font-weight:700;color:#eee;margin-bottom:6px;font-size:0.95rem}
.rev-a{color:#999;font-size:0.85rem}

/* ═══ ANIMS ═══ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes gavel{0%{transform:rotate(0)}25%{transform:rotate(-20deg)}50%{transform:rotate(0)}100%{transform:rotate(0)}}
.gavel-hit{animation:gavel 0.3s ease}

/* ═══ RESPONSIVE ═══ */
@media(max-width:700px){
  .title h1{font-size:2.4rem}.title h2{font-size:1.4rem}
  .mode-select{flex-direction:column;align-items:center}
  .mode-card{width:100%;max-width:320px}
  .scene{padding:20px}.hud{flex-wrap:wrap;gap:8px}
  .rstats{gap:12px}.grade{font-size:5rem}
}
</style>
</head>
<body>
<div class="court-bg"></div>
<div id="app"></div>
<script>
// ════════════════════════════════════════════════════════════════
//  PROPERTY LAW: QUAHOG COURTROOM
//  Three game modes · Cross-universe chaos · Exam-grade doctrine
//  Built for Presley's Property Law Final — Prof. Stern, BU Law
// ════════════════════════════════════════════════════════════════

const S = [
// ══════════ 1. ADVERSE POSSESSION ══════════
{
  topic:"Adverse Possession",
  title:"Griffin v. Flanders — The Annexation of Ned's Yard",
  char:"🍺",
  text:`Ned Flanders recently moved from Springfield to 33 Spooner Street, Quahog. Within a week, Peter Griffin started mowing a 20-foot strip of Ned's backyard, installed a permanent above-ground pool, and has been hosting "Bird is the Word" dance marathons on it every Saturday for 22 years.

Every time Ned noticed, he just said "Okily-dokily, neighborino! Mi yard es su yard!" He even brought Peter lemonade while Peter was literally jackhammering a patio into Ned's soil.

The statutory period in Quahog is 15 years. Ned's wife finally hires a lawyer.`,
  prosecution:{
    q:"As Ned's attorney, what is your STRONGEST argument to defeat Peter's adverse possession claim?",
    opts:[
      "Peter's use was not 'open and notorious' because the pool was technically inflatable (it wasn't)",
      "Ned's repeated statements — 'mi yard es su yard' and bringing lemonade — constitute affirmative grants of permission, defeating the hostile/adverse element",
      "Peter's 'Bird is the Word' dances don't constitute 'actual possession' because dancing is not a productive land use",
      "The 22-year period was interrupted when Peter spent 3 episodes in a coma, breaking continuity"
    ],
    correct:1,
    feedback:`This is your ace. Unlike mere SILENCE (which does NOT create permission under the objective standard from Brown v. Goebel), Ned took AFFIRMATIVE ACTS — verbal permission ("mi yard es su yard") and active support (bringing lemonade). This transforms Peter's use from adverse to permissive. The adversity/hostile element requires that possession be without the owner's consent. When Ned verbally invited Peter and physically participated, he gave actual permission. Peter's entire 22 years become permissive use, and the statutory clock never started. As Ned's attorney, you'd argue: "Your Honor, my client didn't just stay silent — he actively, verbally, and physically consented to the defendant's use."`,
  },
  defense:{
    q:"As Peter's attorney, what is your BEST argument to establish adverse possession despite Ned's friendliness?",
    opts:[
      "Under the objective standard, Peter's STATE OF MIND is irrelevant — he acted as a true owner would (building permanent structures, exclusive use for 22 years). Ned's friendly comments are mere neighborly politeness, not formal grants of permission",
      "Peter has color of title from a napkin Quagmire drew a fake deed on at the Drunken Clam",
      "Ned's religious beliefs mean he would have given the land to anyone, so it's constructive abandonment",
      "The pool created an equitable estoppel that converts to adverse possession after 15 years"
    ],
    correct:0,
    feedback:`Strong advocacy! Under the OBJECTIVE standard (majority rule, Brown v. Goebel), the adverse possessor's state of mind doesn't matter — what matters is whether they acted as a true owner. Peter built PERMANENT STRUCTURES (pool, patio), used the land EXCLUSIVELY for 22 years, and his use was clearly open and notorious. Your argument: Ned's "okily-dokily" is just how Ned talks to everyone — it's neighborly politeness, not a legal grant of permission. There's no written license, no formal agreement. However, this is genuinely close — a court could go either way on whether Ned's conduct crosses the line from passive silence to affirmative permission. That's what makes it a great exam question.`,
  },
  judge:{
    q:"As the judge, how should you rule on whether Ned's conduct defeats the hostile/adverse element?",
    opts:[
      "Peter wins — adverse possession is a strict liability doctrine and Ned's friendliness is irrelevant",
      "Ned wins — his verbal statements and active participation (bringing lemonade, saying 'mi yard es su yard') constitute affirmative grants of permission that are distinguishable from mere silence, defeating adversity under both objective and subjective standards",
      "Peter wins — once permanent structures are built, adverse possession is automatic regardless of permission",
      "Remand for factfinding on whether Ned's statements were legally sufficient to constitute a license"
    ],
    correct:1,
    feedback:`The key legal distinction: SILENCE by the true owner does NOT defeat adversity under the objective standard (Brown v. Goebel). But Ned went far beyond silence — he made verbal statements of consent AND took affirmative supportive actions. This is the difference between a sleeping owner and a consenting owner. Under BOTH the objective standard (Ned's acts constitute formal permission regardless of Peter's mindset) and the subjective standard (Peter could not claim good faith belief of ownership when Ned was explicitly granting permission), adversity fails. The correct doctrinal framing: mere inaction ≠ permission, but affirmative words + conduct = permission.`,
  },
  doctrine:"Adverse Possession — Hostile/Adverse Element: Under the objective standard (Brown v. Goebel), claimant's state of mind is irrelevant; what matters is whether they acted as owner would. Owner's SILENCE ≠ permission. But AFFIRMATIVE grants of permission (verbal consent, active participation) DO defeat adversity. Elements: (1) Actual possession, (2) Open & notorious, (3) Exclusive, (4) Continuous for statutory period, (5) Hostile/adverse. Tacking allowed through privity."
},

// ══════════ 2. TRESPASS & NECESSITY ══════════
{
  topic:"Trespass & Necessity",
  title:"State v. Sanchez — Rick's Interdimensional Breaking & Entering",
  char:"🧪",
  text:`During the Quahog Mega-Hurricane, Rick Sanchez's portal gun malfunctions. He and Morty crash-land in Cleveland's rebuilt house (the one that's been destroyed 47 times).

Rick eats all of Cleveland's bathtub BBQ ribs, converts the living room into a temporary lab, accidentally turns Cleveland's cat into a sentient being who immediately files for emancipation, and dismantles the hot water heater for "science parts."

Morty just used the bathroom and apologized 300 times.

When Cleveland returns, Rick says: "Listen *burp* Cleveland, the concept of property is a social construct designed to — and I can't stress this enough — keep dumb people from realizing they own nothing." Cleveland sues both for trespass.`,
  prosecution:{
    q:"As Cleveland's attorney, what is your strongest argument against Rick's necessity defense?",
    opts:[
      "Rick and Morty are from a different dimension and lack standing in Quahog courts",
      "While the hurricane created initial necessity, Rick's CONTINUED actions — eating ribs, building a lab, dismantling the water heater — went far beyond what was necessary to avoid the emergency, exceeding the scope of the privilege",
      "Trespass is a strict liability tort, so necessity can never be a defense",
      "Rick's portal gun malfunction was his own fault, so he can't claim necessity for a self-created emergency"
    ],
    correct:1,
    feedback:`Excellent prosecution! The necessity defense (Magadini v. Commonwealth) privileges entry to avoid clear and imminent danger — but it doesn't give you carte blanche to redecorate. Rick's initial entry during the hurricane? Privileged. But converting the living room to a lab and dismantling the water heater for "science parts" goes WAY beyond avoiding the emergency. Under private necessity, the entrant remains liable for actual damages caused even during the privileged entry. Option D is also tempting (self-created emergency), but courts are split on this — and the hurricane is an independent intervening cause. The stronger argument is scope: necessity covers shelter, not a full lab renovation.`,
  },
  defense:{
    q:"As Rick's attorney (good luck), what is your BEST defense for Morty specifically?",
    opts:[
      "Morty is a minor and cannot form the intent necessary for trespass",
      "Private necessity — the hurricane created clear and imminent danger with no reasonable legal alternatives, and Morty's actions (using the bathroom and apologizing) were entirely within the scope of the emergency privilege. Morty owes only actual damages, which are minimal",
      "Morty has diplomatic immunity as a citizen of Dimension C-137",
      "Cleveland's door was unlocked, constituting implied consent to enter"
    ],
    correct:1,
    feedback:`Smart to separate Morty from Rick! Private necessity (Magadini framework) is Morty's best defense: (1) Clear and imminent danger — Category 5 hurricane, check; (2) Reasonable expectation the action would be effective — entering a house avoids the hurricane, check; (3) No reasonable legal alternatives — in the middle of a hurricane with a broken portal gun, where else would they go?; (4) Not legislatively precluded. Critically, Morty stayed WITHIN the scope of the privilege — he used the bathroom (basic human necessity) and that's it. Under private necessity, he remains liable for actual damages, but using a bathroom during a hurricane? Minimal. Rick, on the other hand, is going to owe Cleveland a LOT of money.`,
  },
  judge:{
    q:"As the judge, how should you rule on the necessity defense and damages?",
    opts:[
      "Both Rick and Morty are guilty of trespass with no applicable defense — necessity doesn't apply to portal gun malfunctions",
      "Full necessity defense for both — the hurricane excuses everything, including the lab and the water heater dismantling",
      "Private necessity privileges the initial entry for both, but Rick exceeds the scope. Morty owes nominal/minimal actual damages. Rick owes full actual damages for the lab, ribs, water heater, and cat emancipation proceedings — but neither owes punitive damages during the emergency period",
      "Public necessity applies because Rick was trying to fix his portal gun to save the multiverse, providing a complete defense with zero damages"
    ],
    correct:2,
    feedback:`Correct judicial analysis. Private necessity privileges the entry but does NOT excuse actual damages (unlike public necessity, which is a complete defense). The key distinctions: (1) Entry was privileged — hurricane = clear and imminent danger; (2) Cleveland CANNOT use force to eject during the emergency; (3) But liability for actual damages remains. Rick's damages are extensive because he went beyond the scope of necessity (lab construction, water heater dismantling). Morty's damages are minimal (bathroom use during emergency). Neither owes PUNITIVE damages because the entry itself was privileged — compare Jacobs v. Steenberg Homes, where the deliberate commercial trespass justified $100K punitive. Here, there was genuine necessity for the initial entry.`,
  },
  doctrine:"Private Necessity: Privileges entry to avoid imminent harm to oneself. Entrant remains liable for ACTUAL DAMAGES but not punitive damages. Owner cannot use force to eject during emergency. Elements (Magadini): (1) clear/imminent danger, (2) reasonable expectation action effective, (3) no legal alternatives, (4) not legislatively precluded. SCOPE matters — privilege covers emergency actions only, not everything you feel like doing once inside. Distinguish public necessity (complete defense, no damages) from private necessity (partial defense, actual damages only)."
},

// ══════════ 3. NUISANCE ══════════
{
  topic:"Nuisance",
  title:"Marsh v. Quagmire — Randy's Weed Farm vs. Glenn's Bass Dungeon",
  char:"😏",
  text:`Randy Marsh moved from South Park to Spooner Street and immediately started growing "medicinal herbs" in his backyard. The smell is... distinctive. His plants are legal under Rhode Island law, and he insists the operation has "significant agricultural value."

Meanwhile, Quagmire's basement operates from 10 PM to 5 AM at approximately 110 decibels with bass so heavy it has literally cracked Randy's grow-lights and caused structural damage to the herb garden's irrigation system.

Randy sues Quagmire for nuisance. Quagmire countersues, claiming Randy's smell is the REAL nuisance.

Randy moved to Spooner Street 2 years AFTER Quagmire started his basement operation.

Homer Simpson, who lives three houses down, has slept through all of it.`,
  prosecution:{
    q:"As Randy's attorney, what is your STRONGEST argument that Quagmire's operation is a nuisance despite Randy 'coming to the nuisance'?",
    opts:[
      "Quagmire's activity is a nuisance per se because it exceeds local noise ordinances",
      "Coming to the nuisance is only a PARTIAL defense — it factors into the balancing but doesn't bar the claim. The interference is substantial (110 dB causing physical damage to structures) and unreasonable regardless of when Randy moved in. Physical harm outweighs the 'coming to' factor",
      "Randy's legal agricultural operation has priority because it produces economic value while Quagmire's operation produces only regret",
      "The fact that Homer can sleep through it proves Quagmire's noise exceeds all reasonable standards"
    ],
    correct:1,
    feedback:`Coming to the nuisance is a PARTIAL defense, not a complete bar (Dobbs v. Wiggins framework). Here's your argument: Yes, Randy moved in after Quagmire started. But the court must still balance: (1) CHARACTER OF HARM — this isn't just noise annoyance, there's PHYSICAL STRUCTURAL DAMAGE (cracked grow-lights, damaged irrigation). Physical harm weighs far more heavily than mere aesthetic displeasure; (2) SUBSTANTIAL — 110 dB at night is objectively substantial by any reasonable person standard (a chainsaw is ~110 dB); (3) UNREASONABLE — residential neighborhood, nighttime operation, structural damage to neighboring property. The coming-to-the-nuisance defense reduces Randy's position but doesn't immunize Quagmire from causing physical damage at chainsaw-level decibels.`,
  },
  defense:{
    q:"As Quagmire's attorney, what is your BEST argument that RANDY is the real nuisance?",
    opts:[
      "Randy's 'herbs' produce a substantial, unreasonable interference with neighbors' use and enjoyment through pervasive odor. The smell is non-trespassory but interferes with the normal use of surrounding properties, satisfying nuisance elements regardless of the activity's legality — zoning compliance does not bar nuisance claims",
      "Randy's plants attract wildlife that damages Quagmire's property",
      "Randy is operating a commercial farm in a residential zone, making it a nuisance per se",
      "Randy's operation decreases property values, which is per se unreasonable"
    ],
    correct:0,

    feedback:`Finn v. Williams! All elements satisfied: (1) Common ownership — Rick owned the entire parcel; (2) Severance created landlocked parcel — Morty's lot has zero road access; (3) No adequate access to public road — the ocean doesn't count as a public road. Rick's spite is irrelevant — the doctrine rests on the legal fiction that a grantor IMPLICITLY intended to provide access because no rational grantor would render land worthless. The gift vs. sale question doesn't defeat the claim — easement by necessity arises from the SEVERANCE itself, not from the type of consideration. Importantly, unlike prescriptive easements, NO PRIOR USE OR STATUTORY PERIOD is required. The easement can even "rise from dormancy" (Finn: 50-year gap didn't defeat the claim).`,

  },

      "Both are easements implied from prior use because the parcels were formerly unified",
      "Case A is express and Case B is prescriptive"
    ],
    correct:1,
    feedback:`This is the doctrinal distinction that separates A students from B students. WHY does each doctrine apply? Case A — NECESSITY: Morty has no prior use of any path, no permission was given, no prescriptive period was met. The ONLY doctrine that works is necessity — it requires: (1) common ownership, (2) severance causing landlocked parcel, (3) no adequate access. No use history needed. Case B — ESTOPPEL: Stewie had PERMISSION (killing prescriptive claims), no common ownership (killing implied from prior use), and no landlocked parcel (killing necessity). Estoppel is the only doctrine that converts an oral license into an irrevocable interest based on detrimental reliance. The Statute of Frauds normally requires easements in writing — estoppel is the exception when the license-holder detrimentally relied.`,
  },
  doctrine:"Easement by Necessity (Finn v. Williams): (1) Common ownership; (2) Severance created landlocked parcel; (3) No adequate road access. No prior use required. Can lie dormant. Based on implied grantor intent. Easement by Estoppel (Lobato v. Taylor): (1) Owner permitted use; (2) Foreseeable reliance; (3) Belief permission permanent; (4) Substantial change in position; (5) Injustice without recognition. Statute of Frauds exception. Use was PERMISSIVE — distinguishes from prescription. Easement Implied from Prior Use (Granite v. Manns): requires common ownership + prior apparent continuous use + reasonable necessity. Each doctrine fills a specific gap — learn WHEN each applies."
},

{

// ═══════════════════════════════════════════════════
//  GAME ENGINE
// ═══════════════════════════════════════════════════
let G = {
  screen:'title', mode:null, qi:0, score:0, streak:0, best:0,
  answered:false, sel:-1, results:[], topics:{}
};

const MODES = {
  prosecution:{name:"Prosecution",icon:"⚔️",desc:"Represent the plaintiff or state. Find the STRONGEST argument to WIN for your client.",think:"Think like an advocate — best case for YOUR side"},
  defense:{name:"Defense",icon:"🛡️",desc:"Represent the defendant. Find the BEST defense to PROTECT your client from liability.",think:"Think like an advocate — best case for the OTHER side"},
  judge:{name:"Judge",icon:"⚖️",desc:"Apply the law objectively. Determine the CORRECT legal ruling regardless of sympathy.",think:"Think like a neutral arbiter — what does the LAW say?"}
};

const $ = id => document.getElementById(id);
const L = ['A','B','C','D'];

function render(){
  const a = $('app');
  if(G.screen==='title') a.innerHTML = titleHTML();
  else if(G.screen==='game') a.innerHTML = gameHTML();
  else a.innerHTML = resultsHTML();
  bind();
}

function titleHTML(){
  let cards = Object.entries(MODES).map(([k,m])=>`
    <div class="mode-card${G.mode===k?' selected':''}" data-mode="${k}">
      <span class="mode-icon">${m.icon}</span>
      <div class="mode-name">${m.name}</div>
      <div class="mode-desc">${m.desc}</div>
      <span class="think">${m.think}</span>
    </div>`).join('');

  return `<div class="title">
    <span class="gavel">⚖️</span>
    <h1>PROPERTY LAW</h1>
    <h2>Quahog Courtroom</h2>
    <p class="tagline">15 cases. 3 game modes. Every doctrine from Prof. Stern's course.<br>
    Play as prosecution, defense, or judge — each forces you to think about the law differently.</p>
    <p class="universes">Featuring characters from Family Guy · The Simpsons · South Park · Rick and Morty</p>
    <div class="mode-select">${cards}</div>
    <button class="go-btn" id="go" ${G.mode?'':'disabled'}>COURT IS IN SESSION</button>
    <p style="margin-top:20px;color:#555;font-size:0.8rem">Keyboard: 1-4 or A-D to answer · Enter/Space to advance</p>
  </div>`;
}

function gameHTML(){
  const s = S[G.qi], m = G.mode, d = s[m];
  const pct = (G.qi/S.length*100).toFixed(0);
  const mInfo = MODES[m];
  let roleClass = `role-${m}`;

  let optsH = d.opts.map((o,i)=>{
    let c='opt';
    if(G.answered){
      c+=' dis';
      if(i===d.correct) c+=' correct';
      else if(i===G.sel&&i!==d.correct) c+=' wrong';
    }
    return `<button class="${c}" data-i="${i}"><span class="letter">${L[i]}</span>${o}</button>`;
  }).join('');

  let fbH='';
  if(G.answered){
    const ok = G.sel===d.correct;
    const quip = ok
      ? ["Freakin' sweet!","Giggity!","Excellent, counselor!","Holy crap, you nailed it!","That's what she... said? No wait — that's correct!","D'oh-n't change a thing!","Now THAT'S using your law degree!"][G.qi%7]
      : ["Oh no... oh no no no.","Even Homer would've gotten that one.","Cartman is laughing at you right now.","You just got disbarred in Quahog.","Rick says you belong in the dumbest timeline.","That answer was worse than Meg's self-esteem.","Even the cockroach democracy disagrees."][G.qi%7];

    fbH=`<div class="fb ${ok?'fb-ok':'fb-no'}">
      <div class="fb-head">${ok?'✅':'❌'} ${quip}</div>
      <div class="fb-body">${d.feedback}</div>
      <div class="doctrine"><div class="dl">📚 Exam Doctrine — Write This on Your Final</div><div class="dt">${s.doctrine}</div></div>
      <div class="objection"><div class="ol">💡 Mode Insight — Why ${mInfo.name} Thinks Differently</div>
      <div class="ot">${m==='prosecution'
        ?`As prosecution/plaintiff's attorney, your job is to find the STRONGEST argument for your client. Even if the law is uncertain, advocate for the interpretation most favorable to your side — then acknowledge weaknesses. This is how real lawyers think on exam hypos.`
        :m==='defense'
        ?`As defense attorney, your job is to find the BEST shield for your client. Look for elements the plaintiff can't prove, affirmative defenses, and policy arguments that favor your side. A great defense attorney concedes the obvious and fights on the close calls.`
        :`As judge, you must apply the law objectively regardless of sympathy. Identify the correct legal standard, apply it to the facts, and explain your reasoning. Acknowledge competing arguments but reach a definitive ruling. Exam graders want to see you engage both sides before deciding.`
      }</div></div>
      <button class="nxt" id="nxt">${G.qi<S.length-1?'Next Case →':'Final Verdict →'}</button>
    </div>`;
  }

  return `
    <div class="hud">
      <div class="hud-item"><div class="hud-label">Score</div><div class="hud-val hud-score">${G.score}/${S.length}</div></div>
      <div class="hud-item"><div class="hud-label">Case</div><div class="hud-val hud-q">${G.qi+1}/${S.length}</div></div>
      <div class="hud-item"><div class="hud-label">Streak</div><div class="hud-val hud-streak">${G.streak}🔥</div></div>
      <div class="hud-item"><div class="hud-label">Role</div><div class="hud-val hud-role">${mInfo.icon} ${mInfo.name}</div></div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="scene">
      <span class="topic-tag">${s.topic}</span>
      <span class="role-tag ${roleClass}">${mInfo.icon} Playing as ${mInfo.name}</span>
      <div class="scene-head">
        <span class="char">${s.char}</span>
        <h2 class="scene-title">${s.title}</h2>
      </div>
      <div class="scene-text">${s.text}</div>
      <div class="scene-q">${d.q}</div>
      <div class="opts">${optsH}</div>
      ${fbH}
    </div>`;
}

function resultsHTML(){
  const pct=Math.round(G.score/S.length*100);
  let gr,gc;
  if(pct>=93){gr='A';gc='g-a'}else if(pct>=85){gr='A-';gc='g-a'}
  else if(pct>=80){gr='B+';gc='g-b'}else if(pct>=73){gr='B';gc='g-b'}
  else if(pct>=70){gr='C+';gc='g-c'}else if(pct>=63){gr='C';gc='g-c'}
  else if(pct>=60){gr='D';gc='g-d'}else{gr='F';gc='g-f'}

  let weak=[],strong=[];
  for(let t in G.topics){
    const x=G.topics[t];
    if(x.c/x.t<0.5) weak.push(t);
    else if(x.c/x.t>=1) strong.push(t);
  }

  const mInfo=MODES[G.mode];
  let wH=weak.length?`<div class="weak"><h3>🎯 Review These Topics</h3>${weak.map(t=>`<div class="ritem">• ${t}</div>`).join('')}</div>`:'';
  let sH=strong.length?`<div class="strong"><h3>💪 Mastered</h3>${strong.map(t=>`<div class="ritem">• ${t}</div>`).join('')}</div>`:'';

  let revH=G.results.map((r,i)=>{
    const sc=S[i];
    return `<div class="rev-item ${r.ok?'rev-ok':'rev-no'}">
      <div class="rev-q">${i+1}. ${sc.title} (${sc.topic})</div>
      <div class="rev-a">${r.ok?'✅ Correct':'❌ Missed — Review: '+sc.doctrine.split('.')[0]+'.'}</div>
    </div>`;
  }).join('');

  return `<div class="results">
    <h1>${mInfo.icon} ${mInfo.name} Mode — Final Verdict</h1>
    <div class="grade ${gc}">${gr}</div>
    <div class="rstats">
      <div class="rbox"><div class="rn">${G.score}/${S.length}</div><div class="rl">Correct</div></div>
      <div class="rbox"><div class="rn">${pct}%</div><div class="rl">Accuracy</div></div>
      <div class="rbox"><div class="rn">${G.best}</div><div class="rl">Best Streak</div></div>
    </div>
    ${pct>=90?'<p style="color:#00ff6a;font-size:1.1rem;margin:15px 0">You\'re getting that A. Keep going.</p>'
      :pct>=70?'<p style="color:var(--cyan);font-size:1.1rem;margin:15px 0">Solid foundation — review the misses and try another mode!</p>'
      :'<p style="color:var(--orange);font-size:1.1rem;margin:15px 0">Hit the outlines and come back. Try Judge mode for objective analysis.</p>'}
    ${wH}${sH}
    <div class="review"><h3>Case-by-Case Review</h3>${revH}</div>
    <div style="text-align:center;margin-top:35px;display:flex;gap:15px;justify-content:center;flex-wrap:wrap">
      <button class="go-btn" id="retry" style="font-size:1.3rem;padding:13px 35px">Retry ${mInfo.name} Mode</button>
      <button class="nxt" id="switch" style="font-size:1.1rem;padding:13px 35px">Switch Mode</button>
    </div>
    <p style="text-align:center;margin-top:25px;color:#444;font-size:0.75rem">
      Property Law: Quahog Courtroom — Built for Presley's Finals · Prof. Stern · BU Law
    </p>
  </div>`;
}

function bind(){
  document.querySelectorAll('.mode-card').forEach(c=>{
    c.addEventListener('click',()=>{G.mode=c.dataset.mode;render()});
  });
  const go=$('go');if(go)go.addEventListener('click',()=>{if(G.mode){G.screen='game';render()}});
  const retry=$('retry');if(retry)retry.addEventListener('click',()=>{resetGame();G.screen='game';render()});
  const sw=$('switch');if(sw)sw.addEventListener('click',()=>{resetGame();G.screen='title';G.mode=null;render()});
  if(!G.answered){
    document.querySelectorAll('.opt').forEach(b=>{
      b.addEventListener('click',()=>answer(parseInt(b.dataset.i)));
    });
  }
  const nxt=$('nxt');if(nxt)nxt.addEventListener('click',next);
}

function answer(i){
  if(G.answered)return;
  G.answered=true;G.sel=i;
  const d=S[G.qi][G.mode];
  const ok=i===d.correct;
  if(ok){G.score++;G.streak++;if(G.streak>G.best)G.best=G.streak}else{G.streak=0}
  G.results.push({ok,topic:S[G.qi].topic});
  const t=S[G.qi].topic;
  if(!G.topics[t])G.topics[t]={c:0,t:0};
  G.topics[t].t++;if(ok)G.topics[t].c++;
  render();
  setTimeout(()=>{const f=document.querySelector('.fb');if(f)f.scrollIntoView({behavior:'smooth',block:'center'})},80);
}

function next(){
  if(G.qi<S.length-1){G.qi++;G.answered=false;G.sel=-1;G.screen='game'}
  else{G.screen='results'}
  render();window.scrollTo({top:0,behavior:'smooth'});
}

function resetGame(){
  G.qi=0;G.score=0;G.streak=0;G.best=0;G.answered=false;G.sel=-1;G.results=[];G.topics={};
}

document.addEventListener('keydown',e=>{
  if(G.screen==='game'&&!G.answered){
    const m={'1':0,'2':1,'3':2,'4':3,'a':0,'b':1,'c':2,'d':3};
    if(m[e.key.toLowerCase()]!==undefined)answer(m[e.key.toLowerCase()]);
  }
  if(G.screen==='game'&&G.answered&&(e.key==='Enter'||e.key===' ')){e.preventDefault();next()}
  if(G.screen==='title'&&G.mode&&(e.key==='Enter'||e.key===' ')){e.preventDefault();G.screen='game';render()}
});

render();
</script>
</body>
</html>
