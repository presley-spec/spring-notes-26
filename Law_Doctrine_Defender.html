<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law Doctrine Defender - Final Exam Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242836;
            --border: #2e3347;
            --text: #e8eaf0;
            --text-dim: #8b8fa3;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --green: #00b894;
            --green-bg: rgba(0,184,148,0.12);
            --red: #ff6b6b;
            --red-bg: rgba(255,107,107,0.12);
            --orange: #fdcb6e;
            --orange-bg: rgba(253,203,110,0.12);
            --blue: #74b9ff;
            --property: #e17055;
            --conlaw: #0984e3;
            --criminal: #6c5ce7;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-light), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-dim);
            font-size: 14px;
        }

        .course-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 24px 0;
            flex-wrap: wrap;
        }

        .course-tab {
            padding: 8px 20px;
            border-radius: 24px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .course-tab:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .course-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .course-tab[data-course="property"].active {
            background: var(--property);
            border-color: var(--property);
        }

        .course-tab[data-course="conlaw"].active {
            background: var(--conlaw);
            border-color: var(--conlaw);
        }

        .course-tab[data-course="criminal"].active {
            background: var(--criminal);
            border-color: var(--criminal);
        }

        .home-screen {
            display: block;
        }

        .home-screen.hidden {
            display: none;
        }

        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 13px;
            text-align: center;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-light);
        }

        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            line-height: 1.5;
        }

        .option:hover {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.08);
        }

        .option.selected {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.12);
        }

        .option.correct {
            border-color: var(--green);
            background: var(--green-bg);
            color: var(--green);
        }

        .option.incorrect {
            border-color: var(--red);
            background: var(--red-bg);
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .explanation {
            margin-top: 20px;
            padding: 16px;
            background: rgba(108, 92, 231, 0.08);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation strong {
            color: var(--accent-light);
        }

        .action-button {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .action-button:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        .action-button:disabled {
            background: var(--text-dim);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--surface2);
            border-radius: 3px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            transition: width 0.3s ease;
        }

        .results-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .results-screen.active {
            display: block;
        }

        .score-large {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .results-label {
            font-size: 18px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        .difficulty-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin: 2px;
        }

        .difficulty-easy {
            background: rgba(0, 184, 148, 0.2);
            color: var(--green);
        }

        .difficulty-medium {
            background: rgba(253, 203, 110, 0.2);
            color: var(--orange);
        }

        .difficulty-hard {
            background: rgba(255, 107, 107, 0.2);
            color: var(--red);
        }

        .back-button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
        }

        .back-button:hover {
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Law Doctrine Defender</h1>
            <p>Master the doctrines. Ace the final exam.</p>
        </div>

        <!-- HOME SCREEN -->
        <div class="home-screen" id="homeScreen">
            <div class="course-tabs" id="courseFilters">
                <button class="course-tab active" data-course="all">All Courses</button>
                <button class="course-tab" data-course="criminal">Criminal Law</button>
                <button class="course-tab" data-course="conlaw">Constitutional Law</button>
                <button class="course-tab" data-course="property">Property Law</button>
            </div>

            <div id="difficultySelection">
                <div style="text-align: center; margin: 40px 0;">
                    <p style="color: var(--text-dim); margin-bottom: 20px;">Select a difficulty to begin:</p>
                    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                        <button class="action-button" onclick="startQuiz('easy')" style="background: var(--green);">Easy</button>
                        <button class="action-button" onclick="startQuiz('medium')" style="background: var(--orange);">Medium</button>
                        <button class="action-button" onclick="startQuiz('hard')" style="background: var(--red);">Hard</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div class="game-screen" id="gameScreen">
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-label">Question</div>
                    <div class="stat-value"><span id="currentQuestion">1</span>/<span id="totalQuestions">10</span></div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Correct</div>
                    <div class="stat-value" style="color: var(--green);" id="correctCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="currentScore">0%</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>

            <div class="question-card">
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="explanation" id="explanation"></div>
                <button class="action-button" id="nextButton" onclick="nextQuestion()" style="display: none;">Next Question</button>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div class="results-screen" id="resultsScreen">
            <h2>Quiz Complete!</h2>
            <div class="score-large" id="finalScore">0/0</div>
            <div class="results-label">You got it right</div>
            <div id="resultMessage" style="color: var(--text-dim); margin: 20px 0; font-size: 16px;"></div>
            <button class="action-button" onclick="backToHome()" style="margin-top: 24px;">Back to Home</button>
        </div>
    </div>

    <script>
        const questions = [
            // CRIMINAL LAW - ATTEMPT (6 questions)
            {
                id: 1,
                course: 'criminal',
                difficulty: 'medium',
                question: 'What is the MPC substantial step test for criminal attempt?',
                options: [
                    'A voluntary and intentional act that begins the commission of a crime',
                    'A strong corroborative of the intent to commit the target crime',
                    'An overt act that shows preparation is complete and no further preparation is needed',
                    'Any preparatory act beyond forming a criminal intent'
                ],
                correct: 1,
                explanation: 'The MPC substantial step test requires an act that is strongly corroborative of criminal intent—going beyond mere preparation. It must be the type of conduct that presents a substantial risk that the crime will be committed if the defendant\'s intent is to commit it. Key case: United States v. Straffen.'
            },
            {
                id: 2,
                course: 'criminal',
                difficulty: 'hard',
                question: 'How does State v. Lyerla limit attempt liability?',
                options: [
                    'Attempt is limited to felonies only, not misdemeanors',
                    'Cannot attempt crimes where the mens rea is merely recklessness or negligence',
                    'Attempt requires two separate substantial steps, not just one',
                    'Attempt liability only applies when the defendant completes half the criminal act'
                ],
                correct: 1,
                explanation: 'Lyerla establishes that attempt liability is limited to specific-intent or purposeful crimes. You cannot attempt a crime where the required mens rea is recklessness or negligence alone. This reflects the policy that attempt law focuses on dangerous dispositions revealed by purposeful conduct, not mere risk-taking.'
            },
            {
                id: 3,
                course: 'criminal',
                difficulty: 'medium',
                question: 'What is factual impossibility in criminal attempt?',
                options: [
                    'An affirmative defense that completely exonerates the defendant',
                    'The impossibility of completing the crime due to facts unknown to the defendant',
                    'A legal defense when the defendant mistakenly believed the conduct was criminal',
                    'The defendant\'s inability to form the specific intent required for the crime'
                ],
                correct: 1,
                explanation: 'Factual impossibility is NOT a defense. Example: D reaches into an empty pocket intending to steal, believing there is money inside. D can be convicted of attempted larceny because D had the requisite intent and took a substantial step. The law focuses on D\'s intent, not the actual state of facts.'
            },
            {
                id: 4,
                course: 'criminal',
                difficulty: 'medium',
                question: 'What is legal impossibility in criminal attempt?',
                options: [
                    'The defendant\'s conduct cannot succeed because of legal barriers or definitions',
                    'The defendant lacks the legal capacity to commit the crime',
                    'The crime is not defined in the relevant jurisdiction\'s penal code',
                    'The defendant miscalculates the legal consequences of their conduct'
                ],
                correct: 0,
                explanation: 'Legal impossibility IS a defense to attempt. It occurs when the defendant\'s intended conduct, if successful, would not constitute a crime. Example: D receives stolen property believing it to be stolen, but it was actually lawfully obtained. D cannot attempt to receive stolen property if the property is not actually stolen, as this would not be the crime charged.'
            },
            {
                id: 5,
                course: 'criminal',
                difficulty: 'hard',
                question: 'What is the abandonment/renunciation defense under the MPC?',
                options: [
                    'Any decision by the defendant not to complete the crime',
                    'Complete and voluntary renunciation of the intent to commit the crime, made before the crime is completed',
                    'Abandonment motivated by fear of detection or arrest',
                    'Withdrawal from a conspiracy that prevents the crime from occurring'
                ],
                correct: 1,
                explanation: 'Under MPC § 5.01(4), the defendant can escape attempt liability by complete and voluntary renunciation. The renunciation must be genuine—not motivated by fear of detection or changed circumstances. The defendant must also perform acts that accomplish the complete and voluntary renunciation, demonstrating a true change of purpose.'
            },
            {
                id: 6,
                course: 'criminal',
                difficulty: 'hard',
                question: 'What did People v. Rizzo hold about attempt liability?',
                options: [
                    'Preparation alone can be sufficient for attempt if the defendant shows clear intent',
                    'Preparation is insufficient; the defendant must reach dangerous proximity to completing the crime',
                    'Any conduct beyond mere thought is sufficient for criminal attempt',
                    'The defendant must have committed at least 50% of the target crime'
                ],
                correct: 1,
                explanation: 'Rizzo established the "dangerous proximity" test. The court held that D\'s conduct, even though detailed planning and preparation occurred, was only in the preparatory stage. There was no dangerous proximity to actual commission. The crime must be in progress or imminent; remote preparatory acts are insufficient.'
            },

            // CRIMINAL LAW - COMPLICITY (5 questions)
            {
                id: 7,
                course: 'criminal',
                difficulty: 'medium',
                question: 'What is the People v. Beeman standard for accomplice liability?',
                options: [
                    'The accomplice must provide some form of aid or assistance to the principal',
                    'The accomplice must intend to aid the principal AND know the principal\'s criminal purpose',
                    'The accomplice must have knowledge of the crime before it is committed',
                    'The accomplice must be present at the scene of the crime'
                ],
                correct: 1,
                explanation: 'Beeman requires dual intent: (1) the intent to aid the principal, and (2) knowledge of the principal\'s criminal purpose. Merely providing assistance is not enough—the accomplice must intend to facilitate the crime and know the specific crime being committed. This heightened standard protects innocent bystanders who provide general aid.'
            },
            {
                id: 8,
                course: 'criminal',
                difficulty: 'hard',
                question: 'What is the Pinkerton doctrine in conspiracy law?',
                options: [
                    'Co-conspirators are each liable only for crimes they personally commit during the conspiracy',
                    'Co-conspirators are jointly and severally liable for any crime committed by any co-conspirator in furtherance of the conspiracy, whether foreseeable or not',
                    'Co-conspirators are liable only for foreseeable crimes committed by fellow conspirators during the conspiracy',
                    'Co-conspirators can only be prosecuted if they actively participated in committing the target crime'
                ],
                correct: 2,
                explanation: 'Under Pinkerton (U.S. Supreme Court case), co-conspirators are liable for foreseeable crimes committed by fellow conspirators in furtherance of the conspiracy. This creates liability beyond the agreed-upon objective for crimes that are a natural and probable consequence of the conspiracy. This doctrine has been criticized and narrowed in many jurisdictions.'
            },
            {
                id: 9,
                course: 'criminal',
                difficulty: 'medium',
                question: 'How does accomplice liability differ from accessory after the fact liability?',
                options: [
                    'Accomplice liability requires presence at the crime; accessory liability does not',
                    'Accomplice aids before or during the crime; accessory aids after the crime is complete',
                    'Accomplices share principal liability; accessories have no liability for the underlying crime',
                    'Accessory liability carries harsher penalties than accomplice liability'
                ],
                correct: 1,
                explanation: 'Accomplices aid in the commission of the crime itself (before or during). Accessories after the fact provide aid after the crime is complete (harboring, concealing, etc.). Accessories have not aided the commission of the crime and are guilty of a separate, usually lesser offense.'
            },
            {
                id: 10,
                course: 'criminal',
                difficulty: 'hard',
                question: 'What is the natural and probable consequences doctrine?',
                options: [
                    'Accomplices are liable only for crimes they directly aided or abetted',
                    'Accomplices are liable for all foreseeable crimes of the principal, even if unintended by the accomplice',
                    'Accomplices are liable for crimes they could have prevented',
                    'Accomplices must have intended all natural consequences of their aid'
                ],
                correct: 1,
                explanation: 'Under this doctrine, accomplices are liable for foreseeable crimes of the principal that are natural and probable consequences of the crime aided, even if the accomplice didn\'t intend those crimes. However, this doctrine is being rejected by modern courts and the Beeman standard (requiring knowledge and intent) is increasingly preferred.'
            },
            {
                id: 11,
                course: 'criminal',
                difficulty: 'medium',
                question: 'What does United States v. Falcone establish about supplier liability?',
                options: [
                    'Suppliers of materials are automatically accomplices if the materials are used in a crime',
                    'Mere knowledge of illegal use is insufficient; the supplier must have specific intent to facilitate the crime',
                    'Suppliers have an affirmative duty to prevent their products from being used in crimes',
                    'Suppliers cannot be charged with accomplice liability, only the user can be charged'
                ],
                correct: 1,
                explanation: 'Falcone holds that mere knowledge that materials will be used illegally is not enough for accomplice liability. The supplier must have specific intent to facilitate the crime. Selling a gun to someone, knowing they might use it to commit robbery, does not make the seller an accomplice without proof of intent to aid the crime.'
            },

            // CRIMINAL LAW - CONSPIRACY (5 questions)
            {
                id: 12,
                course: 'criminal',
                difficulty: 'medium',
                question: 'What are the elements of conspiracy?',
                options: [
                    'Agreement + intent to agree + overt act only',
                    'Agreement + intent to agree + intent to commit the target crime + overt act (in most jurisdictions)',
                    'Agreement + actual commission of the target crime',
                    'Multiple parties + shared criminal purpose + one completed crime'
                ],
                correct: 1,
                explanation: 'Common law and most modern formulations require: (1) agreement between two or more persons, (2) the intent to agree, (3) the intent to commit the target crime, and (4) an overt act in furtherance (in most jurisdictions). The MPC is similar. Some jurisdictions don\'t require an overt act if the agreement is for an inherently dangerous crime.'
            },
            {
                id: 13,
                course: 'criminal',
                difficulty: 'hard',
                question: 'What is a wheel conspiracy structure?',
                options: [
                    'A linear arrangement where each conspirator deals with the next in sequence',
                    'A conspiracy with one central conspirator (hub) dealing with separate conspirators (spokes)',
                    'A conspiracy among equal partners with no clear leader or hierarchy',
                    'A temporary conspiracy formed to commit a single specific crime'
                ],
                correct: 1,
                explanation: 'In a wheel conspiracy, there is a central hub (the main conspirator) who deals with separate spokes (other conspirators). The spokes may not know each other. For a single conspiracy to exist, the hub must typically know of or connect with the other spokes, creating mutual knowledge of the conspiracy\'s scope.'
            },
            {
                id: 14,
                course: 'criminal',
                difficulty: 'hard',
                question: 'What is a chain conspiracy structure?',
                options: [
                    'A conspiracy where each conspirator knows all other conspirators',
                    'A sequential arrangement where each conspirator in turn deals with the next, all as part of a single conspiracy objective',
                    'A conspiracy that includes criminal acts occurring at different times',
                    'A conspiracy involving multiple crimes committed in succession'
                ],
                correct: 1,
                explanation: 'In a chain conspiracy, each party deals in turn with the next (e.g., manufacturer → distributor → wholesaler → retailer). All are considered part of a single conspiracy because each knows their role serves a common objective, even if they don\'t all know each other. Contrast with wheel conspiracies.'
            },
            {
                id: 15,
                course: 'criminal',
                difficulty: 'medium',
                question: 'How does withdrawal from a conspiracy work?',
                options: [
                    'A conspirator is automatically relieved of liability by announcing their withdrawal at any time',
                    'Affirmative action is required to withdraw, plus notice to co-conspirators; withdrawer is still liable for prior acts',
                    'Withdrawal completely relieves the withdrawing conspirator of all liability, past and future',
                    'Withdrawal only works if it prevents the target crime from being committed'
                ],
                correct: 1,
                explanation: 'Withdrawal requires affirmative action (not just silence) and notice to co-conspirators (or public acts inconsistent with participation). The withdrawing member remains liable for crimes committed before withdrawal and prior conspirators\' acts. Future crimes are the withdrawer\'s responsibility only if they\'re part of prior plans or foreseeable.'
            },
            {
                id: 16,
                course: 'criminal',
                difficulty: 'hard',
                question: 'What did Jacobson v. United States hold about entrapment?',
                options: [
                    'Government agents cannot testify as witnesses in entrapment cases',
                    'The government cannot manufacture a crime in someone predisposed to commit it',
                    'The government cannot manufacture a crime where none would exist without government inducement',
                    'Entrapment is only a defense if the defendant was completely innocent of any criminal history'
                ],
                correct: 2,
                explanation: 'Jacobson established that a key element of entrapment is whether the government created a crime that would not otherwise exist. Even if a defendant has prior criminal history, entrapment may apply if the government\'s inducement created the specific crime. The focus is on whether the defendant was ready and willing, not on prior bad acts.'
            },

            // CRIMINAL LAW - THEFT (6 questions)
            {
                id: 17,
                course: 'criminal',
                difficulty: 'easy',
                question: 'What are the elements of common law larceny?',
                options: [
                    'Intentional taking + carrying away of personal property with intent to permanently deprive',
                    'Trespassory taking + carrying away + personal property + intent to permanently deprive',
                    'Unauthorized possession + intent to use the property as one\'s own',
                    'Taking property + knowing it is not lawfully yours'
                ],
                correct: 1,
                explanation: 'Larceny requires: (1) a trespassory taking (without consent), (2) carrying away (asportation), (3) of personal property (not real property), and (4) with intent to permanently deprive the owner of the property. The "trespassory" element distinguishes larceny from other crimes and protects those who lawfully possess property.'
            },
            {
                id: 18,
                course: 'criminal',
                difficulty: 'medium',
                question: 'How does embezzlement differ from larceny?',
                options: [
                    'Embezzlement requires physical taking; larceny does not',
                    'Embezzlement starts with lawful possession then converts property; larceny starts with unlawful taking',
                    'Embezzlement is less serious than larceny',
                    'Embezzlement requires the defendant to use the property personally; larceny does not'
                ],
                correct: 1,
                explanation: 'Embezzlement occurs when someone lawfully possesses property (e.g., as an employee, trustee, or bailee) and then converts it to their own use. Larceny requires a trespassory taking. Embezzlement was created because larceny\'s "trespassory" element didn\'t capture wrongdoing by people with lawful possession.'
            },
            {
                id: 19,
                course: 'criminal',
                difficulty: 'medium',
                question: 'What is larceny by trick, and how does it differ from false pretenses?',
                options: [
                    'Larceny by trick and false pretenses are the same offense',
                    'Larceny by trick obtains possession through fraud; false pretenses obtains title through fraud',
                    'False pretenses requires written statements; larceny by trick does not',
                    'Larceny by trick is less serious than false pretenses'
                ],
                correct: 1,
                explanation: 'In larceny by trick, the defendant obtains possession (but not title) through fraud or misrepresentation. Example: renting a car under false pretenses and selling it. In false pretenses, the defendant obtains title (ownership) through fraud. Example: selling fake diamonds and pocketing the cash. Larceny by trick is treated as larceny; false pretenses is a separate offense.'
            },
            {
                id: 20,
                course: 'criminal',
                difficulty: 'easy',
                question: 'What are the elements of robbery?',
                options: [
                    'Taking property by force without intent to return it',
                    'Larceny + force or threat of immediate harm during the taking',
                    'Any theft committed with a weapon',
                    'Force + property + permanent deprivation'
                ],
                correct: 1,
                explanation: 'Robbery is larceny (all elements) accomplished through force, threat of immediate harm, or intimidation. The force/threat must occur before or during the taking; theft followed by force is not robbery. Robbery is treated as a violent felony due to the risk of harm to the victim. The defendant need not be armed, but using force against the person is critical.'
            },
            {
                id: 21,
                course: 'criminal',
                difficulty: 'hard',
                question: 'What is honest services fraud after the Skilling v. United States decision?',

        let currentQuestionIndex = 0;
        let score = 0;
        let selectedCourse = 'all';
        let selectedDifficulty = 'medium';
        let filteredQuestions = [];
        let answered = false;

        function filterQuestions() {
            let filtered = questions;
            if (selectedCourse !== 'all') {
                filtered = filtered.filter(q => q.course === selectedCourse);
            }
            return filtered;
        }

        function startQuiz(difficulty) {
            selectedDifficulty = difficulty;
            filteredQuestions = filterQuestions().filter(q => q.difficulty === difficulty);

            if (filteredQuestions.length === 0) {
                alert('No questions available for this selection.');
                return;
            }

            currentQuestionIndex = 0;
            score = 0;
            answered = false;

            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.add('active');
            document.getElementById('totalQuestions').textContent = filteredQuestions.length;

            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= filteredQuestions.length) {
                endQuiz();
                return;
            }

            const q = filteredQuestions[currentQuestionIndex];
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('explanation').classList.remove('show');
            document.getElementById('explanation').innerHTML = '';
            document.getElementById('nextButton').style.display = 'none';

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            q.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = option;
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });

            updateProgressBar();
        }

        function selectOption(index) {
            if (answered) return;

            answered = true;
            const q = filteredQuestions[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            const isCorrect = index === q.correct;

            if (isCorrect) {
                score++;
            }

            options.forEach((opt, idx) => {
                opt.classList.add('disabled');
                if (idx === q.correct) {
                    opt.classList.add('correct');
                } else if (idx === index && !isCorrect) {
                    opt.classList.add('incorrect');
                }
            });

            document.getElementById('correctCount').textContent = score;
            document.getElementById('currentScore').textContent = Math.round((score / (currentQuestionIndex + 1)) * 100) + '%';

            document.getElementById('explanation').innerHTML = '<strong>Explanation:</strong> ' + q.explanation;
            document.getElementById('explanation').classList.add('show');
            document.getElementById('nextButton').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            answered = false;
            loadQuestion();
        }

        function updateProgressBar() {
            const progress = ((currentQuestionIndex) / filteredQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function endQuiz() {
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('resultsScreen').classList.add('active');

            const percentage = Math.round((score / filteredQuestions.length) * 100);
            document.getElementById('finalScore').textContent = `${score}/${filteredQuestions.length}`;

            let message = '';
            if (percentage === 100) {
                message = 'Perfect score! You\'ve mastered this material!';
            } else if (percentage >= 90) {
                message = 'Excellent work! You\'re well-prepared for the exam.';
            } else if (percentage >= 80) {
                message = 'Great job! You understand most of the doctrines.';
            } else if (percentage >= 70) {
                message = 'Good effort. Review the material you missed.';
            } else if (percentage >= 60) {
                message = 'You\'re on the right track. Study harder.';
            } else {
                message = 'Keep studying. You\'ll get there!';
            }

            document.getElementById('resultMessage').textContent = `${percentage}% Correct - ${message}`;
        }

        function backToHome() {
            document.getElementById('resultsScreen').classList.remove('active');
            document.getElementById('homeScreen').classList.remove('hidden');
        }

        // Course filter setup
        document.querySelectorAll('.course-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                selectedCourse = this.dataset.course;
            });
        });
    </script>
