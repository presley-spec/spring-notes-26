<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criminal Law Study Platform</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root {
      min-height: 100vh;
    }

    .dark-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
    .card-bg { background-color: #0f3460; }
    .dark-input {
      background-color: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #404060;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: inherit;
    }
    .dark-input:focus {
      outline: none;
      border-color: #d94a4a;
      box-shadow: 0 0 8px rgba(217, 74, 74, 0.3);
    }

    .text-red { color: #d94a4a; }
    .bg-red { background-color: #d94a4a; }
    .bg-red-hover:hover { background-color: #e85555; }
    .border-red-l { border-left: 4px solid #d94a4a; }
    .border-red-t { border-top: 4px solid #d94a4a; }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-primary {
      background-color: #d94a4a;
      color: white;
    }
    .btn-primary:hover {
      background-color: #e85555;
    }
    .btn-primary:disabled {
      background-color: #666;
      cursor: not-allowed;
    }

    .btn-secondary {
      background-color: #404060;
      color: #e0e0e0;
    }
    .btn-secondary:hover {
      background-color: #505080;
    }

    .btn-success {
      background-color: #4a9d6f;
      color: white;
    }
    .btn-success:hover {
      background-color: #5aad7f;
    }

    .btn-lg {
      padding: 16px 24px;
      font-size: 16px;
    }

    .progress-bar {
      height: 12px;
      background-color: #404060;
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #d94a4a, #ff6b6b);
      transition: width 0.3s ease;
    }

    .container {
      padding: 32px;
      max-width: 900px;
      margin: 0 auto;
    }

    .heading-lg { font-size: 32px; font-weight: bold; }
    .heading-md { font-size: 24px; font-weight: bold; }
    .heading-sm { font-size: 18px; font-weight: bold; }

    .text-muted { color: #a0a0a0; }
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 11px; }

    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .mb-8 { margin-bottom: 32px; }

    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .flex { display: flex; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .flex-col { display: flex; flex-direction: column; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .badge-red { background-color: #d94a4a; color: white; }
    .badge-gray { background-color: #404060; color: #e0e0e0; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
    }

    .modal {
      background-color: #0f3460;
      border-radius: 8px;
      border-left: 4px solid #d94a4a;
      max-width: 500px;
      width: 100%;
    }

    .modal-content {
      padding: 32px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      padding: 16px;
      margin-bottom: 12px;
      background-color: #1a1a2e;
      border: 1px solid #404060;
      border-radius: 6px;
      color: #e0e0e0;
      cursor: pointer;
      transition: all 0.2s;
    }

    .option-btn:hover {
      border-color: #d94a4a;
      background-color: #252540;
    }

    .option-btn.selected {
      border-color: #d94a4a;
      background-color: #2a2a42;
    }

    textarea.dark-input {
      width: 100%;
      resize: vertical;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 14px;
    }

    .stat-box {
      flex: 1;
    }

    .stat-value { font-size: 32px; font-weight: bold; }

    .hyperlink { color: #d94a4a; text-decoration: none; cursor: pointer; }
    .hyperlink:hover { text-decoration: underline; }

    .icon { display: inline-block; margin-right: 6px; }

    /* Timer styles */
    .timer-display {
      font-size: 24px;
      font-weight: bold;
      color: #d94a4a;
      text-align: right;
    }

    .timer-label {
      font-size: 12px;
      color: #a0a0a0;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .grid-2, .grid-4 {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 16px;
      }

      .heading-lg {
        font-size: 24px;
      }

      .modal-overlay {
        padding: 16px;
      }
    }

    /* Specific Level 3 styles */
    .issue-card {
      background-color: #1a1a2e;
      border: 1px solid #404060;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .issue-card.selected {
      border-color: #d94a4a;
      background-color: #2a2a42;
    }

    .trigger-fact {
      background-color: #16213e;
      border-left: 3px solid #d94a4a;
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 4px;
      font-size: 13px;
    }

    .timer-warning {
      background-color: rgba(217, 74, 74, 0.1);
      border: 1px solid #d94a4a;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    /* Level 4 exam styles */
    .exam-section {
      margin-bottom: 24px;
    }

    .exam-section-title {
      font-weight: bold;
      color: #d94a4a;
      margin-bottom: 12px;
      font-size: 14px;
      text-transform: uppercase;
    }

    .word-count {
      font-size: 12px;
      color: #a0a0a0;
      margin-top: 4px;
    }

    .rubric-item {
      background-color: #1a1a2e;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      border-left: 3px solid #404060;
    }

    .rubric-item.important {
      border-left-color: #d94a4a;
    }

    .locked-answer {
      background-color: #1a1a2e;
      border: 2px solid #d94a4a;
      padding: 16px;
      border-radius: 6px;
      text-align: center;
    }

    .break-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .fatigue-warning {
      background-color: rgba(255, 160, 0, 0.1);
      border: 1px solid #ffa000;
      padding: 12px;
      border-radius: 6px;
      color: #ffa000;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .analogy-box {
      background: linear-gradient(135deg, rgba(217, 74, 74, 0.1) 0%, rgba(74, 157, 111, 0.05) 100%);
      border: 1px solid rgba(217, 74, 74, 0.3);
      border-radius: 6px;
      padding: 16px;
      margin-top: 16px;
      border-left: 4px solid #d94a4a;
    }

    .analogy-icon {
      font-size: 20px;
      margin-right: 8px;
      display: inline-block;
    }

    .analogy-title {
      font-weight: bold;
      color: #d94a4a;
      margin-bottom: 8px;
      font-size: 13px;
      text-transform: uppercase;
    }

    .analogy-text {
      color: #c0c0c0;
      font-size: 13px;
      line-height: 1.5;
      font-style: italic;
    }
  </style>
</head>

                  <div className="progress-bar">
                    <div className="progress-fill" style={{ width: `${masteryScores[3]}%` }}></div>
                  </div>
                  <p className="text-xs text-muted mt-2">{masteryScores[3]}% complete</p>
                </div>

                <div className="card-bg border-red-t" style={{ padding: '20px', borderRadius: '8px' }}>

      }

      // ===== RULE BANK PAGE =====
      if (phase === 'rulebank') {
        const chapters = {
          'Ch 1-9: Actus Reus & Omissions': RULES.slice(0, 9),
          'Ch 10-13: Mens Rea': RULES.slice(9, 13),
          'Ch 14-20: Defenses I': RULES.slice(13, 20),
          'Ch 21-25: Defenses II': RULES.slice(20, 25),
          'Ch 26-28: Homicide I': RULES.slice(25, 28),
          'Ch 29-34: Homicide II': RULES.slice(28, 34),
          'Ch 35-39: Sex Crimes': RULES.slice(34, 39),
          'Ch 40-42: Theft': RULES.slice(39, 42),
          'Ch 43-49: Inchoate': RULES.slice(42, 49),
          'Ch 50-55: Accomplice': RULES.slice(49, 55),
          'Ch 56-57: Cross-Cutting': RULES.slice(55, 57)
        };

        const filteredRules = RULES.filter(rule =>
          rule.name.toLowerCase().includes(ruleSearchTerm.toLowerCase()) ||
          rule.analogy.toLowerCase().includes(ruleSearchTerm.toLowerCase()) ||
          rule.elements.some(e => e.toLowerCase().includes(ruleSearchTerm.toLowerCase()))

          <div className="dark-bg" style={{ minHeight: '100vh', paddingBottom: '40px' }}>

                  <p className="text-muted mb-4">Found {filteredRules.length} rule(s)</p>

                          <div key={idx} className="card-bg border-red-t" style={{ padding: '16px', borderRadius: '8px' }}>

      // ===== LEVEL 1: RULE MASTERY =====
      if (phase === 'level1') {
        const question = LEVEL1_QUESTIONS[currentQuestion];
        const mastered = LEVEL1_QUESTIONS.filter(q => (questionStreaks[q.id] || 0) >= 2).length;
        const totalQuestions = LEVEL1_QUESTIONS.length;
        const masteryPercent = Math.round((mastered / totalQuestions) * 100);
        const currentStreak = questionStreaks[question.id] || 0;

        return (
          <div className="dark-bg" style={{ minHeight: '100vh' }}>
            <div className="container">
              <div style={{ marginBottom: '1rem' }}>
                <button onClick={() => { setPhase('landing'); setSessionActive(false); }} style={{ background: 'none', border: 'none', color: '#d94a4a', cursor: 'pointer', fontSize: '1rem', padding: '0.5rem 0' }}>← Back to Dashboard</button>
              </div>
              <div className="flex-between mb-8">
                <div>
                  <h2 className="heading-md text-red">Level 1: Rule Mastery</h2>
                  <p className="text-muted">{mastered}/{totalQuestions} questions mastered</p>
                </div>
                <div className="timer-display">
                  {formatTime(sessionTimer)}
                  <p className="timer-label">Session</p>
                </div>
              </div>

              <div className="progress-bar mb-8">
                <div className="progress-fill" style={{ width: `${masteryPercent}%` }}></div>
              </div>

              <div className="card-bg border-red-l" style={{ padding: '24px', borderRadius: '8px', marginBottom: '24px' }}>
                <div className="gap-2 mb-4" style={{ display: 'flex', gap: '8px', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div style={{ display: 'flex', gap: '8px' }}>
                    <span className="badge badge-red">{question.type.toUpperCase()}</span>
                    <span className="badge badge-gray">{question.doctrine}</span>
                  </div>
                  <div style={{ display: 'flex', gap: '4px' }}>
                    {currentStreak >= 1 && <span style={{ fontSize: '18px' }}>✓</span>}
                    {currentStreak >= 2 && <span style={{ fontSize: '18px' }}>✓</span>}
                    {currentStreak < 2 && <span style={{ fontSize: '18px', color: '#666' }}>○</span>}
                  </div>
                </div>

                <h3 className="heading-sm mb-6">{question.question}</h3>

                {question.type === 'ruleMatching' && (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                    {question.options.map((opt, idx) => (
                      <button
                        key={idx}
                        onClick={() => {
                          setSelectedAnswerText(opt.text);
                          const isCorrect = opt.correct === true;
                          handleLevel1Answer(isCorrect);
                          setShowModel(true);
                        }}
                        className="option-btn"
                      >
                        <p style={{ fontWeight: 'bold', marginBottom: '8px' }}>{opt.text}</p>
                        {showModel && selectedAnswerText === opt.text && (
                          <p style={{ fontSize: '13px', color: '#a0a0a0' }}>{opt.reasoning}</p>
                        )}
                      </button>
                    ))}
                    {showModel && question.analogyHint && (
                      <div className="analogy-box">
                        <div className="analogy-title"><span className="analogy-icon">{RULES.find(r => r.id === question.ruleId)?.icon}</span>Connect it:</div>
                        <div className="analogy-text">{question.analogyHint}</div>
                      </div>
                    )}
                  </div>
                )}

                {question.type === 'truefalse' && (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                    {[true, false].map((val) => (
                      <button
                        key={String(val)}
                        onClick={() => {
                          const isCorrect = val === question.answer;
                          handleLevel1Answer(isCorrect);
                          setSelectedAnswerText(val ? 'TRUE' : 'FALSE');
                          setShowModel(true);
                        }}
                        className="option-btn"
                      >
                        <p style={{ fontWeight: 'bold', fontSize: '16px' }}>{val ? 'TRUE' : 'FALSE'}</p>
                        {showModel && selectedAnswerText === (val ? 'TRUE' : 'FALSE') && (
                          <p style={{ fontSize: '13px', color: '#a0a0a0', marginTop: '8px' }}>{question.justification}</p>
                        )}
                      </button>
                    ))}

                      <div className="analogy-box">
                        <div className="analogy-title"><span className="analogy-icon">{RULES.find(r => r.id === question.ruleId)?.icon}</span>Connect it:</div>
                        <div className="analogy-text">{question.analogyHint}</div>
                      </div>
                    )}
                  </div>
                )}

                {question.type === 'fillTheGap' && (
                  <div>
                    <textarea className="dark-input" placeholder="Your answer..." rows={4} value={userAnswer} onChange={(e) => setUserAnswer(e.target.value)} />

                      <>
                        <p style={{ color: '#a0a0a0', marginTop: '12px', fontSize: '13px' }}>Model: {question.answer}</p>

                            <div className="analogy-title"><span className="analogy-icon">{RULES.find(r => r.id === question.ruleId)?.icon}</span>Connect it:</div>
                            <div className="analogy-text">{question.analogyHint}</div>
                          </div>

                          <button className="btn btn-success" onClick={() => { handleLevel1Answer(true); handleLevel1Next(); }} style={{ flex: 1 }}>✓ I got it right</button>

                )}

                {question.type === 'elementBreakdown' && (
                  <div>
                    <textarea className="dark-input" placeholder="Identify elements..." rows={6} value={userAnswer} onChange={(e) => setUserAnswer(e.target.value)} />

                        <div style={{ marginTop: '12px', padding: '12px', backgroundColor: '#1a1a2e', borderRadius: '6px' }}>

                        setShowModel(false);
                        setUserAnswer('');

                    <button className="btn btn-primary" onClick={handleLevel1Next} style={{ flex: 1 }}>Next →</button>

                    <button className="btn btn-success" onClick={handleLevel1Complete} style={{ flex: 1 }}>Complete Level 1 ✓</button>

      // ===== LEVEL 2: RULE APPLICATION =====
      if (phase === 'level2') {
        const hypo = LEVEL2_HYPOS[Math.min(currentQuestion, LEVEL2_HYPOS.length - 1)];

        return (

                      <button className="btn btn-secondary" onClick={() => setShowImpulseCheck(false)} style={{ width: '100%' }}>Submit Now</button>

                  </div>
                </div>

              <div className="card-bg border-red-l" style={{ padding: '24px', borderRadius: '8px', marginBottom: '24px' }}>

                <p style={{ marginBottom: '16px', lineHeight: '1.6' }}>{hypo.fact}</p>

                <div style={{ backgroundColor: '#1a1a2e', padding: '12px', borderRadius: '6px', marginBottom: '16px' }}>
                  <p style={{ fontSize: '13px', color: '#a0a0a0' }}><strong>Issue:</strong> {hypo.issue}</p>

                <textarea className="dark-input" placeholder="Write your IRAC answer..." rows={8} value={userAnswer} onChange={(e) => setUserAnswer(e.target.value)} />

                <button className="btn btn-primary" onClick={handleLevel2Submit} style={{ width: '100%', marginTop: '12px', marginBottom: '12px' }}>Submit Answer</button>

                {showModel && (
                  <div style={{ backgroundColor: '#1a1a2e', padding: '16px', borderRadius: '6px', borderLeft: '4px solid #4a9d6f' }}>
                    <h4 style={{ fontWeight: 'bold', color: '#4a9d6f', marginBottom: '12px' }}>Model IRAC Answer</h4>
                    <p style={{ fontSize: '13px', color: '#a0a0a0', whiteSpace: 'pre-wrap', lineHeight: '1.6' }}>{hypo.modelIRAC}</p>
                    <div style={{ marginTop: '16px', paddingTop: '12px', borderTop: '1px solid #404060' }}>
                      <p style={{ fontSize: '12px', color: '#a0a0a0' }}><strong>Review:</strong> {hypo.weaknesses.join(', ')}</p>
                    </div>
                  </div>
                )}
              </div>

              <div className="flex gap-4">
                <button
                  className="btn btn-secondary"
                  onClick={() => {
                    if (currentQuestion > 0) {
                      setCurrentQuestion(currentQuestion - 1);
                      setShowModel(false);
                      setUserAnswer('');
                    }
                  }}
                  style={{ flex: 1 }}
                >
                  ← Previous
                </button>
                <button className="btn btn-primary" onClick={handleLevel2Next} style={{ flex: 1 }}>Next →</button>
              </div>
            </div>
          </div>
        );
      }

      // ===== LEVEL 3: ISSUE SPOTTING =====
      if (phase === 'level3') {
        const hypo = LEVEL3_HYPOS[currentQuestion];

        if (level3Phase === 'landing') {
          return (
            <div className="dark-bg" style={{ minHeight: '100vh' }}>
              <div className="container">
                <div style={{ marginBottom: '1rem' }}>
                  <button onClick={() => { setPhase('landing'); setSessionActive(false); }} style={{ background: 'none', border: 'none', color: '#d94a4a', cursor: 'pointer', fontSize: '1rem', padding: '0.5rem 0' }}>← Back to Dashboard</button>
                </div>
                <h2 className="heading-md text-red mb-4">Level 3: Issue Spotting</h2>
                <p className="text-muted mb-8">Hypo {currentQuestion + 1} of {LEVEL3_HYPOS.length}</p>

                <div className="card-bg border-red-l" style={{ padding: '24px', borderRadius: '8px', marginBottom: '24px' }}>
                  <h3 className="heading-sm mb-4">{hypo.title}</h3>
                  <p style={{ marginBottom: '16px', lineHeight: '1.6', color: '#e0e0e0' }}>{hypo.facts}</p>

                  <h4 style={{ fontWeight: 'bold', color: '#d94a4a', marginTop: '16px', marginBottom: '8px' }}>Trigger Facts (Clues):</h4>
                  {hypo.triggerFacts.map((tf, idx) => (
                    <div key={idx} className="trigger-fact">{tf}</div>
                  ))}
                </div>

                <button className="btn btn-primary btn-lg" onClick={handleLevel3Start} style={{ width: '100%' }}>Start Issue Spotting</button>
              </div>
            </div>
          );
        }

        if (level3Phase === 'spot') {
          return (
            <div className="dark-bg" style={{ minHeight: '100vh' }}>
              <div className="container">
                <h2 className="heading-md text-red mb-4">Level 3 - Phase 1: Spot Issues</h2>
                <p className="text-muted mb-8">Select all the criminal law issues you identify in this hypo</p>

                <div className="card-bg border-red-l" style={{ padding: '24px', borderRadius: '8px', marginBottom: '24px' }}>
                  <h3 className="heading-sm mb-4">{hypo.title}</h3>
                  <p style={{ marginBottom: '16px', lineHeight: '1.6' }}>{hypo.facts}</p>

                  <h4 style={{ fontWeight: 'bold', color: '#d94a4a', marginTop: '16px', marginBottom: '12px' }}>Potential Issues:</h4>
                  {hypo.issues.map((issue, idx) => (
                    <button
                      key={idx}
                      onClick={() => {
                        if (selectedIssues.includes(idx)) {
                          setSelectedIssues(selectedIssues.filter(i => i !== idx));
                        } else {
                          setSelectedIssues([...selectedIssues, idx]);
                        }
                      }}
                      className="issue-card"
                      style={selectedIssues.includes(idx) ? { borderColor: '#d94a4a', backgroundColor: '#2a2a42' } : {}}
                    >
                      <p style={{ textAlign: 'left' }}>
                        {selectedIssues.includes(idx) ? '✓ ' : ''}{issue}
                      </p>
                    </button>
                  ))}
                </div>

                <button className="btn btn-primary btn-lg" onClick={handleLevel3Next} style={{ width: '100%' }}>Review My Selection ({selectedIssues.length} selected)</button>
              </div>
            </div>
          );
        }

        if (level3Phase === 'triage') {
          return (
            <div className="dark-bg" style={{ minHeight: '100vh' }}>
              <div className="container">
                <h2 className="heading-md text-red mb-4">Level 3 - Phase 2: Triage Issues</h2>
                <p className="text-muted mb-8">Prioritize your issues by severity/importance</p>

                <div className="card-bg border-red-l" style={{ padding: '24px', borderRadius: '8px', marginBottom: '24px' }}>
                  <h4 style={{ fontWeight: 'bold', marginBottom: '12px' }}>You identified {selectedIssues.length} issues:</h4>
                  {selectedIssues.map((idx) => (
                    <div key={idx} className="issue-card">
                      <p>{hypo.issues[idx]}</p>
                    </div>
                  ))}

                  <div style={{ marginTop: '24px', padding: '16px', backgroundColor: '#1a1a2e', borderRadius: '6px', borderLeft: '4px solid #4a9d6f' }}>
                    <h4 style={{ fontWeight: 'bold', color: '#4a9d6f', marginBottom: '8px' }}>Model Prioritization:</h4>
                    <p style={{ fontSize: '13px', color: '#a0a0a0', lineHeight: '1.6' }}>{hypo.modelPrioritization}</p>
                  </div>
                </div>

                <button className="btn btn-primary btn-lg" onClick={handleLevel3Next} style={{ width: '100%' }}>Next: Quick IRAC Analysis</button>
              </div>
            </div>
          );
        }

        if (level3Phase === 'irac') {
          return (
            <div className="dark-bg" style={{ minHeight: '100vh' }}>
              <div className="container">
                <div className="flex-between mb-4">
                  <h2 className="heading-md text-red">Level 3 - Phase 3: Quick IRAC</h2>
                  <div className="timer-display">
                    {formatTime(level3Timer)}
                    <p className="timer-label">5-min timer</p>
                  </div>
                </div>
                <p className="text-muted mb-8">Write a quick IRAC for your top priority issue (2-3 min read)</p>

                <div className="card-bg border-red-l" style={{ padding: '24px', borderRadius: '8px', marginBottom: '24px' }}>
                  <h3 className="heading-sm mb-4">{hypo.title}</h3>
                  <textarea className="dark-input" placeholder="Write quick IRAC for top priority issue..." rows={8} value={level3IRACAnswers[currentQuestion] || ''} onChange={(e) => setLevel3IRACAnswers({ ...level3IRACAnswers, [currentQuestion]: e.target.value })} />
                </div>

                <button className="btn btn-primary btn-lg" onClick={handleLevel3Next} style={{ width: '100%' }}>Next Hypo →</button>
              </div>
            </div>
          );
        }
      }

      // ===== LEVEL 4: FULL EXAM =====
      if (phase === 'level4') {
        const exam = LEVEL4_EXAMS[currentQuestion];
        const wordCount = examAnswers.split(/\s+/).filter(w => w).length;
        const mcAnswered = Object.keys(examMCAnswers).length;

        if (examLocked) {
          return (
            <div className="dark-bg" style={{ minHeight: '100vh' }}>
              <div className="break-screen">
                <div style={{ textAlign: 'center', maxWidth: '600px' }}>
                  <p style={{ fontSize: '64px', marginBottom: '24px' }}>⏱</p>
                  <h2 className="heading-md text-red mb-4">Exam Time Expired</h2>
                  <p className="text-muted mb-8">Your answers have been submitted automatically. Your exam has been locked.</p>
                  <p style={{ marginBottom: '24px' }}>
                    <strong>Essay Word Count:</strong> {wordCount} words<br/>
                    <strong>MC Answered:</strong> {mcAnswered} / {exam.mcQuestions.length}
                  </p>
                  <button className="btn btn-primary" onClick={() => { setPhase('landing'); setSessionActive(false); }} style={{ padding: '12px 24px' }}>Return to Landing</button>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="dark-bg" style={{ minHeight: '100vh' }}>
            <div className="container">
              <div className="flex-between mb-6">
                <div>
                  <h2 className="heading-md text-red">{exam.title}</h2>
                  <p className="text-muted">Exam {currentQuestion + 1} of {LEVEL4_EXAMS.length}</p>
                </div>
                <div className="timer-display">
                  {formatTime(examTimer)}
                  <p className="timer-label">Exam Time</p>
                </div>
              </div>

              {examTimer < 600 && (
                <div className="fatigue-warning" style={{ marginBottom: '16px' }}>
                  ⏰ Less than 10 minutes remaining. Finish your answers!
                </div>
              )}

              <div className="card-bg border-red-l" style={{ padding: '24px', borderRadius: '8px', marginBottom: '24px' }}>
                <div className="exam-section">
                  <div className="exam-section-title">70% - Essay Component</div>
                  <h4 style={{ fontWeight: 'bold', marginBottom: '12px' }}>Prompt:</h4>
                  <p style={{ marginBottom: '16px', color: '#a0a0a0' }}>{exam.prompt}</p>
                  <h4 style={{ fontWeight: 'bold', marginBottom: '12px' }}>Fact Pattern:</h4>
                  <p style={{ marginBottom: '24px', lineHeight: '1.6', color: '#a0a0a0' }}>{exam.scenario}</p>

                  <textarea className="dark-input" placeholder="Write your essay answer here. Maximum 5500 words..." rows={12} value={examAnswers} onChange={(e) => setExamAnswers(e.target.value)} />
                  <p className="word-count">Word count: {wordCount} / 5500</p>
                </div>

                <div className="exam-section" style={{ marginTop: '32px', paddingTop: '24px', borderTop: '1px solid #404060' }}>
                  <div className="exam-section-title">30% - Multiple Choice</div>
                  <p style={{ marginBottom: '16px', color: '#a0a0a0' }}>Answer all {exam.mcQuestions.length} questions.</p>

                  {exam.mcQuestions.map((mc, idx) => (
                    <div key={idx} style={{ marginBottom: '24px' }}>
                      <p style={{ fontWeight: 'bold', marginBottom: '12px' }}>Q{idx + 1}: {mc.q}</p>
                      {mc.options.map((opt, optIdx) => (
                        <button
                          key={optIdx}
                          onClick={() => setExamMCAnswers({ ...examMCAnswers, [idx]: optIdx })}
                          className="option-btn"
                          style={examMCAnswers[idx] === optIdx ? { borderColor: '#d94a4a', backgroundColor: '#2a2a42' } : {}}
                        >
                          {examMCAnswers[idx] === optIdx ? '✓ ' : ''}{opt}
                        </button>
                      ))}
                    </div>
                  ))}
                </div>

                <div style={{ marginTop: '32px', padding: '16px', backgroundColor: '#1a1a2e', borderRadius: '6px', borderLeft: '4px solid #d94a4a' }}>
                  <h4 style={{ fontWeight: 'bold', marginBottom: '8px', color: '#d94a4a' }}>Rubric:</h4>
                  <p style={{ fontSize: '13px', color: '#a0a0a0', lineHeight: '1.6' }}>{exam.rubric}</p>
                </div>
              </div>

              <button className="btn btn-success btn-lg" onClick={handleLevel4Submit} style={{ width: '100%' }}>Submit Exam</button>
            </div>
          </div>
        );
      }

      return <div className="dark-bg"><div className="container"><p>Loading...</p></div></div>;
    }

    // Render app
    ReactDOM.createRoot(document.getElementById('root')).render(<CrimLawStudyPlatform />);
  </script>
</body>
</html>
