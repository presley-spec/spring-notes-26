<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Quotes - Law School Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0b12;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #d4af37, #f4e4c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #1a1a24;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #d4af37;
        }

        .stat-label {
            font-size: 0.75em;
            color: #888;
            margin-top: 5px;
        }

        .game-area {
            background: #1a1a24;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px 20px;
            margin-bottom: 20px;
        }

        .quote-display {
            text-align: center;
            margin-bottom: 30px;
        }

        .quote-mark {
            font-size: 3em;
            color: #d4af37;
            line-height: 0.5;
            margin-bottom: 10px;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
            font-weight: 700;
            line-height: 1.6;
            color: #f0f0f0;
            margin-bottom: 15px;
            font-style: italic;
        }

        .course-badge {
            display: inline-block;
            padding: 5px 12px;
            background: #2a4a7c;
            color: #a3d5ff;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .guess-input-wrapper {
            position: relative;
            margin-bottom: 10px;
        }

        .guess-input {
            width: 100%;
            padding: 12px 15px;
            background: #0a0b12;
            border: 2px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1em;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }

        .guess-input:focus {
            outline: none;
            border-color: #d4af37;
        }

        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #2a2a35;
            border: 1px solid #333;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .autocomplete-dropdown.active {
            display: block;
        }

        .autocomplete-item {
            padding: 10px 15px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 0.9em;
            color: #b0b0b0;
        }

        .autocomplete-item:hover {
            background: #3a3a45;
            color: #d4af37;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .guess-button {
            background: linear-gradient(135deg, #d4af37, #f4e4c1);
            color: #0a0b12;
            grid-column: 1;
        }

        .guess-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .guess-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .skip-button {
            background: #333;
            color: #b0b0b0;
            grid-column: 2;
        }

        .skip-button:hover {
            background: #444;
            color: #d0d0d0;
        }

        .guesses-left {
            text-align: center;
            margin: 15px 0;
            font-size: 0.95em;
        }

        .guesses-left.danger {
            color: #ff6b6b;
            font-weight: 600;
        }

        .clues-container {
            margin: 20px 0;
        }

        .clue-card {
            background: #0a0b12;
            border-left: 4px solid #d4af37;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-size: 0.9em;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .clue-label {
            font-weight: 600;
            color: #d4af37;
            margin-right: 8px;
        }

        .result-message {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .correct {
            background: #1a4620;
            color: #5ff05f;
            border: 1px solid #2d7a2d;
        }

        .incorrect {
            background: #4a1a1a;
            color: #ff6b6b;
            border: 1px solid #7a2d2d;
        }

        .case-card {
            background: linear-gradient(135deg, #2a3a4a, #1a2a3a);
            border: 1px solid #d4af37;
            border-radius: 8px;
            padding: 20px;
            margin: 15px 0;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .case-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4em;
            color: #d4af37;
            margin-bottom: 8px;
        }

        .case-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .case-meta-item {
            background: #0a0b12;
            padding: 8px 10px;
            border-radius: 4px;
            border-left: 3px solid #d4af37;
        }

        .case-meta-label {
            color: #888;
            font-size: 0.8em;
        }

        .case-meta-value {
            color: #d4af37;
            font-weight: 600;
        }

        .case-significance {
            color: #c0c0c0;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .next-button {
            width: 100%;
            background: linear-gradient(135deg, #d4af37, #f4e4c1);
            color: #0a0b12;
            padding: 12px;
            margin-top: 15px;
        }

        .menu-area {
            text-align: center;
        }

        .menu-button {
            background: linear-gradient(135deg, #d4af37, #f4e4c1);
            color: #0a0b12;
            padding: 15px 30px;
            font-size: 1.1em;
            margin: 10px auto;
            display: block;
        }

        .menu-text {
            color: #888;
            margin: 20px 0;
            line-height: 1.6;
        }

        .confetti {
            position: fixed;
            pointer-events: none;
        }

        .streak-highlight {
            color: #ffd700;
            font-weight: 700;
        }

        .hidden {
            display: none;
        }

        .guess-history {
            margin: 15px 0;
            padding: 10px;
            background: #0a0b12;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .guess-item {
            color: #888;
            margin: 5px 0;
            padding: 3px 0;
        }

        .guess-item.wrong {
            color: #ff6b6b;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2em;
            }

            .quote-text {
                font-size: 1.1em;
            }

            .stats-bar {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Menu -->
        <div id="menuSection" class="menu-area">
            <header>
                <h1>Case Quotes</h1>
                <p class="subtitle">Holding Hunt</p>
            </header>
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-value" id="gamesPlayedStat">0</div>
                    <div class="stat-label">Games</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="streakStat">0</div>
                    <div class="stat-label">Streak</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="accuracyStat">—</div>
                    <div class="stat-label">Avg Guesses</div>
                </div>
            </div>
            <button class="menu-button" onclick="startNewGame()">Start Game</button>
            <p class="menu-text">Can you identify famous legal cases from their most iconic quotes and holdings? Test your law school knowledge across Constitutional Law, Criminal Law, and Property Law.</p>
        </div>

        <!-- Game -->
        <div id="gameSection" class="hidden">
            <header>
                <h1>Case Quotes</h1>
            </header>

            <div class="game-area">
                <div class="quote-display">
                    <div class="quote-mark">"</div>
                    <div class="quote-text" id="quoteText"></div>
                    <span class="course-badge" id="courseBadge"></span>
                </div>

                <div id="resultMessage" class="hidden"></div>

                <div class="input-section" id="inputSection">
                    <div class="guess-input-wrapper">
                        <input
                            type="text"
                            id="guessInput"
                            class="guess-input"
                            placeholder="Type case name..."
                            autocomplete="off"
                            onkeyup="handleInputChange(event)"
                            onkeypress="handleInputKeypress(event)"
                        >
                        <div id="autocompleteDropdown" class="autocomplete-dropdown"></div>
                    </div>

                    <div class="guesses-left">
                        Guesses remaining: <strong id="guessesRemaining">6</strong>
                    </div>

                    <div class="button-group">
                        <button class="guess-button" id="guessButton" onclick="submitGuess()">Guess</button>
                        <button class="skip-button" onclick="skipRound()">Skip</button>
                    </div>
                </div>

                <div id="cluesContainer" class="clues-container"></div>
                <div id="guessHistory" class="guess-history hidden"></div>

                <div id="caseCardContainer"></div>

                <div id="nextRoundSection" class="hidden">
                    <button class="next-button" onclick="nextRound()">Next Round</button>
                </div>
            </div>
        </div>
    </div>

            currentRound: 0,
            currentCase: null,
            guessesRemaining: 6,
            guessHistory: [],
            gamesPlayed: 0,
            gamesWon: 0,
            totalGuesses: 0,
            currentStreak: 0,
            answeredCases: new Set(),
            allCases: casesDatabase.filter(c => c.quote)
        };

        function initStats() {
            const saved = localStorage.getItem('caseQuotesStats');
            if (saved) {
                const stats = JSON.parse(saved);
                gameState.gamesPlayed = stats.gamesPlayed || 0;
                gameState.gamesWon = stats.gamesWon || 0;
                gameState.totalGuesses = stats.totalGuesses || 0;
                gameState.currentStreak = stats.currentStreak || 0;
            }
            updateStatsDisplay();
        }

        function saveStats() {
            localStorage.setItem('caseQuotesStats', JSON.stringify({
                gamesPlayed: gameState.gamesPlayed,
                gamesWon: gameState.gamesWon,
                totalGuesses: gameState.totalGuesses,
                currentStreak: gameState.currentStreak
            }));
            updateStatsDisplay();
        }

        function updateStatsDisplay() {
            document.getElementById('gamesPlayedStat').textContent = gameState.gamesPlayed;
            document.getElementById('streakStat').textContent = gameState.currentStreak;
            const avgGuesses = gameState.gamesPlayed > 0
                ? (gameState.totalGuesses / gameState.gamesWon).toFixed(1)
                : '—';
            document.getElementById('accuracyStat').textContent = avgGuesses;
        }

        function startNewGame() {
            document.getElementById('menuSection').classList.add('hidden');
            document.getElementById('gameSection').classList.remove('hidden');
            gameState.gamesPlayed++;
            gameState.answeredCases.clear();
            nextRound();
        }

        function nextRound() {
            gameState.currentRound++;
            gameState.guessesRemaining = 6;
            gameState.guessHistory = [];
            gameState.currentCase = selectRandomCase();

            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').disabled = false;
            document.getElementById('quoteText').textContent = gameState.currentCase.quote;
            document.getElementById('courseBadge').textContent = gameState.currentCase.course;
            document.getElementById('resultMessage').classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
            document.getElementById('cluesContainer').innerHTML = '';
            document.getElementById('guessHistory').classList.add('hidden');
            document.getElementById('caseCardContainer').innerHTML = '';
            document.getElementById('nextRoundSection').classList.add('hidden');

            updateGuessesDisplay();
            focusInput();
        }

        function selectRandomCase() {
            let availableCases = gameState.allCases.filter(c => !gameState.answeredCases.has(c.name));
            if (availableCases.length === 0) {
                gameState.answeredCases.clear();
                availableCases = gameState.allCases;
            }
            const randomCase = availableCases[Math.floor(Math.random() * availableCases.length)];
            gameState.answeredCases.add(randomCase.name);
            return randomCase;
        }

        function focusInput() {
            document.getElementById('guessInput').focus();
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function handleInputChange(event) {
            const input = event.target.value.toLowerCase();
            const dropdown = document.getElementById('autocompleteDropdown');

            if (input.length === 0) {
                dropdown.classList.remove('active');
                return;
            }

            const matches = casesDatabase.filter(c =>
                c.name.toLowerCase().includes(input)
            ).slice(0, 8);

            if (matches.length === 0) {
                dropdown.classList.remove('active');
                return;
            }

            const shuffledMatches = shuffle([...matches]);

            dropdown.innerHTML = shuffledMatches.map(c =>
                `<div class="autocomplete-item" onclick="selectAutocompleteSuggestion('${c.name}')">${c.name}</div>`
            ).join('');
            dropdown.classList.add('active');
        }

        function handleInputKeypress(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                submitGuess();
            }
        }

        function selectAutocompleteSuggestion(caseName) {
            document.getElementById('guessInput').value = caseName;
            document.getElementById('autocompleteDropdown').classList.remove('active');
            focusInput();
        }

        function submitGuess() {
            const guessInput = document.getElementById('guessInput');
            const guessCaseName = guessInput.value.trim();

            if (!guessCaseName) return;

            guessInput.value = '';
            document.getElementById('autocompleteDropdown').classList.remove('active');

            // Find the guessed case
            const guessedCase = casesDatabase.find(c =>
                c.name.toLowerCase() === guessCaseName.toLowerCase()
            );

            if (!guessedCase) {
                showResultMessage("Case not found in database", "incorrect");
                gameState.guessesRemaining--;
                gameState.guessHistory.push({ name: guessCaseName, found: false });
                updateGuessHistory();
                updateGuessesDisplay();
                return;
            }

            // Check if correct
            if (guessedCase.name === gameState.currentCase.name) {
                endRound(true, guessedCase);
                return;
            }

            // Wrong guess - show clues
            gameState.guessesRemaining--;
            gameState.guessHistory.push({ name: guessedCase.name, found: false });

            showClues(guessedCase);
            updateGuessHistory();
            updateGuessesDisplay();

            // Check if out of guesses
            if (gameState.guessesRemaining === 0) {
                endRound(false, gameState.currentCase);
            }

            focusInput();
        }

        function showClues(guessedCase) {
            const container = document.getElementById('cluesContainer');
            const clues = [];

            // Year clue
            if (guessedCase.year < gameState.currentCase.year) {
                clues.push(`<span class="clue-label">Year:</span> The mystery case is NEWER than ${guessedCase.year}`);
            } else if (guessedCase.year > gameState.currentCase.year) {
                clues.push(`<span class="clue-label">Year:</span> The mystery case is OLDER than ${guessedCase.year}`);
            } else {
                clues.push(`<span class="clue-label">Year:</span> SAME year - ${guessedCase.year}`);
            }

            // Court clue
            if (guessedCase.court === gameState.currentCase.court) {
                clues.push(`<span class="clue-label">Court:</span> SAME court - ${guessedCase.court}`);
            } else {
                clues.push(`<span class="clue-label">Court:</span> DIFFERENT court (you guessed ${guessedCase.court})`);
            }

            // Topic clue
            if (guessedCase.topic === gameState.currentCase.topic) {
                clues.push(`<span class="clue-label">Topic:</span> SAME topic - ${guessedCase.topic}`);
            } else {
                clues.push(`<span class="clue-label">Topic:</span> DIFFERENT topic`);
            }

            // Course clue
            if (guessedCase.course === gameState.currentCase.course) {
                clues.push(`<span class="clue-label">Course:</span> SAME course - ${guessedCase.course}`);
            } else {
                clues.push(`<span class="clue-label">Course:</span> DIFFERENT course (you guessed ${guessedCase.course})`);
            }

            container.innerHTML = clues.map(c => `<div class="clue-card">${c}</div>`).join('');
        }

        function updateGuessHistory() {
            const historyDiv = document.getElementById('guessHistory');
            if (gameState.guessHistory.length === 0) {
                historyDiv.classList.add('hidden');
                return;
            }
            historyDiv.classList.remove('hidden');
            historyDiv.innerHTML = '<strong>Previous Guesses:</strong>' + gameState.guessHistory.map((g, i) =>
                `<div class="guess-item ${!g.found ? 'wrong' : ''}">${i + 1}. ${g.name}</div>`
            ).join('');
        }

        function updateGuessesDisplay() {
            const remaining = document.getElementById('guessesRemaining');
            remaining.textContent = gameState.guessesRemaining;

            const guessesLeftDiv = document.querySelector('.guesses-left');
            if (gameState.guessesRemaining <= 2) {
                guessesLeftDiv.classList.add('danger');
            } else {
                guessesLeftDiv.classList.remove('danger');
            }
        }

        function showResultMessage(message, type) {
            const resultDiv = document.getElementById('resultMessage');
            resultDiv.textContent = message;
            resultDiv.className = `result-message ${type}`;
            resultDiv.classList.remove('hidden');
        }

        function endRound(isCorrect, caseToShow) {
            document.getElementById('inputSection').classList.add('hidden');
            document.getElementById('guessInput').disabled = true;
            document.getElementById('cluesContainer').innerHTML = '';

            if (isCorrect) {
                const guessCount = 6 - gameState.guessesRemaining;
                gameState.gamesWon++;
                gameState.totalGuesses += guessCount;
                gameState.currentStreak++;
                showResultMessage(`Correct! You got it in ${guessCount} guess${guessCount !== 1 ? 'es' : ''}!`, 'correct');
                celebrateCorrect();
            } else {
                gameState.currentStreak = 0;
                showResultMessage(`Out of guesses! The answer was ${caseToShow.name}.`, 'incorrect');
            }

            showCaseCard(caseToShow);
            document.getElementById('nextRoundSection').classList.remove('hidden');
            saveStats();
        }

        function showCaseCard(caseData) {
            const container = document.getElementById('caseCardContainer');
            container.innerHTML = `
                <div class="case-card">
                    <div class="case-name">${caseData.name}</div>
                    <div class="case-meta">
                        <div class="case-meta-item">
                            <div class="case-meta-label">Year</div>
                            <div class="case-meta-value">${caseData.year}</div>
                        </div>
                        <div class="case-meta-item">
                            <div class="case-meta-label">Court</div>
                            <div class="case-meta-value">${caseData.court}</div>
                        </div>
                        <div class="case-meta-item">
                            <div class="case-meta-label">Topic</div>
                            <div class="case-meta-value">${caseData.topic}</div>
                        </div>
                        <div class="case-meta-item">
                            <div class="case-meta-label">Course</div>
                            <div class="case-meta-value">${caseData.course}</div>
                        </div>
                    </div>
                    <div class="case-significance">
                        <strong>Significance:</strong> A seminal ${caseData.course} case decided by the ${caseData.court} in ${caseData.year}, establishing important precedent in ${caseData.topic}.
                    </div>
                </div>
            `;
        }

        function skipRound() {
            endRound(false, gameState.currentCase);
        }

        function celebrateCorrect() {
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = i % 2 === 0 ? '✦' : '✓';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = -10 + 'px';
                confetti.style.color = Math.random() > 0.5 ? '#d4af37' : '#f4e4c1';
                confetti.style.fontSize = (10 + Math.random() * 20) + 'px';
                confetti.style.opacity = '1';
                confetti.style.animation = `fall ${2 + Math.random() * 2}s linear forwards`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        // Add animation for falling confetti
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotateZ(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize on load
        window.addEventListener('load', initStats);
    </script>
</body>
</html>
