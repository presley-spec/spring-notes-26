const getInfectionColor = (percent) => {
  // Interpolate: 0%=#2d4a3e, 25%=#8b6914, 50%=#c0392b, 75%=#641e16, 100%=#1a0000
  const colors = [
    { pct: 0, color: [45, 74, 62] },     // #2d4a3e - dark forest green
    { pct: 25, color: [139, 105, 20] },  // #8b6914 - dark gold
    { pct: 50, color: [192, 57, 43] },   // #c0392b - crimson red
    { pct: 75, color: [100, 30, 22] },   // #641e16 - dark burgundy
    { pct: 100, color: [26, 0, 0] }      // #1a0000 - near black
  ];

  let lower = colors[0];
  let upper = colors[colors.length - 1];

  for (let i = 0; i < colors.length - 1; i++) {
    if (percent >= colors[i].pct && percent <= colors[i + 1].pct) {
      lower = colors[i];
      upper = colors[i + 1];
      break;
    }
  }

  const range = upper.pct - lower.pct;
  const t = range === 0 ? 0 : (percent - lower.pct) / range;

  const r = Math.round(lower.color[0] + (upper.color[0] - lower.color[0]) * t);
  const g = Math.round(lower.color[1] + (upper.color[1] - lower.color[1]) * t);
  const b = Math.round(lower.color[2] + (upper.color[2] - lower.color[2]) * t);

  return `rgb(${r},${g},${b})`;
};

const formatNumber = (n) => {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
};

const selectQuestion = (questionBank, history, gameTick, lastCourse, diffSetting) => {
  if (questionBank.length === 0) return null;

  // Filter by difficulty based on game progression
  let day = Math.floor(gameTick / 10);
  let maxDifficulty = 2;
  if (day > 20) maxDifficulty = 3;
  if (day > 50) maxDifficulty = 4;
  if (day > 100) maxDifficulty = 5;

  const validQuestions = questionBank.filter(q => q.difficulty <= maxDifficulty);

  // Weight questions by examWeight
  const weights = validQuestions.map(q => {
    let weight = 1;
    if (q.examWeight === 'high') weight = 3;
    else if (q.examWeight === 'medium') weight = 1;
    else if (q.examWeight === 'low') weight = 0.5;

    // Boost incorrect answers (spaced repetition)
    const hist = history.get(q.id);
    if (hist && hist.timesAsked > 0) {
      const accuracy = hist.timesCorrect / hist.timesAsked;
      if (accuracy < 0.5) weight *= 3; // Heavily boost missed questions
      else if (accuracy === 1) weight *= 0.3; // Reduce perfect questions
    } else {
      weight *= 2; // Unanswered questions get boost
    }

    // Avoid same course 3 times in a row
    const recentCourses = lastCourse.slice(-2);
    if (q.course === recentCourses[0] && q.course === recentCourses[1]) {
      weight *= 0.1;
    }

    return weight;
  });

  // Roulette selection
  const totalWeight = weights.reduce((a, b) => a + b, 0);
  let random = Math.random() * totalWeight;
  for (let i = 0; i < validQuestions.length; i++) {
    random -= weights[i];
    if (random <= 0) return validQuestions[i];
  }

  return validQuestions[0];
};

              <>

                  textAnchor="middle"

                  {shape.label}
                </text>
              </>

          </g>

      {/* Bubbles */}
      {bubbles.map(bubble => {
        const country = countries.find(c => c.id === bubble.countryId);

const QuestionModal = ({ question, bubble, onAnswer, onDismiss, diffSetting }) => {
  const [timeLeft, setTimeLeft] = useState(null);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [answered, setAnswered] = useState(false);

  const timeLimit = question.difficulty <= 2 ? 30 : question.difficulty === 3 ? 20 : 15;

  useEffect(() => {
    if (timeLeft === null) {
      setTimeLeft(timeLimit);
      return;
    }

    if (timeLeft <= 0) {
      setAnswered(true);
      setShowResult(true);
      onAnswer(false);
      return;
    }

    const timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
    return () => clearTimeout(timer);
  }, [timeLeft, timeLimit, onAnswer]);

  const handleSelectAnswer = (idx) => {
    if (answered) return;
    setSelectedAnswer(idx);
  };

  const handleSubmit = () => {
    if (selectedAnswer === null || answered) return;
    const isCorrect = selectedAnswer === question.correctAnswer;
    setShowResult(true);
    setAnswered(true);
    onAnswer(isCorrect);
  };

  const timerPercent = (timeLeft / timeLimit) * 100;
  const timerColor = timeLeft <= 5 ? '#dc2626' : timeLeft <= 10 ? '#f97316' : '#10b981';

  return (
    <div style={{
      position: 'fixed',
      top: 0,
      left: 0,
      right: 0,
      bottom: 0,
      backgroundColor: 'rgba(0, 0, 0, 0.7)',
      display: 'flex',
      justifyContent: 'center',
      alignItems: 'center',
      zIndex: 1000
    }}>
      <div style={{
        backgroundColor: '#1f2937',
        border: '3px solid #fbbf24',
        borderRadius: '8px',
        padding: '24px',
        maxWidth: '600px',
        width: '90%',
        color: '#fff',

            <strong>Topic:</strong> {question.topic} → {question.subtopic}
          </div>
        </div>

        {/* Timer Bar */}
        <div style={{
          backgroundColor: '#374151',
          borderRadius: '4px',
          height: '8px',
          marginBottom: '16px',
          overflow: 'hidden'
        }}>
          <div style={{
            height: '100%',
            width: `${timerPercent}%`,
            backgroundColor: timerColor,
            transition: 'width 0.3s'
          }} />
        </div>
        <div style={{ fontSize: '12px', color: '#aaa', marginBottom: '16px', textAlign: 'center' }}>
          {timeLeft}s remaining

        {/* Question */}
        <div style={{ marginBottom: '20px', fontSize: '16px', fontWeight: '500' }}>

        {/* Options */}
        <div style={{ marginBottom: '20px' }}>
          {question.options.map((option, idx) => {
            let bgColor = '#374151';
            let borderColor = '#555';

            if (showResult) {
              if (idx === question.correctAnswer) {
                bgColor = '#10b981';
                borderColor = '#059669';
              } else if (idx === selectedAnswer && selectedAnswer !== question.correctAnswer) {
                bgColor = '#dc2626';
                borderColor = '#b91c1c';
              }
            } else if (selectedAnswer === idx) {
              bgColor = '#4b5563';
              borderColor = '#fbbf24';
            }

            return (
              <button
                key={idx}
                onClick={() => handleSelectAnswer(idx)}
                disabled={answered}
                style={{

                  width: '100%',
                  padding: '12px',

        {/* Result */}
        {showResult && (
          <div style={{
            backgroundColor: selectedAnswer === question.correctAnswer ? '#064e3b' : '#7c2d12',

                <div style={{ fontSize: '11px', color: '#f97316', marginTop: '4px' }}>
                  Requires: {upgrade.prereqs.join(', ')}

    </div>
  );
};

                backgroundColor:
                  showAnswer && idx === q.correctAnswer ? '#10b981' :
                  showAnswer && idx === selected && selected !== q.correctAnswer ? '#dc2626' :
                  selected === idx && !showAnswer ? '#4b5563' :
                  '#374151',
                border: showAnswer && idx === q.correctAnswer ? '2px solid #059669' :
                  showAnswer && idx === selected && selected !== q.correctAnswer ? '2px solid #b91c1c' :
                  selected === idx && !showAnswer ? '2px solid #fbbf24' :
                  '1px solid #555',
                borderRadius: '4px',
                color: '#fff',
                textAlign: 'left',
                cursor: showAnswer ? 'default' : 'pointer',
                fontSize: '14px',
                transition: 'all 0.2s'
              }}
            >
              {String.fromCharCode(65 + idx)}. {opt}
            </button>
          ))}
        </div>

        {showAnswer && (
          <div style={{
            backgroundColor: correct ? '#064e3b' : '#7c2d12',
            border: `2px solid ${correct ? '#10b981' : '#ea580c'}`,
            borderRadius: '4px',
            padding: '16px'
          }}>
            <div style={{ fontWeight: 'bold', marginBottom: '8px', color: correct ? '#86efac' : '#fca5a5' }}>
              {correct ? '✓ Correct!' : '✗ Incorrect'}
            </div>
            <div style={{ fontSize: '13px', color: '#d1d5db' }}>
              {q.explanation}
            </div>
            {q.examTip && (
              <div style={{ fontSize: '12px', color: '#93c5fd', marginTop: '8px', fontStyle: 'italic' }}>
                💡 Exam tip: {q.examTip}
              </div>
            )}
            {q.relatedConcepts && q.relatedConcepts.length > 0 && (
              <div style={{ fontSize: '12px', color: '#d1d5db', marginTop: '8px' }}>
                Related: {q.relatedConcepts.join(', ')}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Controls */}
      <div style={{
        padding: '16px',
        borderTop: '1px solid #4b5563',
        display: 'flex',
        gap: '12px',
        justifyContent: 'center'
      }}>
        <button
          onClick={() => setCurrentIndex(Math.max(0, i - 1))}
          disabled={i === 0}
          style={{
            padding: '8px 16px',
            backgroundColor: i === 0 ? '#4b5563' : '#374151',
            border: '1px solid #555',
            color: '#fff',
            borderRadius: '4px',
            cursor: i === 0 ? 'default' : 'pointer'
          }}
        >
          Previous
        </button>
        <button
          onClick={handleNext}
          style={{
            padding: '8px 16px',
            backgroundColor: '#fbbf24',
            border: 'none',
            color: '#000',
            borderRadius: '4px',
            cursor: 'pointer',
            fontWeight: 'bold'
          }}
        >
          {i === QUESTION_BANK.length - 1 ? 'Restart' : 'Next'}
        </button>
      </div>
    </div>
  );
};

// MAIN COMPONENT

function FascismInc() {
  const [screen, setScreen] = useState('start');
  const [difficulty, setDifficulty] = useState('normal');
  const [gameSpeed, setGameSpeed] = useState(1);
  const [countries, setCountries] = useState([]);
  const [rp, setRp] = useState(0);
  const [gameTick, setGameTick] = useState(0);
  const [bubbles, setBubbles] = useState([]);
  const [newsQueue, setNewsQueue] = useState([]);
  const [fascismStats, setFascismStats] = useState({ reach: 0, intensity: 0, entrenchment: 0 });
  const [fascismEvolved, setFascismEvolved] = useState(new Set());
  const [playerPurchased, setPlayerPurchased] = useState(new Set());
  const [resistanceProgress, setResistanceProgress] = useState(0);
  const [questionHistory, setQuestionHistory] = useState(new Map());
  const [currentQuestion, setCurrentQuestion] = useState(null);
  const [selectedCountry, setSelectedCountry] = useState(null);
  const [showUpgrades, setShowUpgrades] = useState(false);
  const [showStats, setShowStats] = useState(false);

  const lastCoursesRef = useRef([]);
  const bubbleIdRef = useRef(0);
  const rpAccumulationRef = useRef({ amount: 0, ticksSinceSpend: 0 });

  // Initialize game
  const initGame = useCallback((diff, originId) => {
    const initialCountries = COUNTRIES.map(c => ({
      ...c,
      fascismInfected: c.id === originId ? Math.floor(c.population * 0.001) : 0,
      infectionHistory: []
    }));
    setCountries(initialCountries);
    setDifficulty(diff);
    setRp(5);
    setGameTick(0);
    setGameSpeed(1);
    setBubbles([]);
    setFascismEvolved(new Set());
    setPlayerPurchased(new Set());
    setResistanceProgress(0);
    setFascismStats({ reach: 0, intensity: 0, entrenchment: 0 });
    setQuestionHistory(new Map());
    const originName = COUNTRIES.find(c => c.id === originId)?.name || 'Unknown';
    setNewsQueue([{ text: `Fascist movements detected in ${originName}!`, severity: 'critical', tick: 0 }]);
    setScreen('playing');
  }, []);

  // GAME LOOP
  useEffect(() => {
    if (screen !== 'playing' || gameSpeed === 0) return;

    const interval = setInterval(() => {
      setGameTick(prev => {
        const tick = prev + 1;
        const settings = DIFFICULTY_SETTINGS[difficulty];

        // 1. INTERNAL SPREAD
        setCountries(prevCountries => {
          const updated = prevCountries.map(c => ({ ...c }));

          updated.forEach(country => {
            if (country.fascismInfected <= 0) return;
            const ratio = country.fascismInfected / country.population;

            // Check if country has fallen
            const spreadMultiplier = country.hasFallen ? 2.0 : 1.0;

            const govMod = country.government === 'democracy' ? 0.7 : country.government === 'hybrid' ? 1.0 : 1.3;
            const resMod = 1 - (country.resistanceStrength / 200);
            const baseRate = 0.02 * settings.spreadRate * spreadMultiplier;
            const growth = country.fascismInfected * baseRate * govMod * resMod * (1 - ratio);
            country.fascismInfected = Math.min(country.population, Math.floor(country.fascismInfected + Math.max(1, growth)));
          });

          // 2. CROSS-BORDER SPREAD (via 5 media channels)
          const newlyInfected = [];
          const spreadByChannel = {};

          updated.forEach(source => {
            if (source.fascismInfected <= 0) return;
            const srcRatio = source.fascismInfected / source.population;

            // Initialize media attributes if missing
            if (!source.twitterUsers) source.twitterUsers = 40 + Math.random() * 30;
            if (!source.cableNewsReach) source.cableNewsReach = 35 + Math.random() * 25;
            if (!source.influencerDensity) source.influencerDensity = 20 + Math.random() * 20;
            if (!source.internetPenetration) source.internetPenetration = 65 + Math.random() * 30;
            if (!source.educationIndex) source.educationIndex = Math.random() * 100;
            if (!source.religiousConservatism) source.religiousConservatism = Math.random() * 100;
            if (!source.inequalityIndex) source.inequalityIndex = Math.random() * 100;

            const spreadMultiplier = source.hasFallen ? 2.0 : 1.0;

            // CHANNEL 1: SOCIAL MEDIA (Twitter/X)
            (source.twitterConnections || []).forEach(targetId => {
              const target = updated.find(c => c.id === targetId);
              if (!target || target.fascismInfected > 0) return;

              if (!target.educationIndex) target.educationIndex = Math.random() * 100;
              if (!target.internetPenetration) target.internetPenetration = 65 + Math.random() * 30;
              if (!target.twitterUsers) target.twitterUsers = 40 + Math.random() * 30;

              const educationResistance = 1 - (target.educationIndex / 200);
              const chance = srcRatio * (source.twitterUsers / 100) * (target.internetPenetration / 100) * 0.008 * settings.spreadRate * spreadMultiplier * educationResistance;

              if (Math.random() < chance) {
                target.fascismInfected = Math.max(1, Math.floor(target.population * 0.0005));
                newlyInfected.push(target);
                spreadByChannel[target.id] = { method: 'social_media', sourceName: source.name };
              }
            });

            // CHANNEL 2: CABLE NEWS
            (source.cableNewsConnections || []).forEach(targetId => {
              const target = updated.find(c => c.id === targetId);
              if (!target || target.fascismInfected > 0) return;

              if (!target.religiousConservatism) target.religiousConservatism = Math.random() * 100;
              if (!target.cableNewsReach) target.cableNewsReach = 35 + Math.random() * 25;

              const conservatismBoost = 1 + (target.religiousConservatism / 200);
              const chance = srcRatio * (source.cableNewsReach / 100) * 0.005 * settings.spreadRate * spreadMultiplier * conservatismBoost;

              if (Math.random() < chance) {
                target.fascismInfected = Math.max(1, Math.floor(target.population * 0.0003));
                newlyInfected.push(target);
                spreadByChannel[target.id] = { method: 'cable_news', sourceName: source.name };
              }
            });

            // CHANNEL 3: INFLUENCERS
            (source.influencerConnections || []).forEach(targetId => {
              const target = updated.find(c => c.id === targetId);
              if (!target || target.fascismInfected > 0) return;

              if (!target.internetPenetration) target.internetPenetration = 65 + Math.random() * 30;
              if (!target.influencerDensity) target.influencerDensity = 20 + Math.random() * 20;

              const chance = srcRatio * (source.influencerDensity / 100) * (target.internetPenetration / 100) * 0.004 * settings.spreadRate * spreadMultiplier;

              if (Math.random() < chance) {
                target.fascismInfected = Math.max(1, Math.floor(target.population * 0.0004));
                newlyInfected.push(target);
                spreadByChannel[target.id] = { method: 'influencers', sourceName: source.name };
              }
            });

            // CHANNEL 4: CULTURAL PROXIMITY
            (source.culturalConnections || []).forEach(targetId => {
              const target = updated.find(c => c.id === targetId);
              if (!target || target.fascismInfected > 0) return;

              if (!target.inequalityIndex) target.inequalityIndex = Math.random() * 100;

              const inequalityBoost = 1 + (target.inequalityIndex / 200);
              const chance = srcRatio * 0.003 * settings.spreadRate * spreadMultiplier * inequalityBoost;

              if (Math.random() < chance) {
                target.fascismInfected = Math.max(1, Math.floor(target.population * 0.0002));
                newlyInfected.push(target);
                spreadByChannel[target.id] = { method: 'cultural_proximity', sourceName: source.name };
              }
            });

            // CHANNEL 5: NEIGHBOR SPREAD (geographic)
            (source.neighbors || []).forEach(targetId => {
              const target = updated.find(c => c.id === targetId);
              if (!target || target.fascismInfected > 0) return;
              if (!source.bordersOpen && !target.bordersOpen) return;

              const chance = srcRatio * 0.006 * settings.spreadRate * spreadMultiplier;

              if (Math.random() < chance) {
                target.fascismInfected = Math.max(1, Math.floor(target.population * 0.001));
                newlyInfected.push(target);
                spreadByChannel[target.id] = { method: 'neighbor', sourceName: source.name };
              }
            });
          });

          // Spawn bubbles and contextual news for newly infected countries
          newlyInfected.forEach(c => {
            setBubbles(prev => [...prev, {
              id: ++bubbleIdRef.current,
              countryId: c.id,
              type: 'red',
              spawnTick: tick,
              rpValue: 2
            }]);

            // Generate contextual news based on spread channel
            const channelInfo = spreadByChannel[c.id];
            const newsItem = generateContextualNews('spread', channelInfo?.method || 'unknown', c.name);
            setNewsQueue(prev => [...prev, {
              text: newsItem,
              severity: 'critical',
              tick,
              outlet: NEWS_OUTLETS_LIST[Math.floor(Math.random() * NEWS_OUTLETS_LIST.length)]
            }]);
          });

          // Track history and infection milestones
          updated.forEach(c => {
            const pct = Math.round((c.fascismInfected / c.population) * 100);
            c.infectionHistory = [...(c.infectionHistory || []).slice(-19), pct];

            // Fire news alerts at infection milestones
            const prevPct = c.infectionHistory[c.infectionHistory.length - 2] || 0;
            if (prevPct < 25 && pct >= 25) {
              const newsItem = generateContextualNews('milestone', '25', c.name);
              setNewsQueue(prev => [...prev, {
                text: newsItem,
                severity: 'critical',
                tick,
                outlet: NEWS_OUTLETS_LIST[Math.floor(Math.random() * NEWS_OUTLETS_LIST.length)]
              }]);
            }
            if (prevPct < 50 && pct >= 50) {
              const newsItem = generateContextualNews('milestone', '50', c.name);
              setNewsQueue(prev => [...prev, {
                text: newsItem,
                severity: 'critical',
                tick,
                outlet: NEWS_OUTLETS_LIST[Math.floor(Math.random() * NEWS_OUTLETS_LIST.length)]
              }]);
            }
            if (prevPct < 75 && pct >= 75) {
              const newsItem = generateContextualNews('milestone', '75', c.name);
              setNewsQueue(prev => [...prev, {
                text: newsItem,
                severity: 'critical',
                tick,
                outlet: NEWS_OUTLETS_LIST[Math.floor(Math.random() * NEWS_OUTLETS_LIST.length)]
              }]);
            }
          });

          return updated;
        });

        // 2.5. COUNTRY FALLS CHECK
        setCountries(prevCountries => {
          const updated = prevCountries.map(c => ({ ...c }));

          updated.forEach(country => {
            if (country.fascismInfected <= 0) return;
            const infectionRatio = country.fascismInfected / country.population;

            // Check if country should fall based on infection threshold
            let fallChance = 0;
            if (infectionRatio >= 0.95) {
              fallChance = 0.10; // 10% per tick at 95%+
            } else if (infectionRatio >= 0.90) {
              fallChance = 0.05; // 5% per tick at 90%
            } else if (infectionRatio >= 0.80) {
              fallChance = 0.02; // 2% per tick at 80%
            } else if (infectionRatio >= 0.70) {
              fallChance = 0.005; // 0.5% per tick at 70%
            }

            // Roll for falling
            if (fallChance > 0 && Math.random() < fallChance && !country.hasFallen) {
              country.hasFallen = true;
              country.fallenTick = tick;
              country.lockHighGrowth = true;

              // Generate BREAKING news alert
              const newsItem = `BREAKING: ${country.name} elects fascist leader — democracy has fallen`;
              setNewsQueue(prev => [...prev, {
                text: newsItem,
                severity: 'critical',
                tick,
                outlet: 'FOX NEWS ALERT'
              }]);

              // Spawn special red bubble to indicate severity
              setBubbles(prev => [...prev, {
                id: ++bubbleIdRef.current,
                countryId: country.id,
                type: 'red',
                spawnTick: tick,
                rpValue: 5 // High value for critical event
              }]);
            }
          });

          return updated;
        });

        // 3. ORANGE BUBBLES (passive) - spawn every 3-5 ticks for frequent questions
        if (tick % 3 === 0) {
          setCountries(prev => {
            const infected = prev.filter(c => c.fascismInfected > 0);
            if (infected.length > 0) {
              // Spawn 1-2 bubbles on random infected countries
              const numBubbles = 1 + (Math.random() < 0.4 ? 1 : 0);
              for (let i = 0; i < numBubbles; i++) {
                const target = infected[Math.floor(Math.random() * infected.length)];
                setBubbles(b => [...b, {
                  id: ++bubbleIdRef.current,
                  countryId: target.id,
                  type: 'orange',
                  spawnTick: tick,
                  rpValue: 1 + Math.floor(Math.random() * 3)
                }]);
              }
            }
            // Also spawn on uninfected countries occasionally (blue study bubbles)
            const clean = prev.filter(c => c.fascismInfected === 0);
            if (clean.length > 0 && Math.random() < 0.3) {
              const target = clean[Math.floor(Math.random() * clean.length)];
              setBubbles(b => [...b, {
                id: ++bubbleIdRef.current,
                countryId: target.id,
                type: 'blue',
                spawnTick: tick,
                rpValue: 2 + Math.floor(Math.random() * 3)
              }]);
            }
            return prev;
          });
        }

        // 4. FASCISM AI EVOLUTION
        const evolveInterval = Math.floor(60 / DIFFICULTY_SETTINGS[difficulty].aiEvolveSpeed);
        if (tick % evolveInterval === 0 && tick > 0) {
          setFascismEvolved(prev => {
            const allUpgrades = [...FASCISM_UPGRADES.propaganda, ...FASCISM_UPGRADES.erosion, ...FASCISM_UPGRADES.resilience];
            const available = allUpgrades.filter(u => !prev.has(u.id) && u.prereqs.every(p => prev.has(p)));
            if (available.length > 0) {
              const chosen = available[Math.floor(Math.random() * available.length)];
              const newSet = new Set(prev);
              newSet.add(chosen.id);
              const msg = NEWS_MESSAGES.fascismEvolve[Math.floor(Math.random() * NEWS_MESSAGES.fascismEvolve.length)].replace('{upgrade}', chosen.name);
              setNewsQueue(q => [...q, { text: msg, severity: 'critical', tick }]);
              setFascismStats(s => ({
                reach: Math.min(100, s.reach + (chosen.effects.reach || 0) * 2),
                intensity: Math.min(100, s.intensity + (chosen.effects.intensity || 0) * 2),
                entrenchment: Math.min(100, s.entrenchment + (chosen.effects.entrenchment || 0) * 2)
              }));
              return newSet;
            }
            return prev;
          });
        }

        // 4.5. RP PENALTY CHECK
        setRp(prevRP => {
          // Track RP accumulation ticks
          if (!rpAccumulationRef.current) {
            rpAccumulationRef.current = { amount: prevRP, ticksSinceSpend: 0 };
          }

          if (prevRP === rpAccumulationRef.current.amount) {
            rpAccumulationRef.current.ticksSinceSpend++;
          } else {
            rpAccumulationRef.current = { amount: prevRP, ticksSinceSpend: 0 };
          }

          // Penalty 1: If RP > 15 for more than 20 ticks, warning news
          if (prevRP > 15 && rpAccumulationRef.current.ticksSinceSpend > 20) {
            if (rpAccumulationRef.current.ticksSinceSpend === 21) { // Only trigger once per threshold
              const newsItem = "Resistance leaders criticized for inaction as fascism grows unchecked";
              setNewsQueue(prev => [...prev, {
                text: newsItem,
                severity: 'critical',
                tick,
                outlet: 'MSNBC SPECIAL REPORT'
              }]);
            }
          }

          // Penalty 2: If RP > 30 for more than 30 ticks, random country infection jumps by 10%
          if (prevRP > 30 && rpAccumulationRef.current.ticksSinceSpend > 30) {
            if (rpAccumulationRef.current.ticksSinceSpend === 31) { // Only trigger once per threshold
              setCountries(prevCountries => {
                const updated = [...prevCountries];
                const infectedCountries = updated.filter(c => c.fascismInfected > 0 && !c.hasFallen);

                if (infectedCountries.length > 0) {
                  const target = infectedCountries[Math.floor(Math.random() * infectedCountries.length)];
                  const jumpAmount = Math.floor(target.population * 0.10);
                  target.fascismInfected = Math.min(target.population, target.fascismInfected + jumpAmount);

                  const newsItem = `Emergency alert: Fascism surges in ${target.name} due to delayed resistance response`;
                  setNewsQueue(prev => [...prev, {
                    text: newsItem,
                    severity: 'critical',
                    tick,
                    outlet: 'CNN BREAKING NEWS'
                  }]);
                }

                return updated;
              });
            }
          }

          return prevRP;
        });

        // 5. ADVANCE RESISTANCE
        setResistanceProgress(prev => {
          const freeCountries = countries.filter(c => (c.fascismInfected / c.population) < 0.5 && c.government === 'democracy');
          const baseAdvance = freeCountries.length * 0.02;
          const playerBoost = Array.from(playerPurchased).reduce((sum, id) => {
            const allPlayerUpgrades = [...PLAYER_UPGRADES.defense, ...PLAYER_UPGRADES.civil, ...PLAYER_UPGRADES.repair];
            const upg = allPlayerUpgrades.find(u => u.id === id);
            return sum + (upg?.effects?.resistanceBoost || 0) * 0.01;
          }, 0);
          const fascismSlow = Array.from(fascismEvolved).reduce((sum, id) => {
            const allFascUpgrades = [...FASCISM_UPGRADES.propaganda, ...FASCISM_UPGRADES.erosion, ...FASCISM_UPGRADES.resilience];
            const upg = allFascUpgrades.find(u => u.id === id);
            return sum + (upg?.effects?.resistanceSlowdown || 0) * 0.005;
          }, 0);
          const advance = Math.max(0.01, baseAdvance + playerBoost - fascismSlow);
          return Math.min(100, prev + advance);
        });

        // 6. BLUE BUBBLES at milestones
        setResistanceProgress(prev => {
          [25, 50, 75].forEach(m => {
            if (prev < m && prev + 0.1 >= m) {
              setBubbles(b => [...b, {
                id: ++bubbleIdRef.current,
                countryId: COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)].id,
                type: 'blue',
                spawnTick: tick,
                rpValue: 5 + Math.floor(Math.random() * 4)
              }]);
            }
          });
          return prev;
        });

        // 7. REMOVE OLD BUBBLES (keep for 20 ticks so player has time to click)
        setBubbles(prev => prev.filter(b => tick - b.spawnTick < 20));

        // 8. FLAVOR NEWS
        if (tick % 30 === 0) {
          const msg = NEWS_MESSAGES.flavor[Math.floor(Math.random() * NEWS_MESSAGES.flavor.length)];
          setNewsQueue(prev => [...prev, { text: msg, severity: 'normal', tick }].slice(-20));
        }

        // 9. WIN/LOSE CHECK
        if (resistanceProgress >= 100) {
          setScreen('won');
          setGameSpeed(0);
        }
        const totalPop = countries.reduce((s, c) => s + c.population, 0);
        const totalInf = countries.reduce((s, c) => s + c.fascismInfected, 0);
        const fallenCount = countries.filter(c => c.hasFallen).length;
        const fallenPercent = countries.length > 0 ? fallenCount / countries.length : 0;

        if (totalPop > 0 && totalInf / totalPop > 0.85) {
          setScreen('lost');
          setGameSpeed(0);
        }
        if (fallenPercent > 0.60) {
          setScreen('lost');
          setGameSpeed(0);
        }

        return tick;
      });
    }, 1000 / gameSpeed);

    return () => clearInterval(interval);
  }, [screen, gameSpeed, difficulty, countries, playerPurchased, fascismEvolved, resistanceProgress]);

  // EVENT HANDLERS
  const handleBubbleClick = useCallback((bubble) => {
    const prevSpeed = gameSpeed;
    setGameSpeed(0);
    const q = selectQuestion(QUESTION_BANK, questionHistory, gameTick, lastCoursesRef.current, DIFFICULTY_SETTINGS[difficulty]);
    if (q) {
      lastCoursesRef.current = [...lastCoursesRef.current.slice(-2), q.course];
      setCurrentQuestion({ question: q, bubble, prevSpeed });
    }
  }, [gameSpeed, questionHistory, gameTick, difficulty]);

  const handleAnswer = useCallback((isCorrect) => {
    if (!currentQuestion) return;
    const { question, bubble, prevSpeed } = currentQuestion;
    const rpChange = isCorrect ? bubble.rpValue : 0;
    setRp(prev => prev + rpChange);

    setQuestionHistory(prev => {
      const newMap = new Map(prev);
      const existing = newMap.get(question.id) || { timesAsked: 0, timesCorrect: 0, lastAsked: 0 };
      newMap.set(question.id, {
        timesAsked: existing.timesAsked + 1,
        timesCorrect: existing.timesCorrect + (isCorrect ? 1 : 0),
        lastAsked: gameTick
      });
      return newMap;
    });

    if (!isCorrect) {
      setCountries(prev => prev.map(c => {
        if (c.id === bubble.countryId && c.fascismInfected > 0) {
          return { ...c, fascismInfected: Math.min(c.population, Math.floor(c.fascismInfected * 1.05)) };
        }
        return c;
      }));
    }

    setBubbles(prev => prev.filter(b => b.id !== bubble.id));
  }, [currentQuestion, gameTick]);

  const dismissQuestion = useCallback(() => {
    if (currentQuestion) {
      setGameSpeed(currentQuestion.prevSpeed || 1);
      setCurrentQuestion(null);
    }
  }, [currentQuestion]);

  const handlePurchaseUpgrade = useCallback((upgradeId) => {
    const allUpgrades = [...PLAYER_UPGRADES.defense, ...PLAYER_UPGRADES.civil, ...PLAYER_UPGRADES.repair];
    const upgrade = allUpgrades.find(u => u.id === upgradeId);
    if (!upgrade || rp < upgrade.cost || playerPurchased.has(upgradeId)) return;
    if (!upgrade.prereqs.every(p => playerPurchased.has(p))) return;

    setRp(prev => prev - upgrade.cost);
    setPlayerPurchased(prev => {
      const newSet = new Set(prev);
      newSet.add(upgradeId);
      return newSet;
    });
    const msg = NEWS_MESSAGES.playerAction[Math.floor(Math.random() * NEWS_MESSAGES.playerAction.length)].replace('{upgrade}', upgrade.name);
    setNewsQueue(prev => [...prev, { text: msg, severity: 'normal', tick: gameTick }]);
  }, [rp, playerPurchased, gameTick]);

  // Compute flight paths
  const flightPaths = useMemo(() => {
    const paths = [];
    const infectedCountries = countries.filter(c => c.fascismInfected > 0);
    infectedCountries.forEach(source => {
      const sourceShape = COUNTRY_SHAPES[source.id];
      if (!sourceShape) return;

      (source.twitterConnections || []).slice(0, 2).forEach(targetId => {
        const target = countries.find(c => c.id === targetId);
        if (!target) return;

        const targetShape = COUNTRY_SHAPES[target.id];
        if (!targetShape) return;

        paths.push({
          x1: sourceShape.cx,
          y1: sourceShape.cy,
          x2: targetShape.cx,
          y2: targetShape.cy
        });
      });
    });
    return paths;
  }, [countries]);

  // Compute game stats
  const gameStats = useMemo(() => {
    const totalPop = countries.reduce((s, c) => s + c.population, 0);
    const totalInf = countries.reduce((s, c) => s + c.fascismInfected, 0);
    const questionsAnswered = Array.from(questionHistory.values()).reduce((s, h) => s + h.timesAsked, 0);
    const questionsCorrect = Array.from(questionHistory.values()).reduce((s, h) => s + h.timesCorrect, 0);
    return {
      totalPopulation: totalPop,
      totalInfected: totalInf,
      totalFree: totalPop - totalInf,
      infectionPercent: totalPop > 0 ? Math.round((totalInf / totalPop) * 100) : 0,
      questionsAnswered,
      questionsCorrect,
      accuracy: questionsAnswered > 0 ? Math.round((questionsCorrect / questionsAnswered) * 100) : 0,
      countriesSaved: countries.filter(c => (c.fascismInfected / c.population) < 0.5).length,
      daysSurvived: Math.floor(gameTick / 10)
    };
  }, [countries, questionHistory, gameTick]);

  // RENDER
  if (screen === 'start') {
    return <StartScreen onNewGame={() => setScreen('difficulty')} onStudy={() => setScreen('study')} />;
  }

  if (screen === 'difficulty') {
    return <DifficultySelectScreen onSelect={(diff) => { setDifficulty(diff); setScreen('origin'); }} onBack={() => setScreen('start')} />;
  }

  if (screen === 'origin') {
    return <OriginSelectScreen onSelect={(originId) => initGame(difficulty, originId)} onBack={() => setScreen('difficulty')} />;
  }

  if (screen === 'study') {
    return <StudyModeScreen onBack={() => setScreen('start')} />;
  }

  if (screen === 'won') {
    return <WinScreen gameStats={gameStats} onRestart={() => setScreen('start')} />;
  }

  if (screen === 'lost') {
    return <LoseScreen gameStats={gameStats} onRestart={() => setScreen('start')} />;
  }

  if (screen === 'playing') {
    const totalPop = countries.reduce((s, c) => s + c.population, 0);
    const totalInf = countries.reduce((s, c) => s + c.fascismInfected, 0);
    const free = totalPop - totalInf;

    return (
      <div style={{
        position: 'relative',
        width: '100%',
        height: '100vh',
        backgroundColor: '#0f172a',
        color: '#fff',
        overflow: 'hidden',
        fontFamily: 'system-ui, -apple-system, sans-serif'
      }}>
        {/* Map */}
        <WorldMap
          countries={countries}
          bubbles={bubbles}
          flightPaths={flightPaths}
          onCountryClick={setSelectedCountry}
          onBubbleClick={handleBubbleClick}
          gameSpeed={gameSpeed}
          selectedCountryId={selectedCountry?.id}
        />

        {/* News */}
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 50 }}>
          <NewsTickerBanner newsQueue={newsQueue} gameTick={gameTick} />
        </div>

        {/* Top HUD */}
        <div style={{
          position: 'absolute',
          top: '50px',
          left: '20px',
          right: '20px',
          zIndex: 50,
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          fontSize: '14px'
        }}>
          <div>
            <strong>Day {Math.floor(gameTick / 10)}</strong>
          </div>
          <div style={{ display: 'flex', gap: '24px' }}>
            <div>Population: {formatNumber(totalPop)}</div>
            <div style={{ color: '#dc2626' }}>Infected: {formatNumber(totalInf)} ({gameStats.infectionPercent}%)</div>
            <div style={{ color: '#10b981' }}>Free: {formatNumber(free)}</div>
          </div>
          <div style={{ display: 'flex', gap: '8px' }}>
            <button onClick={() => setGameSpeed(0)} style={{ padding: '4px 12px', cursor: 'pointer', backgroundColor: gameSpeed === 0 ? '#fbbf24' : '#374151', border: '1px solid #555', color: '#000' }}>⏸</button>
            <button onClick={() => setGameSpeed(1)} style={{ padding: '4px 12px', cursor: 'pointer', backgroundColor: gameSpeed === 1 ? '#fbbf24' : '#374151', border: '1px solid #555', color: '#000' }}>▶</button>
            <button onClick={() => setGameSpeed(2)} style={{ padding: '4px 12px', cursor: 'pointer', backgroundColor: gameSpeed === 2 ? '#fbbf24' : '#374151', border: '1px solid #555', color: '#000' }}>⏩</button>
          </div>
        </div>

        {/* Resistance Progress - Top Center */}
        <div style={{
          position: 'absolute',
          top: '100px',
          left: '50%',
          transform: 'translateX(-50%)',
          width: '300px',
          zIndex: 50
        }}>
          <div style={{ fontSize: '12px', marginBottom: '4px', textAlign: 'center' }}>
            Global Resistance: {Math.round(resistanceProgress)}%
          </div>
          <div style={{
            backgroundColor: '#374151',
            borderRadius: '4px',
            height: '20px',
            overflow: 'hidden',
            border: '2px solid #10b981'
          }}>
            <div style={{
              width: `${resistanceProgress}%`,
              height: '100%',
              backgroundColor: '#10b981',
              transition: 'width 0.3s'
            }} />
          </div>
        </div>

        {/* Bottom Left - Stats */}
        <div style={{
          position: 'absolute',
          bottom: '20px',
          left: '20px',
          zIndex: 50,
          fontSize: '12px',
          display: 'flex',
          gap: '16px'
        }}>
          <div>
            <div style={{ color: '#9ca3af', marginBottom: '4px' }}>Reach</div>
            <div style={{
              width: '60px',
              height: '20px',
              backgroundColor: '#374151',
              borderRadius: '4px',
              overflow: 'hidden'
            }}>
              <div style={{
                width: `${fascismStats.reach}%`,
                height: '100%',
                backgroundColor: '#f97316'
              }} />
            </div>
          </div>
          <div>
            <div style={{ color: '#9ca3af', marginBottom: '4px' }}>Intensity</div>
            <div style={{
              width: '60px',
              height: '20px',
              backgroundColor: '#374151',
              borderRadius: '4px',
              overflow: 'hidden'
            }}>
              <div style={{
                width: `${fascismStats.intensity}%`,
                height: '100%',
                backgroundColor: '#dc2626'
              }} />
            </div>
          </div>
          <div>
            <div style={{ color: '#9ca3af', marginBottom: '4px' }}>Entrenchment</div>
            <div style={{
              width: '60px',
              height: '20px',
              backgroundColor: '#374151',
              borderRadius: '4px',
              overflow: 'hidden'
            }}>
              <div style={{
                width: `${fascismStats.entrenchment}%`,
                height: '100%',
                backgroundColor: '#8b6914'
              }} />
            </div>
          </div>
        </div>

        {/* Bottom Center - Buttons */}
        <div style={{
          position: 'absolute',
          bottom: '20px',
          left: '50%',
          transform: 'translateX(-50%)',
          display: 'flex',
          gap: '12px',
          zIndex: 50
        }}>
          <button
            onClick={() => setShowUpgrades(true)}
            style={{
              padding: '12px 24px',
              backgroundColor: '#374151',
              border: '2px solid #fbbf24',
              color: '#fff',
              borderRadius: '4px',
              cursor: 'pointer',
              fontWeight: 'bold'
            }}
          >
            Upgrades
          </button>
          <button
            onClick={() => setShowStats(true)}
            style={{
              padding: '12px 24px',
              backgroundColor: '#374151',
              border: '2px solid #10b981',
              color: '#fff',
              borderRadius: '4px',
              cursor: 'pointer',
              fontWeight: 'bold'
            }}
          >
            Stats
          </button>
        </div>

        {/* Bottom Right - RP Counter */}
        <div style={{
          position: 'absolute',
          bottom: '20px',
          right: '20px',
          fontSize: '32px',
          fontWeight: 'bold',
          color: '#fbbf24',
          textShadow: '0 0 8px rgba(251, 191, 36, 0.5)',
          zIndex: 50
        }}>
          RP: {rp}
        </div>

        {/* Question Modal */}
        {currentQuestion && (
          <QuestionModal
            question={currentQuestion.question}
            bubble={currentQuestion.bubble}
            onAnswer={handleAnswer}
            onDismiss={dismissQuestion}
            diffSetting={difficulty}
          />
        )}

        {/* Upgrade Panel */}
        {showUpgrades && (
          <UpgradePanel
            playerPurchased={playerPurchased}
            rp={rp}
            onPurchase={handlePurchaseUpgrade}
            onClose={() => setShowUpgrades(false)}
          />
        )}

        {/* Country Detail Panel */}
        {selectedCountry && (
          <CountryDetailPanel
            country={selectedCountry}
            onClose={() => setSelectedCountry(null)}
          />
        )}

        {/* Stats Panel */}
        {showStats && (
          <StatsPanel
            questionHistory={questionHistory}
            gameStats={gameStats}
            onClose={() => setShowStats(false)}
          />
        )}
      </div>
    );
  }

  return null;
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(FascismInc));
  </script>
</body>
</html>
