<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law Wordle - Study Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0b12;
            color: #e7e6eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #3a3a3c;
            margin-bottom: 16px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            flex: 1;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            color: #e7e6eb;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background-color 0.2s;
        }

        .icon-btn:hover {
            background-color: #3a3a3c;
        }

        .game-board {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 32px;
            min-height: 280px;
        }

        .tile-row {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .tile {
            width: 56px;
            height: 56px;
            border: 2px solid #3a3a3c;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            background-color: #1a1a2e;
            color: #e7e6eb;
            text-transform: uppercase;
            transition: border-color 0.2s;
        }

        .tile.filled {
            border-color: #565758;
        }

        .tile.flipped {
            animation: flip 0.6s ease-in-out;
        }

        @keyframes flip {
            0% {
                transform: rotateX(0);
                background-color: #1a1a2e;
                border-color: #3a3a3c;
            }
            50% {
                transform: rotateX(90deg);
            }
            100% {
                transform: rotateX(0);
            }
        }

        .tile.correct {
            background-color: #538d4e;
            border-color: #538d4e;
        }

        .tile.present {
            background-color: #b59f3b;
            border-color: #b59f3b;
        }

        .tile.absent {
            background-color: #3a3a3c;
            border-color: #3a3a3c;
        }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .keyboard-row {
            display: flex;
            gap: 4px;
            justify-content: center;
        }

        .key {
            flex: 1;
            max-width: 40px;
            height: 48px;
            border: none;
            border-radius: 4px;
            background-color: #3a3a3c;
            color: #e7e6eb;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            transition: background-color 0.1s, transform 0.05s;
            font-family: 'Inter', sans-serif;
        }

        .key:active {
            transform: scale(0.95);
        }

        .key.correct {
            background-color: #538d4e;
        }

        .key.present {
            background-color: #b59f3b;
        }

        .key.absent {
            background-color: #565758;
        }

        .key.spacer {
            flex: 0.5;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: #538d4e;
            color: #e7e6eb;
        }

        .btn-primary:hover {
            background-color: #6ba55e;
        }

        .btn-primary:disabled {
            background-color: #3a3a3c;
            color: #858585;
            cursor: not-allowed;
        }

        .definition-card {
            background-color: #1a1a2e;
            border: 1px solid #3a3a3c;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .definition-word {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #538d4e;
        }

        .definition-text {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .definition-course {
            font-size: 13px;
            color: #b59f3b;
            font-weight: 500;
        }

        .message {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            min-height: 20px;
        }

        .message.error {
            color: #e7e6eb;
        }

        .message.win {
            color: #538d4e;
        }

        .message.lose {
            color: #e7e6eb;
        }

        .stats-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .stats-modal.open {
            display: flex;
        }

        .stats-content {
            background-color: #1a1a2e;
            border: 1px solid #3a3a3c;
            border-radius: 8px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
        }

        .stats-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #538d4e;
        }

        .stat-label {
            font-size: 12px;
            color: #858585;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .close-stats {
            width: 100%;
            padding: 12px;
            background-color: #3a3a3c;
            border: none;
            border-radius: 4px;
            color: #e7e6eb;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        .close-stats:hover {
            background-color: #565758;
        }

        .game-over {
            text-align: center;
        }

        .game-over-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .game-over-title.win {
            color: #538d4e;
        }

        .game-over-title.lose {
            color: #e7e6eb;
        }

        .game-over-word {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #b59f3b;
        }

        .game-over-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .game-over-buttons .btn {
            flex: 1;
        }

        .streak-info {
            background-color: #0a0b12;
            padding: 12px;
            border-radius: 4px;
            margin-top: 12px;
            text-align: center;
            font-size: 14px;
        }

        .streak-value {
            font-size: 20px;
            font-weight: 700;
            color: #b59f3b;
        }

        @media (max-width: 480px) {
            .tile {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }

            .key {
                max-width: 36px;
                height: 42px;
                font-size: 12px;
            }

            .header-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div style="width: 40px;"></div>
            <div class="header-title">LAW WORDLE</div>
            <div class="header-buttons">
                <button class="icon-btn" id="statsBtn" title="Statistics">📊</button>
                <button class="icon-btn" id="helpBtn" title="Help">❓</button>
            </div>
        </div>

        <div class="message" id="message"></div>

        <div id="gameContent">
            <div class="game-board" id="gameBoard"></div>
            <div class="keyboard" id="keyboard"></div>
            <div class="action-buttons" id="actionButtons">
                <button class="btn btn-primary" id="guessBtn" disabled>GUESS</button>
            </div>
        </div>

        <div id="gameOverContent" style="display: none;">
            <div class="definition-card" id="definitionCard"></div>
            <div class="game-over" id="gameOverInfo"></div>
        </div>
    </div>

    <div class="stats-modal" id="statsModal">
        <div class="stats-content">
            <div class="stats-title">STATISTICS</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="gamesPlayedStat">0</div>
                    <div class="stat-label">Played</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="winPercentageStat">0%</div>
                    <div class="stat-label">Win %</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="streakStat">0</div>
                    <div class="stat-label">Streak</div>
                </div>
            </div>
            <button class="close-stats" id="closeStatsBtn">CLOSE</button>
        </div>
    </div>

    <script>
        // Word list with definitions
        const wordList = [
            // PROPERTY (30)
            { word: "TITLE", def: "Legal ownership of property", course: "Property" },
            { word: "DEEDS", def: "Written instruments conveying real property", course: "Property" },
            { word: "LIENS", def: "Claims against property as security for debt", course: "Property" },
            { word: "EVICT", def: "To legally remove a tenant from property", course: "Property" },
            { word: "ENTRY", def: "Physical possession of land; element of adverse possession", course: "Property" },
            { word: "WASTE", def: "Tenant conduct that damages the property interest", course: "Property" },
            { word: "TACKS", def: "Joining successive periods of adverse possession", course: "Property" },
            { word: "GRANT", def: "Transfer of property interest from grantor to grantee", course: "Property" },
            { word: "LEASE", def: "Contract granting right to possess property for a term", course: "Property" },
            { word: "QUIET", def: "As in quiet title action or covenant of quiet enjoyment", course: "Property" },
            { word: "SEIZE", def: "To take possession of property; seisin is feudal possession", course: "Property" },
            { word: "REVERT", def: "Return of property to grantor when estate ends", course: "Property" },
            { word: "EJECT", def: "Legal action to recover possession of land", course: "Property" },
            { word: "ABATE", def: "To reduce or eliminate a nuisance", course: "Property" },
            { word: "PRIVITY", def: "Legal relationship required for covenant to run with land", course: "Property" },
            { word: "ZONING", def: "Government regulation of land use by district", course: "Property" },
            { word: "ESCROW", def: "Funds held by third party pending completion of transaction", course: "Property" },
            { word: "TENURE", def: "System of holding land; feudal land holding concept", course: "Property" },
            { word: "CHATTEL", def: "Personal property as opposed to real property", course: "Property" },
            { word: "ESTATE", def: "Interest in land; degree of ownership", course: "Property" },
            { word: "VESTED", def: "Fixed and certain; not subject to condition precedent", course: "Property" },
            { word: "APPURTENANT", def: "Easement attached to and benefiting a parcel", course: "Property" },
            { word: "FIXTURE", def: "Personal property attached to land becoming real property", course: "Property" },
            { word: "OCCUPY", def: "To take or hold possession of land", course: "Property" },
            { word: "BURDEN", def: "Obligation attached to land; servient estate bears it", course: "Property" },
            { word: "CONVEY", def: "To transfer ownership of property", course: "Property" },
            { word: "RECORD", def: "To file deed in public records for constructive notice", course: "Property" },
            { word: "VACANT", def: "Unoccupied; relevant to adverse possession", course: "Property" },
            { word: "MERGER", def: "Doctrine combining lesser and greater estate", course: "Property" },
            { word: "OUSTER", def: "Exclusion of co-tenant from shared property", course: "Property" },

            // CONSTITUTIONAL LAW (30)
            { word: "FORUM", def: "Court or tribunal; also public forum doctrine", course: "Constitutional Law" },
            { word: "VENUE", def: "Proper location for trial", course: "Constitutional Law" },
            { word: "ULTRA", def: "Beyond the scope of power (ultra vires)", course: "Constitutional Law" },
            { word: "POWER", def: "Authority granted by Constitution to government branch", course: "Constitutional Law" },
            { word: "CLAUSE", def: "Specific provision of the Constitution", course: "Constitutional Law" },
            { word: "AMEND", def: "To change the Constitution; amendment process", course: "Constitutional Law" },
            { word: "APPLY", def: "As in applying strict scrutiny to government action", course: "Constitutional Law" },
            { word: "STATE", def: "Government entity; state action doctrine", course: "Constitutional Law" },
            { word: "EQUAL", def: "Equal Protection Clause of 14th Amendment", course: "Constitutional Law" },
            { word: "PRIOR", def: "Prior restraint on speech; presumptively unconstitutional", course: "Constitutional Law" },
            { word: "BRIEF", def: "Written legal argument submitted to a court", course: "Constitutional Law" },
            { word: "BENCH", def: "The court; as in bench trial", course: "Constitutional Law" },
            { word: "WAIVE", def: "To voluntarily relinquish a known right", course: "Constitutional Law" },
            { word: "REMIT", def: "To send back; remand to lower court", course: "Constitutional Law" },
            { word: "TAKEN", def: "Government seizure of property; Takings Clause", course: "Constitutional Law" },
            { word: "YIELD", def: "To give way; federal supremacy makes state law yield", course: "Constitutional Law" },
            { word: "VALID", def: "Constitutional; within government power", course: "Constitutional Law" },
            { word: "MOOT", def: "Case no longer presenting live controversy", course: "Constitutional Law" },
            { word: "STAND", def: "Standing to sue; injury causation redressability", course: "Constitutional Law" },
            { word: "PLENARY", def: "Full and complete power (Congress over immigration)", course: "Constitutional Law" },
            { word: "NARROW", def: "Narrowly tailored; strict scrutiny requirement", course: "Constitutional Law" },
            { word: "COMPEL", def: "Compelling interest; strict scrutiny threshold", course: "Constitutional Law" },
            { word: "FACIAL", def: "Challenge to law on its face vs as-applied", course: "Constitutional Law" },
            { word: "OVERT", def: "Open and visible; overt act in conspiracy", course: "Constitutional Law" },
            { word: "DORMANT", def: "Dormant Commerce Clause; implicit limit on states", course: "Constitutional Law" },
            { word: "STRICT", def: "Strict scrutiny; highest level of judicial review", course: "Constitutional Law" },
            { word: "SPEECH", def: "First Amendment protected expression", course: "Constitutional Law" },
            { word: "PRESS", def: "Freedom of the press; First Amendment", course: "Constitutional Law" },
            { word: "DUEPROCESS", def: "Substantive and procedural due process rights", course: "Constitutional Law" },
            { word: "LIBERTY", def: "Protected by Due Process Clause", course: "Constitutional Law" },

            // CRIMINAL LAW (30)
            { word: "ACTUS", def: "Latin for act; actus reus is the guilty act", course: "Criminal Law" },
            { word: "GUILT", def: "State of having committed a criminal offense", course: "Criminal Law" },
            { word: "CRIME", def: "Act punishable by law; violation of criminal statute", course: "Criminal Law" },
            { word: "CAUSE", def: "Causation; but-for and proximate cause", course: "Criminal Law" },
            { word: "FORCE", def: "Physical compulsion; element of robbery and assault", course: "Criminal Law" },
            { word: "THEFT", def: "Taking property of another with intent to deprive", course: "Criminal Law" },
            { word: "FRAUD", def: "Intentional deception for unlawful gain", course: "Criminal Law" },
            { word: "ARSON", def: "Intentional burning of dwelling or structure", course: "Criminal Law" },
            { word: "FELON", def: "Person convicted of a felony offense", course: "Criminal Law" },
            { word: "TRIAL", def: "Formal judicial examination of evidence", course: "Criminal Law" },
            { word: "MALUM", def: "Wrong in itself (malum in se) or by statute (malum prohibitum)", course: "Criminal Law" },
            { word: "OVERT", def: "Visible act furthering conspiracy", course: "Criminal Law" },
            { word: "SEIZE", def: "To take into custody; Fourth Amendment seizure", course: "Criminal Law" },
            { word: "FELONY", def: "Serious crime typically punishable by more than one year", course: "Criminal Law" },
            { word: "DURESS", def: "Coercion that negates free will; affirmative defense", course: "Criminal Law" },
            { word: "LACHES", def: "Unreasonable delay in asserting a legal right", course: "Criminal Law" },
            { word: "ASSENT", def: "Agreement; consent as defense element", course: "Criminal Law" },
            { word: "BREACH", def: "Violation of duty or law", course: "Criminal Law" },
            { word: "ARREST", def: "Seizure of person by legal authority", course: "Criminal Law" },
            { word: "MURDER", def: "Unlawful killing with malice aforethought", course: "Criminal Law" },
            { word: "PAROLE", def: "Supervised release from prison before sentence completion", course: "Criminal Law" },
            { word: "PARDON", def: "Executive clemency releasing person from punishment", course: "Criminal Law" },
            { word: "INTENT", def: "Mental state; purpose to achieve a result", course: "Criminal Law" },
            { word: "RECKLESS", def: "Conscious disregard of substantial risk", course: "Criminal Law" },
            { word: "BATTERY", def: "Intentional harmful or offensive touching", course: "Criminal Law" },
            { word: "LARCENY", def: "Trespassory taking and carrying away of property", course: "Criminal Law" },
            { word: "PROVOKE", def: "Adequate provocation reduces murder to manslaughter", course: "Criminal Law" },
            { word: "COERCED", def: "Acting under duress or compulsion", course: "Criminal Law" },
            { word: "DEFAULT", def: "Failure to fulfill legal obligation", course: "Criminal Law" },
            { word: "CUSTODY", def: "Detention by police; also custodial interrogation", course: "Criminal Law" }
        ];

        // Game state
        let currentWordIndex = 0;
        let currentGuess = '';
        let guesses = [];
        let gameOver = false;
        let won = false;
        let stats = {
            gamesPlayed: 0,
            wins: 0,
            streak: 0
        };

        // Load stats from localStorage
        function loadStats() {
            const saved = localStorage.getItem('lawWordleStats');
            if (saved) {
                stats = JSON.parse(saved);
            }
        }

        // Save stats to localStorage
        function saveStats() {
            localStorage.setItem('lawWordleStats', JSON.stringify(stats));
        }

        // Initialize game
        function initGame() {
            currentGuess = '';
            guesses = [];
            gameOver = false;
            won = false;
            document.getElementById('gameContent').style.display = 'block';
            document.getElementById('gameOverContent').style.display = 'none';
            document.getElementById('message').textContent = '';
            document.getElementById('guessBtn').disabled = true;
            renderBoard();
            renderKeyboard();
        }

        // Get current word
        function getCurrentWord() {
            return wordList[currentWordIndex % wordList.length];
        }

        // Render game board
        function renderBoard() {
            const boardEl = document.getElementById('gameBoard');
            boardEl.innerHTML = '';
            const wordObj = getCurrentWord();
            const word = wordObj.word;
            const wordLength = word.length;

            // Render previous guesses
            for (let i = 0; i < guesses.length; i++) {
                const row = document.createElement('div');
                row.className = 'tile-row';
                const guess = guesses[i];

                for (let j = 0; j < wordLength; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.textContent = guess[j];

                    const status = getTileStatus(guess, j);
                    setTimeout(() => {
                        tile.classList.add('flipped', status);
                    }, j * 100);

                    row.appendChild(tile);
                }
                boardEl.appendChild(row);
            }

            // Render current guess row
            const currentRow = document.createElement('div');
            currentRow.className = 'tile-row';
            for (let i = 0; i < wordLength; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                if (i < currentGuess.length) {
                    tile.textContent = currentGuess[i];
                    tile.classList.add('filled');
                }
                currentRow.appendChild(tile);
            }
            boardEl.appendChild(currentRow);

            // Render empty rows
            for (let i = guesses.length + 1; i < 6; i++) {
                const row = document.createElement('div');
                row.className = 'tile-row';
                for (let j = 0; j < wordLength; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    row.appendChild(tile);
                }
                boardEl.appendChild(row);
            }
        }

        // Get tile status
        function getTileStatus(guess, index) {
            const wordObj = getCurrentWord();
            const word = wordObj.word;

            if (word[index] === guess[index]) {
                return 'correct';
            } else if (word.includes(guess[index])) {
                return 'present';
            } else {
                return 'absent';
            }
        }

        // Render keyboard
        function renderKeyboard() {
            const keyboardEl = document.getElementById('keyboard');
            keyboardEl.innerHTML = '';
            const keys = [
                ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
                ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
                ['Z', 'X', 'C', 'V', 'B', 'N', 'M']
            ];

            keys.forEach((row, rowIndex) => {
                const rowEl = document.createElement('div');
                rowEl.className = 'keyboard-row';

                if (rowIndex === 2) {
                    const spacer = document.createElement('div');
                    spacer.className = 'key spacer';
                    rowEl.appendChild(spacer);
                }

                row.forEach(key => {
                    const keyEl = document.createElement('button');
                    keyEl.className = 'key';
                    keyEl.textContent = key;
                    keyEl.addEventListener('click', () => handleKeyPress(key));

                    // Update key color based on guesses
                    const keyStatus = getKeyStatus(key);
                    if (keyStatus) {
                        keyEl.classList.add(keyStatus);
                    }

                    rowEl.appendChild(keyEl);
                });

                if (rowIndex === 2) {
                    const spacer = document.createElement('div');
                    spacer.className = 'key spacer';
                    rowEl.appendChild(spacer);
                }

                keyboardEl.appendChild(rowEl);
            });
        }

        // Get key status
        function getKeyStatus(key) {
            const wordObj = getCurrentWord();
            const word = wordObj.word;

            for (const guess of guesses) {
                for (let i = 0; i < guess.length; i++) {
                    if (guess[i] === key) {
                        if (word[i] === key) {
                            return 'correct';
                        } else if (word.includes(key)) {
                            return 'present';
                        } else {
                            return 'absent';
                        }
                    }
                }
            }
            return null;
        }

        // Handle key press
        function handleKeyPress(key) {
            if (gameOver) return;

            const wordObj = getCurrentWord();
            const wordLength = wordObj.word.length;

            if (key === 'BACKSPACE') {
                currentGuess = currentGuess.slice(0, -1);
            } else if (key === 'ENTER') {
                submitGuess();
                return;
            } else if (currentGuess.length < wordLength) {
                currentGuess += key;
            }

            document.getElementById('guessBtn').disabled = currentGuess.length === 0;
            renderBoard();
        }

        // Submit guess
        function submitGuess() {
            if (gameOver || currentGuess.length === 0) return;

            const wordObj = getCurrentWord();
            const word = wordObj.word;

            if (currentGuess.length !== word.length) {
                showMessage('Word length must match!', 'error');
                return;
            }

            guesses.push(currentGuess);
            currentGuess = '';
            document.getElementById('guessBtn').disabled = true;

            renderBoard();
            renderKeyboard();

            setTimeout(() => {
                if (guesses[guesses.length - 1] === word) {
                    endGame(true);
                } else if (guesses.length >= 6) {
                    endGame(false);
                } else {
                    renderBoard();
                    renderKeyboard();
                }
            }, 600);
        }

        // End game
        function endGame(isWin) {
            gameOver = true;
            won = isWin;

            // Update stats
            stats.gamesPlayed++;
            if (isWin) {
                stats.wins++;
                stats.streak++;
                showMessage('You won!', 'win');
            } else {
                stats.streak = 0;
                showMessage(`The word was ${getCurrentWord().word}`, 'lose');
            }
            saveStats();

            // Show game over screen after delay
            setTimeout(() => {
                document.getElementById('gameContent').style.display = 'none';
                document.getElementById('gameOverContent').style.display = 'block';
                renderGameOverScreen();
            }, 1500);
        }

        // Render game over screen
        function renderGameOverScreen() {
            const wordObj = getCurrentWord();

            // Show definition
            const defCard = document.getElementById('definitionCard');
            defCard.innerHTML = `
                <div class="definition-word">${wordObj.word}</div>
                <div class="definition-text">${wordObj.def}</div>
                <div class="definition-course">${wordObj.course}</div>
            `;

            // Show game over info
            const gameOverInfo = document.getElementById('gameOverInfo');
            const title = won ? 'You Won!' : 'Game Over';
            const titleClass = won ? 'win' : 'lose';

            gameOverInfo.innerHTML = `
                <div class="game-over-title ${titleClass}">${title}</div>
                <div class="game-over-word">Attempts: ${guesses.length}/6</div>
                <div class="game-over-buttons">
                    <button class="btn btn-primary" onclick="nextWord()">NEXT WORD</button>
                </div>
                <div class="streak-info">
                    <div>Current Streak</div>
                    <div class="streak-value">${stats.streak}</div>
                </div>
            `;
        }

        // Next word
        function nextWord() {
            currentWordIndex++;
            initGame();
        }

        // Show message
        function showMessage(text, type = '') {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = `message ${type}`;

            if (type === 'error') {
                setTimeout(() => {
                    msgEl.textContent = '';
                    msgEl.className = 'message';
                }, 2000);
            }
        }

        // Stats modal
        document.getElementById('statsBtn').addEventListener('click', () => {
            const modal = document.getElementById('statsModal');
            modal.classList.add('open');
            document.getElementById('gamesPlayedStat').textContent = stats.gamesPlayed;
            const winPct = stats.gamesPlayed > 0 ? Math.round((stats.wins / stats.gamesPlayed) * 100) : 0;
            document.getElementById('winPercentageStat').textContent = winPct + '%';
            document.getElementById('streakStat').textContent = stats.streak;
        });

        document.getElementById('closeStatsBtn').addEventListener('click', () => {
            document.getElementById('statsModal').classList.remove('open');
        });

        document.getElementById('statsModal').addEventListener('click', (e) => {
            if (e.target.id === 'statsModal') {
                document.getElementById('statsModal').classList.remove('open');
            }
        });

        // Help button
        document.getElementById('helpBtn').addEventListener('click', () => {
            showMessage('Guess the legal term in 6 attempts. Green = correct position, Yellow = wrong position, Gray = not in word', 'error');
        });

        // Guess button
        document.getElementById('guessBtn').addEventListener('click', submitGuess);

        // Keyboard input
        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (/^[A-Z]$/.test(key)) {
                handleKeyPress(key);
            } else if (key === 'BACKSPACE') {
                handleKeyPress('BACKSPACE');
            } else if (key === 'ENTER') {
                handleKeyPress('ENTER');
            }
        });

        // Initialize
        loadStats();
        initGame();
    </script>
</body>
</html>
