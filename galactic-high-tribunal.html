          { text: "The crimes were committed in furtherance of the conspiracy and were reasonably foreseeable as a natural consequence of the conspiratorial agreement", correct: true, explanation: "Correct! Pinkerton liability attaches when co-conspirators commit crimes that are (1) in furtherance of the conspiracy and (2) reasonably foreseeable. The rationale is that by joining a conspiracy, each member implicitly authorizes others to act on behalf of the group. If distributing contaminated spice and causing deaths was a foreseeable consequence of a spice distribution conspiracy, all members face liability — even for acts they didn't personally commit." },
          { text: "The co-conspirator personally aided, abetted, or directed the specific criminal act", correct: false, explanation: "This describes accomplice liability, not Pinkerton liability. The whole point of Pinkerton is that it DOESN'T require personal involvement in the specific crime. It's vicarious liability arising from membership in the conspiracy itself." },
          { text: "The co-conspirator was physically present when the crime was committed", correct: false, explanation: "Physical presence is not required under Pinkerton. The doctrine specifically allows liability for crimes committed by co-conspirators when the defendant was elsewhere. That's what makes it such a powerful prosecutorial tool — and why it's controversial." }

          { text: "Never a defense — individuals are always personally responsible regardless of orders", correct: false, explanation: "While Nuremberg rejected superior orders as an absolute defense, it's not completely irrelevant either. Some jurisdictions allow it as a mitigating factor, and it may be a defense where the order was not 'manifestly illegal' — i.e., where a reasonable person wouldn't have known the order was unlawful." },
          { text: "Not a defense when the order is 'manifestly illegal' — an order so clearly unlawful that a reasonable person would know it's illegal — but may mitigate in less clear cases", correct: true, explanation: "Correct! The modern rule (from Nuremberg forward): superior orders is not a defense when the order is 'manifestly illegal' — meaning so clearly unlawful that any reasonable person would recognize it as illegal. Ordering the systematic execution of an entire group (the Jedi) would be manifestly illegal. However, for ambiguous orders, following superior commands may be a mitigating factor or even a defense." },

        question: "If the inhibitor chips created an irresistible compulsion, which defense theory best applies?",

          { text: "Involuntary act — because a biologically compelled action is not a product of the actor's effort or determination", correct: true, explanation: "Correct! If the inhibitor chip truly overrode the clone's free will — making their body act without voluntary control — then the act fails the voluntary act requirement of MPC §2.01. An action that isn't a product of the actor's 'effort or determination' isn't a voluntary act, and no criminal liability can attach. This is more fundamental than duress — it negates the actus reus entirely rather than providing an excuse." },

          { text: "Insanity — because the chips created a mental defect preventing appreciation of wrongfulness", correct: false, explanation: "The insanity defense applies to mental disease or defect. An inhibitor chip that overrides motor control is more like physical compulsion than mental illness. If the clones KNEW what they were doing was wrong but physically couldn't stop (like Rex, who partially resisted), that's not insanity — it's involuntary action." }

          { text: "No — felony murder only applies to traditional felonies like robbery and burglary, not political crimes", correct: false, explanation: "Felony murder isn't limited to specific traditional felonies (though many statutes enumerate which felonies qualify). The doctrine focuses on whether the underlying felony is sufficiently dangerous, not on whether it's 'traditional.' Treason, as a felony inherently involving danger to life, could certainly support felony murder." },

/* ───── STARFIELD COMPONENT ───── */
function Starfield() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId;
    const stars = [];
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    for (let i = 0; i < 200; i++) {
      stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.5 + 0.5, twinkle: Math.random() * Math.PI * 2, speed: Math.random() * 0.02 + 0.01 });
    }
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.twinkle += s.speed;
        const a = 0.4 + 0.6 * Math.abs(Math.sin(s.twinkle));
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={canvasRef} style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', zIndex: 0, pointerEvents: 'none' }} />;
}

/* ───── MAIN GAME ───── */
function Game() {
  const [screen, setScreen] = useState('crawl');
  const [caseIdx, setCaseIdx] = useState(0);
  const [wins, setWins] = useState(0);
  const [reputation, setReputation] = useState(50);
  const [questionIdx, setQuestionIdx] = useState(0);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [correctCount, setCorrectCount] = useState(0);
  const [answeredQuestions, setAnsweredQuestions] = useState([]);
  const [showExplanation, setShowExplanation] = useState(false);
  const [phase, setPhase] = useState('story'); // story, briefing, arguments, quiz, results, promotion
  const [shuffledChoices, setShuffledChoices] = useState([]);

  const safeCaseIdx = Math.min(caseIdx, CASES.length - 1);
  const currentCase = CASES[safeCaseIdx];
  const currentRank = CAREER.findIndex((c, i) => i === CAREER.length - 1 || wins < CAREER[i + 1].requiredWins);
  const career = CAREER[currentRank] || CAREER[0];

  // Fisher-Yates shuffle function
  const shuffle = (arr) => {
    const result = [...arr];
    for (let i = result.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]];
    }
    return result;
  };

  // Shuffle choices when question changes
  useEffect(() => {
    if (currentCase && currentCase.questions[questionIdx]) {
      const shuffled = shuffle(currentCase.questions[questionIdx].choices);
      setShuffledChoices(shuffled);
    }
  }, [questionIdx, currentCase]);

  const startCase = useCallback(() => {
    setQuestionIdx(0);
    setSelectedAnswer(null);
    setCorrectCount(0);
    setAnsweredQuestions([]);
    setShowExplanation(false);
    setPhase('story');
    setScreen('case');
  }, []);

  const handleAnswer = (shuffledIdx) => {
    if (selectedAnswer !== null) return;
    setSelectedAnswer(shuffledIdx);
    setShowExplanation(true);
    const selectedChoice = shuffledChoices[shuffledIdx];
    if (selectedChoice.correct) {
      setCorrectCount(c => c + 1);
    }
    setAnsweredQuestions(prev => [...prev, { questionIdx, choiceIdx: shuffledIdx, correct: selectedChoice.correct }]);
  };

  const nextQuestion = () => {
    if (questionIdx < currentCase.questions.length - 1) {
      setQuestionIdx(q => q + 1);
      setSelectedAnswer(null);
      setShowExplanation(false);
    } else {
      setPhase('results');
    }
  };

  const finishCase = () => {
    const pct = (correctCount / currentCase.questions.length) * 100;
    const won = pct >= 60;
    if (won) setWins(w => w + 1);
    const repChange = pct >= 90 ? 12 : pct >= 60 ? 6 : -4;
    setReputation(r => Math.max(0, Math.min(100, r + repChange)));

    if (!won) {
      // Lost — stay on same case so player can retry
      setPhase('lost');
      return;
    }

    const newWins = wins + 1;
    const newRank = CAREER.findIndex((c, i) => i === CAREER.length - 1 || newWins < CAREER[i + 1].requiredWins);

    if (caseIdx >= CASES.length - 1) {
      setScreen('complete');
    } else if (newRank > currentRank) {
      setPhase('promotion');
    } else {
      setCaseIdx(i => Math.min(i + 1, CASES.length - 1));
      setScreen('title');
    }
  };

  const handlePromotion = () => {
    if (caseIdx < CASES.length - 1) {
      setCaseIdx(i => i + 1);
    }
    setScreen('title');
  };

  /* ── SCREENS ── */

  if (screen === 'crawl') {
    return <><Starfield /><OpeningCrawl onComplete={() => setScreen('title')} /></>;
  }

  if (screen === 'complete') {
    return (
      <div style={{ position: 'relative', zIndex: 1, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Starfield />
        <div style={{ maxWidth: 650, padding: 32, animation: 'fadeIn 1s ease' }}>
          <LocationScene type="senate" />
          <Panel style={{ textAlign: 'center', border: '1px solid #FFE81F44' }}>
            <div style={{ fontSize: 14, color: '#FFE81F', letterSpacing: 3, marginBottom: 8, textTransform: 'uppercase' }}>Congratulations</div>
            <h1 style={{ fontSize: 28, color: '#FFE81F', fontWeight: 700, margin: '16px 0' }}>Attorney General of the Galactic Republic</h1>
            <p style={{ fontSize: 16, lineHeight: 1.8, color: '#bcc8d4', margin: '16px 0' }}>
              From the dusty courts of Tatooine to the highest office of justice in the galaxy — you have mastered the doctrines of criminal law and proven that the rule of law endures even in the darkest times.
            </p>
            <div style={{ display: 'flex', gap: 16, justifyContent: 'center', margin: '20px 0', flexWrap: 'wrap' }}>
              <Badge color="#FFE81F">Cases Won: {wins}/{CASES.length}</Badge>
              <Badge color="#4ae">Reputation: {reputation}/100</Badge>
              <Badge color="#8bc34a">Rank: {reputation >= 90 ? 'GRAND MASTER' : reputation >= 70 ? 'MASTER' : 'KNIGHT'}</Badge>
            </div>
            <Dialogue char="mothma">The Force of law is strong with you. May you use this power wisely, Attorney General.</Dialogue>
            <Btn primary onClick={() => { setCaseIdx(0); setWins(0); setReputation(50); setScreen('crawl'); }} style={{ marginTop: 16 }}>
              Play Again
            </Btn>
          </Panel>
        </div>
      </div>
    );
  }

  if (screen === 'title') {
    return (
      <div style={{ position: 'relative', zIndex: 1, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Starfield />
        <div style={{ maxWidth: 650, padding: 32, animation: 'fadeIn 0.6s ease' }}>
          <LocationScene type={career.art} color={career.color} />
          <Panel>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, flexWrap: 'wrap', gap: 8 }}>
              <Badge color={career.color}>{career.title}</Badge>
              <Badge color="#4ae">Rep: {reputation}/100</Badge>
            </div>
            <h1 style={{ fontSize: 24, color: '#FFE81F', fontWeight: 700, marginBottom: 4 }}>The Galactic High Tribunal</h1>
            <p style={{ fontSize: 13, color: '#667788', marginBottom: 20 }}>{career.desc} · {career.location}</p>

            <div style={{ borderTop: '1px solid rgba(255,232,31,0.1)', paddingTop: 16 }}>
              <div style={{ fontSize: 12, color: '#667788', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>Next Case ({caseIdx + 1} of {CASES.length})</div>
              <h2 style={{ fontSize: 20, color: '#e0e8f0', marginBottom: 4 }}>{currentCase.title}</h2>
              <p style={{ fontSize: 14, color: '#8899aa', marginBottom: 4 }}>{currentCase.subtitle}</p>
              <p style={{ fontSize: 13, color: '#667788' }}>Defendant: {currentCase.defendant} · Charge: {currentCase.crime}</p>
            </div>

            <div style={{ display: 'flex', gap: 16, marginTop: 20, flexWrap: 'wrap' }}>
              <Badge color="#8bc34a">Wins: {wins}</Badge>
              <Badge color={career.color}>Rank {currentRank + 1}/5</Badge>
              <Badge color="#ff6b6b">{currentCase.questions.length} Questions</Badge>
            </div>

            <Btn primary onClick={startCase} style={{ marginTop: 20 }}>
              Begin Case: {currentCase.title}
            </Btn>
          </Panel>
        </div>
      </div>
    );
  }

  /* ── CASE SCREEN ── */
  return (
    <div style={{ position: 'relative', zIndex: 1, minHeight: '100vh', display: 'flex', justifyContent: 'center', padding: '32px 16px' }}>
      <Starfield />
      <div style={{ maxWidth: 700, width: '100%', animation: 'fadeIn 0.5s ease' }}>
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, flexWrap: 'wrap', gap: 8 }}>
          <Badge color={career.color}>{career.title}</Badge>
          <div style={{ display: 'flex', gap: 8 }}>
            <Badge color="#4ae">Rep: {reputation}</Badge>
            <Badge color="#8bc34a">Wins: {wins}</Badge>
          </div>
        </div>

        <h2 style={{ fontSize: 22, color: '#FFE81F', marginBottom: 4 }}>{currentCase.title}</h2>
        <p style={{ fontSize: 13, color: '#667788', marginBottom: 20 }}>{currentCase.subtitle} · Defendant: {currentCase.defendant}</p>

        {/* STORY PHASE */}
        {phase === 'story' && (
          <div style={{ animation: 'fadeIn 0.5s ease' }}>
            <Panel>
              <div style={{ fontSize: 12, color: '#FFE81F', textTransform: 'uppercase', letterSpacing: 2, marginBottom: 12 }}>Case Introduction</div>
              <p style={{ fontSize: 15, lineHeight: 1.8, color: '#bcc8d4' }}>{currentCase.storyIntro}</p>
            </Panel>
            <Btn primary onClick={() => setPhase('briefing')}>Review Holobrief</Btn>
          </div>
        )}

        {/* BRIEFING PHASE */}
        {phase === 'briefing' && (
          <div style={{ animation: 'fadeIn 0.5s ease' }}>
            <Panel>
              <div style={{ fontSize: 12, color: '#4ae', textTransform: 'uppercase', letterSpacing: 2, marginBottom: 12 }}>Encrypted Holobrief</div>
              {currentCase.holobrief.map((p, i) => (
                <p key={i} style={{ fontSize: 14, lineHeight: 1.8, color: '#8899aa', marginBottom: i < currentCase.holobrief.length - 1 ? 12 : 0 }}>{p}</p>
              ))}
            </Panel>
            <Btn primary onClick={() => setPhase('arguments')}>Hear Prosecution's Argument</Btn>
          </div>
        )}

        {/* ARGUMENTS PHASE */}
        {phase === 'arguments' && (
          <div style={{ animation: 'fadeIn 0.5s ease' }}>
            <Panel style={{ borderLeft: '3px solid #ff6b6b' }}>
              <div style={{ fontSize: 12, color: '#ff6b6b', textTransform: 'uppercase', letterSpacing: 2, marginBottom: 12 }}>Prosecution's Argument</div>

                      borderColor = '#f44336';
                      textColor = '#ef9a9a';
                    }
                  }

                  return (
                    <button
                      key={i}
                      onClick={() => handleAnswer(i)}
                      disabled={selectedAnswer !== null}
                      style={{
                        background: bg,
                        border: `1px solid ${borderColor}`,
                        borderRadius: 8,
                        padding: '14px 18px',
                        textAlign: 'left',
                        cursor: selectedAnswer !== null ? 'default' : 'pointer',
                        color: textColor,
                        fontSize: 14,
                        lineHeight: 1.6,
                        transition: 'all 0.2s',
                        fontFamily: 'inherit'
                      }}
                    >
                      <span style={{ color: '#FFE81F', fontWeight: 700, marginRight: 8 }}>{String.fromCharCode(65 + i)}.</span>
                      {choice.text}
                    </button>
                  );
                })}
              </div>
            </Panel>

            {/* Explanation */}
            {showExplanation && selectedAnswer !== null && (
              <Panel style={{ animation: 'fadeIn 0.4s ease', borderLeft: `3px solid ${shuffledChoices[selectedAnswer].correct ? '#4caf50' : '#f44336'}` }}>
                <div style={{ fontSize: 12, color: shuffledChoices[selectedAnswer].correct ? '#4caf50' : '#f44336', textTransform: 'uppercase', letterSpacing: 2, marginBottom: 8 }}>
                  {shuffledChoices[selectedAnswer].correct ? '✓ Correct!' : '✗ Incorrect'}
                </div>
                <p style={{ fontSize: 14, lineHeight: 1.7, color: '#8899aa' }}>
                  {shuffledChoices[selectedAnswer].explanation}
                </p>
                <Btn primary onClick={nextQuestion} style={{ marginTop: 16 }}>
                  {questionIdx < currentCase.questions.length - 1 ? 'Next Question' : 'View Case Results'}
                </Btn>
              </Panel>
            )}
          </div>
        )}

        {/* RESULTS PHASE */}
        {phase === 'results' && (() => {
          const pct = Math.round((correctCount / currentCase.questions.length) * 100);
          const won = pct >= 60;
          const rank = pct >= 90 ? 'MASTER' : pct >= 60 ? 'KNIGHT' : 'PADAWAN';
          const rankColor = pct >= 90 ? '#FFE81F' : pct >= 60 ? '#4ae' : '#ff6b6b';
          return (
            <div style={{ animation: 'fadeIn 0.5s ease' }}>
              <Panel style={{ textAlign: 'center', border: `1px solid ${rankColor}44` }}>
                <div style={{ fontSize: 48, marginBottom: 8 }}>{won ? '⚖️' : '📜'}</div>
                <h3 style={{ fontSize: 22, color: rankColor, marginBottom: 8 }}>{won ? 'Case Won!' : 'Case Lost'}</h3>
                <p style={{ fontSize: 15, color: '#8899aa', marginBottom: 16 }}>{correctCount}/{currentCase.questions.length} correct ({pct}%)</p>
                <Badge color={rankColor}>{rank} Rank</Badge>

                <div style={{ margin: '20px 0', textAlign: 'left' }}>
                  {answeredQuestions.map((aq, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6, fontSize: 13 }}>
                      <span style={{ color: aq.correct ? '#4caf50' : '#f44336' }}>{aq.correct ? '✓' : '✗'}</span>
                      <span style={{ color: '#667788' }}>Q{i + 1}: {currentCase.questions[i].doctrine}</span>
                    </div>
                  ))}
                </div>

                {won && (
                  <Panel style={{ borderLeft: '3px solid #8bc34a', textAlign: 'left', marginTop: 16 }}>
                    <div style={{ fontSize: 11, color: '#8bc34a', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 4 }}>Lore Unlocked</div>
                    <p style={{ fontSize: 14, lineHeight: 1.7, color: '#8899aa' }}>{currentCase.loreReward}</p>
                  </Panel>
                )}

                <Btn primary onClick={finishCase} style={{ marginTop: 16 }}>
                  {caseIdx >= CASES.length - 1 && won ? 'Complete Your Journey' : 'Continue'}
                </Btn>
              </Panel>
            </div>
          );
        })()}

        {/* LOST PHASE — retry the same case */}
        {phase === 'lost' && (() => {
          const pct = Math.round((correctCount / currentCase.questions.length) * 100);
          return (
            <div style={{ animation: 'fadeIn 0.5s ease' }}>
              <Panel style={{ textAlign: 'center', border: '1px solid #ff6b6b44' }}>
                <div style={{ fontSize: 48, marginBottom: 8 }}>⚠️</div>
                <h3 style={{ fontSize: 22, color: '#ff6b6b', marginBottom: 8 }}>Case Lost — But Justice Demands a Retrial</h3>
                <p style={{ fontSize: 15, color: '#8899aa', marginBottom: 16 }}>You scored {correctCount}/{currentCase.questions.length} ({pct}%). You need 60% to win.</p>
                <Dialogue char={currentRank >= 2 ? 'tano' : 'mothma'}>
                  {currentRank >= 2
                    ? "A setback, but not a defeat. Review the doctrine carefully — the Tribunal will grant you another hearing."
                    : "Every great attorney has lost a case. What matters is what you learn. Study the doctrine and try again."}
                </Dialogue>
                <div style={{ display: 'flex', gap: 12, marginTop: 16 }}>
                  <Btn primary onClick={startCase} style={{ flex: 1 }}>
                    Retry: {currentCase.title}
                  </Btn>
                </div>
              </Panel>
            </div>
          );
        })()}

        {/* PROMOTION PHASE */}
        {phase === 'promotion' && (() => {
          const newRank = CAREER.findIndex((c, i) => i === CAREER.length - 1 || (wins) < CAREER[i + 1].requiredWins);
          const nr = CAREER[newRank] || CAREER[CAREER.length - 1];
          return (
            <div style={{ animation: 'fadeIn 0.8s ease' }}>
              <Panel style={{ textAlign: 'center', border: '1px solid #FFE81F44' }}>
                <div style={{ fontSize: 14, color: '#FFE81F', letterSpacing: 3, marginBottom: 8, textTransform: 'uppercase', animation: 'pulse 2s infinite' }}>Promotion!</div>
                <LocationScene type={nr.art} color={nr.color} />
                <h3 style={{ fontSize: 22, color: nr.color, marginBottom: 8 }}>{nr.title}</h3>
                <p style={{ fontSize: 14, color: '#8899aa', marginBottom: 16 }}>{nr.desc} · {nr.location}</p>
                <Dialogue char={newRank >= 3 ? 'yoda' : newRank >= 2 ? 'tano' : 'mothma'}>
                  {newRank >= 3 ? `Ready for the greatest challenges, you are. The High Tribunal awaits your wisdom.` :
                   newRank >= 2 ? `Coruscant's courts are unforgiving. But I've seen your work — you're ready.` :
                   `Your record speaks for itself. Naboo's judiciary needs prosecutors of your caliber.`}
                </Dialogue>
                <Btn primary onClick={handlePromotion} style={{ marginTop: 16 }}>
                  Accept Promotion to {nr.title}
                </Btn>
              </Panel>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

/* ── RENDER ── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Game />);
</script>
</body>
</html>
